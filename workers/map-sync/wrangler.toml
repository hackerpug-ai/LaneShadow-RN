name = "laneshadow-map-sync"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# R2 bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "laneshadow"

# Monthly cron trigger — 1st of each month at 6:00 AM UTC
[triggers]
crons = ["0 6 1 * *"]

# Environment variables (secrets set via `wrangler secret put`)
[vars]
PMTILES_KEY = "map-data/us-canada.pmtiles"
BBOX = "-170,24,-52,72"
MAX_ZOOM = "14"
