# LaneShadow Screen Inventory
# All screens and sheets from the design system
# Generated: 2026-01-29 | Updated: 2026-01-29 (Gap Analysis)
# Aligned with TRD Phase 1-3 IDs

meta:
  version: "1.1"
  lastUpdated: "2026-01-29"
  totalScreens: 25
  totalSheets: 15
  phases:
    phase1:
      screens: [V001, V002, V003, V004, V005, V006, V007, V008, V009, V010]
      sheets: [S001, S002, S003, S004, S005, S006, S007, S008, S009]
    phase2:
      screens: [V011, V012, V013]
      sheets: [S010, S011, S012]
    phase3:
      screens: [V014]
      sheets: [S013, S014, S015]
    sprint5Additions:
      - rainOverlayComponents
      - temperatureOverlayComponents
      - sideBySideComparison
      - enhancedRationale

screens:
  # ============================================
  # PHASE 1: Core Views (TRD §6.1)
  # ============================================

  V001:
    id: home-map
    name: "HomeMap"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.1"
    status: implemented
    file: legacy/home.mapview.designs.html
    purpose: "Map-first shell that hosts planning + route rendering"
    components:
      - mapBackground
      - topAppBar
      - searchBar
      - mapControls
      - fabPlanRide
      - bottomNavigation
      - annotationMarkers        # NEW: map annotations
      - routePolylines           # NEW: route rendering
      - overlaySegments          # NEW: wind/rain/temp overlays
    states:
      - default                  # Idle map view
      - searchFocused            # Search bar active
      - routeDisplayed           # Single route on map
      - planningInProgress       # NEW: Loading overlay active
      - routeComparison          # NEW: Multiple routes for comparison
      - overlayActive            # NEW: Overlay visualization on
    notes: "Transparent top app bar with blur effect, floating search bar"

  V002:
    id: saved-routes-list
    name: "SavedRoutesList"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.2"
    status: implemented
    file: legacy/saved.routes.designs.html
    purpose: "List of saved routes (summary view)"
    components:
      - topAppBar
      - searchInput
      - savedRouteCard
      - fab
      - bottomNavigation
      - emptyState              # NEW: inline empty state
      - rideStatusBadge         # NEW Phase 3: status indicators
    states:
      - default                 # List with items
      - empty                   # No saved routes
      - searchActive            # Search filter active
      - editMode                # Multi-select for bulk actions
      - showingRatings          # NEW Phase 3: with rating/status display
    notes: "Edit action in header, route cards with map thumbnail"

  V003:
    id: saved-route-detail
    name: "SavedRouteDetail"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.3"
    status: planned
    purpose: "Saved route replay with immutable snapshot rendering"
    components:
      - mapView
      - routeOverviewSheet
      - actionButtons
      - ratingDisplay           # NEW Phase 3
      - annotationMarkers
    states:
      - default
      - loading
      - rated                   # NEW Phase 3: showing rating
      - completed               # NEW Phase 3: marked as completed
    notes: "Renders saved snapshot without recomputation"

  V004:
    id: route-planner-loading
    name: "RoutePlannerLoading"
    type: overlay
    phase: 1
    trdRef: "TRD §6.1 B.18"
    status: implemented
    purpose: "Progress overlay during route planning"
    components:
      - loadingSpinner
      - statusText
      - cancelButton
      - progressIndicator
    states:
      - planning                # LLM sketching
      - compiling               # Route compilation
      - fetchingConditions      # Weather data fetch
      - error                   # Planning failed
    notes: "Full-screen overlay, blurs background"

  V005:
    id: empty-state-standalone
    name: "EmptyStateStandalone"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.19"
    status: planned
    purpose: "Reusable empty state screen"
    components:
      - illustration
      - headline
      - bodyText
      - primaryAction
    states:
      - noRoutes               # No saved routes yet
      - noHistory              # No ride history
      - noFavorites            # No favorite roads
      - searchNoResults        # Search returned nothing
    notes: "Optional; can embed empties in parent screens"

  V006:
    id: settings
    name: "Settings"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.4"
    status: planned
    purpose: "Minimal POC settings screen"
    components:
      - topAppBar
      - settingsSection
      - settingsRow
      - unitToggle             # F/C temperature
      - accountSection
      - signOutButton
      - versionInfo
    states:
      - default
    notes: "Minimal app hygiene for POC"

  V007:
    id: legal-about
    name: "LegalAbout"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.5"
    status: planned
    purpose: "About and legal information"
    components:
      - topAppBar
      - appInfo
      - legalLinks
      - termsOfService
      - privacyPolicy
      - openSourceLicenses
    states:
      - default
    notes: "Low design priority per TRD"

  V008:
    id: auth-sign-in
    name: "AuthSignIn"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.6"
    status: implemented
    file: legacy/login.designs.html
    purpose: "User sign-in via social or email/password"
    components:
      - brandHeader
      - socialAuthButtons
      - divider
      - emailPasswordForm
      - primaryButton
      - forgotPasswordLink
      - createAccountLink
      - termsFooter
    states:
      - default
      - loading
      - error
      - socialAuthPending
    actions:
      - signInApple
      - signInGoogle
      - signInEmail
      - forgotPassword
      - navigateToSignUp

  V009:
    id: auth-sign-up
    name: "AuthSignUp"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.7"
    status: planned
    purpose: "User registration via social or email/password"
    components:
      - brandHeader
      - socialAuthButtons
      - divider
      - emailPasswordForm
      - confirmPasswordInput
      - primaryButton
      - signInLink
      - termsCheckbox
      - termsFooter
    states:
      - default
      - loading
      - error
      - validationError
      - socialAuthPending
    actions:
      - signUpApple
      - signUpGoogle
      - signUpEmail
      - navigateToSignIn

  V010:
    id: session-restoring
    name: "SessionRestoring"
    type: screen
    phase: 1
    trdRef: "TRD §6.1 A.8"
    status: planned
    purpose: "Startup/session loading state"
    components:
      - appLogo
      - loadingSpinner
      - statusText
    states:
      - checking               # Checking auth state
      - restoring              # Restoring session
      - error                  # Session restore failed
    notes: "Shown on app launch while auth state is determined"

  # ============================================
  # PHASE 1: Sheets (TRD §6.1)
  # ============================================

  S001:
    id: plan-ride-sheet
    name: "PlanRideSheet"
    type: bottomSheet
    phase: 1
    trdRef: "TRD §6.1 B.9"
    status: implemented
    file: legacy/home.planridesheet.design.html
    purpose: "Start/end input and route preferences"
    components:
      - dragHandle
      - routeTimeline
      - locationInputOrigin
      - locationInputDestination
      - scenicBiasToggle
      - preferenceToggles
      - primaryButton
      - timeWindowSelector      # NEW Phase 3: departure optimization
    states:
      - default
      - originFocused
      - destinationFocused
      - valid
      - submitting
      - preferencesExpanded     # NEW Phase 2: show active preferences
      - departureOptimization   # NEW Phase 3: "Best Time" suggestion
    inputs:
      - origin: locationInput
      - destination: locationInput
      - scenicBias: segmentedControl
      - avoidHighways: toggle
      - avoidTolls: toggle
    actions:
      - planRide
      - openPlaceSearch
      - showDepartureOptimizer

  S002:
    id: route-options-sheet
    name: "RouteOptionsSheet"
    type: bottomSheet
    phase: 1
    trdRef: "TRD §6.1 B.10"
    status: implemented
    file: legacy/home.routeoptions.designs.html
    purpose: "Compare 2-3 route alternatives"
    components:
      - destinationHeader
      - routeOptionCardSelected
      - routeOptionCardUnselected
      - mapControls
      - overlayToggleGroup       # NEW Sprint 5: multi-overlay selector
      - comparisonToggle         # NEW Sprint 5: list vs side-by-side
      - weatherSummaryPill       # NEW Sprint 5: condensed conditions
      - elevationSummary         # NEW Phase 2: ascent/descent preview
      - favoriteRoadBadge        # NEW Phase 2: matched favorites indicator
    states:
      - default                  # One route selected
      - comparing                # Browsing options
      - sideBySide               # NEW Sprint 5: two-column comparison
      - overlayPreview           # NEW Sprint 5: showing overlay per card
    notes: "One route selected, others collapsed"

  S003:
    id: route-overview-sheet
    name: "RouteOverviewSheet"
    type: bottomSheet
    phase: 1
    trdRef: "TRD §6.1 B.11"
    status: implemented
    file: legacy/routeoverview.designs.html
    purpose: "Route details, overlays, and save action"
    components:
      - routeHeader
      - statsRow
      - conditionPill
      - legList
      - windBarVisualization
      - rainBarVisualization     # NEW Sprint 5
      - temperatureDisplay       # NEW Sprint 5
      - actionButtons
      - legendLinks              # Updated: wind/rain/temp legends
      - conditionsUnavailableNotice  # NEW: soft-fail advisory
      - elevationChart           # NEW Phase 2
      - roadSegmentSelector      # NEW Phase 2: long-press to save favorite
      - rationaleCard            # NEW Sprint 5: enhanced rationale
    states:
      - default
      - fromPlanning             # During planning flow
      - fromSaved                # Reopening saved route
      - conditionsUnavailable    # NEW: soft-fail state
      - saving                   # NEW: route save in progress
      - elevationExpanded        # NEW Phase 2: showing elevation chart
    notes: "Overview + wind advisory + highlights"

  S004:
    id: planning-error-sheet
    name: "PlanningErrorSheet"
    type: modalSheet
    phase: 1
    trdRef: "TRD §6.1 B.12"
    status: planned
    purpose: "Display planning failures with recovery options"
    components:
      - errorIcon
      - headline
      - bodyText
      - errorDetails
      - retryButton
      - adjustPreferencesButton
      - dismissButton
    states:
      - networkError             # Network/timeout failure
      - routingError             # No routes found
      - authError                # Session expired
      - llmSketchInvalid         # NEW: TRD error code
      - llmSketchAmbiguous       # NEW: TRD error code
      - routingCompileFailed     # NEW: TRD error code
      - conditionsLookupFailed   # NEW: TRD error code (soft-fail)
    errorCodes:
      NETWORK_ERROR: "Unable to connect. Check your connection."
      ROUTING_NOT_FOUND: "No routes found for these locations."
      LLM_SKETCH_INVALID: "Unable to plan this route. Try different locations."
      LLM_SKETCH_AMBIGUOUS: "Route intent unclear. Please be more specific."
      ROUTING_COMPILE_FAILED: "Route compilation failed. Try again."
      CONDITIONS_LOOKUP_FAILED: "Weather data unavailable. Route planned without conditions."

  S005:
    id: wind-legend-sheet
    name: "WindLegendSheet"
    type: modalSheet
    phase: 1
    trdRef: "TRD §6.1 B.13"
    status: implemented
    file: legacy/whind-legend.designs.html
    purpose: "Explain wind condition levels"
    components:
      - closeButton
      - legendRows
      - disclaimer
      - dismissButton
    states:
      - default
    legend:
      - level: low
        color: "slate-400"
        range: "0-15 mph"
        description: "Light breeze, comfortable riding"
      - level: moderate
        color: "slate-500"
        range: "15-25 mph"
        description: "Noticeable crosswinds, stay alert"
      - level: high
        color: "amber-700"
        range: "25+ mph"
        description: "Strong gusts, challenging conditions"

  S006:
    id: place-search-sheet
    name: "PlaceSearchSheet"
    type: bottomSheet
    phase: 1
    trdRef: "TRD §6.1 B.14"
    status: implemented
    file: legacy/placesearch.designs.html
    purpose: "Search for destinations with autocomplete"
    height: "85vh"
    components:
      - searchInput
      - recentSearchChips
      - searchResultsList
      - categoryIcons
    states:
      - empty                    # Initial state
      - typing                   # User entering query
      - results                  # Showing autocomplete
      - noResults                # No matches found
      - loading                  # Fetching results
    notes: "Full-height sheet covering most of screen"

  S007:
    id: annotation-detail-sheet
    name: "AnnotationDetailSheet"
    type: modalSheet
    phase: 1
    trdRef: "TRD §6.1 B.15"
    status: planned
    purpose: "Place or condition detail from map annotation"
    components:
      - closeButton
      - annotationIcon
      - headline
      - detailsList
      - actionButtons
    states:
      - placeAnnotation          # Location/landmark detail
      - conditionAnnotation      # Weather condition detail
    annotationKinds:
      place:
        fields: [name, category, address, coordinates]
      condition:
        fields: [type, severity, timeRange, description]
    notes: "Triggered by tapping map annotations"

  S008:
    id: rename-route-sheet
    name: "RenameRouteSheet"
    type: modalSheet
    phase: 1
    trdRef: "TRD §6.1 B.16"
    status: implemented
    file: legacy/renameroute.designs.html
    purpose: "Rename saved route (metadata only)"
    components:
      - headline
      - bodyText
      - textInput
      - clearButton
      - buttonGroup
    states:
      - default
      - editing
      - saving
      - error
    validation:
      - maxLength: 100
      - required: true

  S009:
    id: confirm-delete-route-sheet
    name: "ConfirmDeleteRouteSheet"
    type: modalSheet
    phase: 1
    trdRef: "TRD §6.1 B.17"
    status: implemented
    file: legacy/deleteroute.designs.html
    purpose: "Confirm permanent route deletion"
    components:
      - warningHeadline
      - warningCard
      - routePreview
      - destructiveButton
      - cancelButton
    states:
      - default
      - deleting
      - error
    notes: "Scrim backdrop with blur"

  # ============================================
  # SPRINT 5: Weather Overlay Sheets
  # ============================================

  S005a:
    id: rain-legend-sheet
    name: "RainLegendSheet"
    type: modalSheet
    phase: 1
    sprint: 5
    status: planned
    purpose: "Explain rain forecast levels"
    components:
      - closeButton
      - legendRows
      - timeDisclaimer
      - dismissButton
    states:
      - default
    legend:
      - level: none
        color: "transparent"
        range: "0-20%"
        description: "No rain expected"
      - level: light
        color: "blue-300"
        range: "20-50%"
        description: "Light rain possible"
      - level: moderate
        color: "blue-500"
        range: "50-70%"
        description: "Rain likely, pack gear"
      - level: heavy
        color: "blue-700"
        range: "70%+"
        description: "Heavy rain expected"

  S005b:
    id: temperature-legend-sheet
    name: "TemperatureLegendSheet"
    type: modalSheet
    phase: 1
    sprint: 5
    status: planned
    purpose: "Explain temperature ranges and comfort zones"
    components:
      - closeButton
      - temperatureGradient
      - comfortZones
      - unitToggle
      - dismissButton
    states:
      - fahrenheit
      - celsius
    comfortZones:
      - zone: cold
        range: "<50°F / <10°C"
        color: "blue-600"
        advice: "Layer up, heated gear recommended"
      - zone: cool
        range: "50-65°F / 10-18°C"
        color: "blue-300"
        advice: "Light jacket weather"
      - zone: comfortable
        range: "65-80°F / 18-27°C"
        color: "green-400"
        advice: "Ideal riding conditions"
      - zone: warm
        range: "80-95°F / 27-35°C"
        color: "orange-400"
        advice: "Stay hydrated, mesh gear"
      - zone: hot
        range: ">95°F / >35°C"
        color: "red-500"
        advice: "Extreme heat, limit exposure"

  # ============================================
  # PHASE 2: Personalization (TRD Phase 2 §5)
  # ============================================

  V011:
    id: preferences-screen
    name: "PreferencesScreen"
    type: screen
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "Manage default route generation preferences"
    components:
      - topAppBar
      - preferenceSection
      - scenicBiasDefault
      - toggleRows
      - avoidAreasLink
      - favoriteRoadsLink
      - unitPreferences
    states:
      - default
      - saving

  V012:
    id: avoid-areas-screen
    name: "AvoidAreasScreen"
    type: screen
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "Manage avoid areas with map drawing"
    components:
      - mapView
      - avoidAreaOverlay
      - avoidAreasList
      - drawingControls
      - fab
    states:
      - default
      - drawingMode
      - editing

  V013:
    id: favorite-roads-screen
    name: "FavoriteRoadsScreen"
    type: screen
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "Browse and manage favorite road segments"
    components:
      - topAppBar
      - searchInput
      - favoriteRoadCards
      - favoriteRoadSegment
      - emptyState
    states:
      - default
      - empty
      - searchActive

  S010:
    id: add-avoid-area-sheet
    name: "AddAvoidAreaSheet"
    type: bottomSheet
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "Define and name a new avoid area"
    components:
      - nameInput
      - reasonInput
      - boundsDisplay
      - mapPreview
      - saveButton
      - cancelButton
    states:
      - default
      - saving

  S011:
    id: add-favorite-road-sheet
    name: "AddFavoriteRoadSheet"
    type: bottomSheet
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "Save a road segment from a route"
    components:
      - roadPreview
      - nameInput
      - descriptionInput
      - tagsInput
      - sourceRouteDisplay
      - saveButton
    states:
      - default
      - saving

  S012:
    id: elevation-profile-sheet
    name: "ElevationProfileSheet"
    type: bottomSheet
    phase: 2
    trdRef: "TRD Phase 2 §5.1"
    status: planned
    purpose: "View elevation chart for a route"
    components:
      - elevationChart
      - statsSummary
      - legendRow
      - gradeIndicators
    states:
      - default
      - loading

  # ============================================
  # PHASE 3: Post-Ride (TRD Phase 3 §4)
  # ============================================

  V014:
    id: ride-history-screen
    name: "RideHistoryScreen"
    type: screen
    phase: 3
    trdRef: "TRD Phase 3 §4.1"
    status: planned
    purpose: "Browse completed rides grouped by month"
    components:
      - topAppBar
      - summaryStats
      - monthSections
      - rideHistoryCards
      - emptyState
    states:
      - default
      - empty
      - filtered

  S013:
    id: rate-route-sheet
    name: "RateRouteSheet"
    type: bottomSheet
    phase: 3
    trdRef: "TRD Phase 3 §4.1"
    status: planned
    purpose: "Rate and add notes to a completed ride"
    components:
      - routeSummary
      - starRating
      - notesInput
      - tagsPicker
      - saveButton
    states:
      - default
      - saving
    validation:
      stars: "1-5 required"
      notes: "max 2000 characters"
      tags: "max 10 tags"

  S014:
    id: departure-optimizer-sheet
    name: "DepartureOptimizerSheet"
    type: bottomSheet
    phase: 3
    trdRef: "TRD Phase 3 §4.1"
    status: planned
    purpose: "View optimal departure time windows"
    components:
      - dateSelector
      - windowsList
      - optimalWindowCard
      - weatherSummary
      - selectButton
    states:
      - default
      - loading
      - unavailable
    windowCard:
      fields: [startTime, endTime, score, reasons, warnings]

  S015:
    id: ride-detail-sheet
    name: "RideDetailSheet"
    type: bottomSheet
    phase: 3
    trdRef: "TRD Phase 3 §4.1"
    status: planned
    purpose: "View historical ride details"
    components:
      - routeSnapshot
      - conditionsSnapshot
      - ratingDisplay
      - notesDisplay
      - tagsDisplay
      - viewRouteButton
    states:
      - default

# ============================================
# Component Reference (Updated for Sprint 5)
# ============================================

components:
  buttons:
    primary:
      height: "48-56px"
      background: intent.primary
      radius: xl
      shadow: primaryAction
    secondary:
      height: "48px"
      background: transparent
      border: "1px solid surface.divider"
      radius: xl
    destructive:
      height: "48-56px"
      background: status.error
      radius: xl
      shadow: errorAction
    icon:
      size: "40-48px"
      background: surface.elevated
      radius: full
    fab:
      height: "56px"
      background: intent.primary
      shadow: buttonGlow
      radius: xl

  inputs:
    text:
      height: "48-56px"
      background: input-bg
      radius: xl
      padding: "14px 16px"
    search:
      extends: text
      leadingIcon: search
    location:
      extends: text
      timeline: true
      trailingIcon: near_me

  cards:
    routeOptionSelected:
      background: surface.elevated
      border: "2px solid intent.primary"
      radius: xl
      checkIcon: true
    routeOptionUnselected:
      background: surface.elevated
      border: "1px solid white/5"
      radius: xl
    routeOptionCompact:
      description: "Compact card for side-by-side comparison"
      background: surface.elevated
      border: "1px solid white/5"
      radius: lg
      height: "compact"
    savedRoute:
      background: surface.elevated
      border: "1px solid white/5"
      radius: xl
      thumbnail: "96x96px"

  overlays:
    wind:
      description: "Wind exposure overlay on route"
      segmentHeight: "4px"
      levels:
        low: "slate-400"
        moderate: "slate-500"
        high: "amber-700"
    rain:
      description: "Rain probability overlay on route"
      segmentHeight: "4px"
      levels:
        none: "transparent"
        light: "blue-300"
        moderate: "blue-500"
        heavy: "blue-700"
    temperature:
      description: "Temperature gradient overlay on route"
      segmentHeight: "4px"
      gradient: "blue-600 to red-500"
      comfortZone: "green-400"

  badges:
    routeBadge:
      padding: "4px 8px"
      radius: md
      variants:
        primary: "bg-primary/20 text-primary ring-1 ring-primary/30"
        neutral: "bg-white/5 text-gray-400 ring-1 ring-white/10"
        warning: "bg-red-900/30 text-red-400 border border-red-900/50"
    conditionPill:
      padding: "6px 12px"
      radius: full
      background: "surface.elevated"
      border: "1px solid white/5"
    statusBadge:
      padding: "4px 8px"
      radius: md
      variants:
        planned: "bg-blue-900/30 text-blue-400"
        completed: "bg-green-900/30 text-green-400"
        cancelled: "bg-gray-900/30 text-gray-400"
    weatherSummaryPill:
      description: "Condensed multi-condition indicator"
      padding: "6px 12px"
      radius: full
      layout: "icon + short label"
      variants:
        favorable: "bg-green-900/30 text-green-400"
        caution: "bg-amber-900/30 text-amber-400"
        adverse: "bg-red-900/30 text-red-400"

  toggles:
    segmentedControl:
      container: "p-1 bg-input-bg rounded-xl"
      segment: "flex-1 py-2.5 px-4"
      active: "bg-primary text-white"
      inactive: "bg-transparent text-muted"
    overlayToggleGroup:
      description: "Multi-overlay selector (wind/rain/temp)"
      container: "flex gap-2"
      option: "px-3 py-1.5 rounded-full"
      active: "bg-primary/20 text-primary ring-1 ring-primary/30"
      inactive: "bg-white/5 text-muted"
    comparisonToggle:
      description: "List vs side-by-side view toggle"
      container: "flex gap-1 p-1 bg-surface-elevated rounded-lg"
      option: "p-2 rounded-md"
      icons: ["view_list", "view_column"]

  sheets:
    bottomPartial:
      background: surface.secondary
      radiusTop: xxl
      shadow: sheetShadow
      maxHeight: "65-85vh"
    modal:
      extends: bottomPartial
      scrim: true
      centered: bottom
    fullHeight:
      extends: bottomPartial
      height: "85vh"

  notices:
    conditionsUnavailable:
      description: "Advisory banner for soft-fail conditions"
      background: "amber-900/20"
      border: "1px solid amber-700/30"
      radius: lg
      icon: "warning"
      text: "Weather data unavailable for this route"

