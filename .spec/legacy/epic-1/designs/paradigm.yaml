# LaneShadow Design Paradigm
# Visual design system extracted from legacy mockups
# Generated: 2026-01-29

meta:
  version: "1.0"
  theme: dark-first
  aesthetic: industrial-warm
  framework: tailwind

colors:
  # Surface & Background
  surface:
    primary: "#0E0F11"          # Main background, deep charcoal
    secondary: "#1A1C1F"        # Bottom sheets, secondary containers
    elevated: "#24272B"         # Cards, input fields, elevated panels
    divider: "rgba(255,255,255,0.08)"
    sheetScrim: "rgba(0,0,0,0.55)"
    warmDark: "#1f1913"         # Warm-tinted dark background
    warmElevated: "#25211e"     # Warm elevated surfaces
    inputBg: "#36302b"          # Input field backgrounds

  # Typography
  text:
    primary: "rgba(255,255,255,0.92)"    # High emphasis
    secondary: "rgba(255,255,255,0.72)"  # Medium emphasis
    muted: "rgba(255,255,255,0.55)"      # Placeholders, disabled
    inverse: "#0E0F11"                    # Dark text on light bg

  # Intent & Brand
  intent:
    primary: "#B87333"          # Copper - main brand color
    primaryPressed: "#8C5A2B"   # Active state
    secondary: "rgba(255,255,255,0.12)"

  # Route & Status
  route:
    selected: "#B87333"         # Active route (copper)
    alternate: "rgba(255,255,255,0.45)"

  status:
    error: "#E35D6A"
    warning: "#D98E04"

  # Wind Legend
  wind:
    low: "slate-400"            # 0-15 mph
    moderate: "slate-500"       # 15-25 mph
    high: "amber-700"           # 25+ mph

typography:
  families:
    display: "Space Grotesk"    # Headers, branding, headlines
    body: "Inter"               # Functional text, labels
    fallback: "Noto Sans"

  scale:
    xxl:
      size: "32px"
      weight: 600
      family: display
    xl:
      size: "24px"
      weight: 600
      family: display
    lg:
      size: "20px"
      weight: 600
      family: body
    md:
      size: "16px"
      weight: 400
      family: body
    sm:
      size: "14px"
      weight: 500
      family: body
    xs:
      size: "12px"
      weight: 400
      family: body
    xxs:
      size: "10px"
      weight: 600
      family: body
      transform: uppercase
      tracking: wider

  styles:
    headline:
      weight: bold
      tracking: tight
    label:
      transform: uppercase
      tracking: wider
    body:
      weight: normal
      lineHeight: relaxed
    meta:
      size: xxs
      transform: uppercase
      tracking: widest

spacing:
  xs: "6px"
  sm: "8px"
  md: "12px"
  lg: "20px"
  xl: "24px"
  xxl: "32px"

  patterns:
    sheetPadding: "24px"        # px-6 py-6
    cardPadding: "16px"         # p-4
    inputPadding: "14px 16px"   # py-3.5 px-4
    buttonHeight: "48px"        # h-12
    buttonHeightLg: "56px"      # h-14
    iconButtonSize: "40px"      # size-10

radius:
  sm: "8px"                     # Small controls, pills
  md: "12px"                    # Buttons, inputs
  lg: "16px"                    # Cards, overlays
  xl: "20px"                    # Bottom sheet corners
  xxl: "32px"                   # Large sheets
  full: "9999px"                # Pills, circular buttons

shadows:
  buttonGlow: "0 8px 16px rgba(184,115,50,0.4)"
  cardShadow: "shadow-lg"
  sheetShadow: "0 -8px 30px rgba(0,0,0,0.5)"
  primaryAction: "shadow-lg shadow-orange-900/20"
  errorAction: "shadow-lg shadow-red-900/20"

motion:
  duration:
    short: "140ms"              # Quick feedback
    medium: "220ms"             # Standard transitions
  easing: "ease-out"
  feedback:
    pressScale: "scale(0.98)"
    hoverScale: "scale(1.10)"
  transition: "transition-all"

iconography:
  system: "Google Material Symbols"
  style: "Outlined"
  settings:
    fill: 1
    weight: 400
    grade: 0
    opticalSize: 24
  sizes: [14, 16, 18, 20, 24, 26, 28]

  common:
    navigation:
      - map
      - bookmark
      - two_wheeler
      - person
      - explore
      - navigation
      - my_location
      - layers
      - search
      - arrow_back
      - settings
      - menu
    actions:
      - add
      - remove
      - swap_vert
      - near_me
      - delete
      - check_circle
      - chevron_right
      - close
      - cancel
    status:
      - air
      - warning
      - info
      - history
    route:
      - landscape
      - straight
      - add_road
      - toll
      - distance
      - schedule
      - route

patterns:
  visual:
    - name: "Dark Mode First"
      description: "All designs dark-themed with warm undertones"
    - name: "Industrial Aesthetic"
      description: "Muted colors, functional typography, utilitarian feel"
    - name: "Copper Accent"
      description: "Primary brand color used sparingly for CTAs and highlights"
    - name: "Glassmorphism"
      description: "Backdrop blur on overlays and floating controls"
    - name: "Depth Through Layers"
      description: "Multiple z-index levels (map < controls < sheets < modals)"

  interaction:
    - name: "Bottom Sheet Navigation"
      description: "Primary interaction model for mobile"
    - name: "Progressive Disclosure"
      description: "Collapsed cards expand on selection"
    - name: "Touch Feedback"
      description: "Scale transforms on active state"
    - name: "Swipe Gestures"
      description: "Drag handles on sheets"

  accessibility:
    - name: "Screen Reader Support"
      description: "sr-only labels for form inputs"
    - name: "Color Contrast"
      description: "High contrast text on dark backgrounds"
    - name: "Touch Targets"
      description: "Minimum 40px for interactive elements"
    - name: "Focus States"
      description: "Ring indicators for keyboard navigation"
