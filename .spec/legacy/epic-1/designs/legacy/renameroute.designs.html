<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rename Route Sheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d97212",
                        "background-light": "#f8f7f6",
                        "background-dark": "#181411", /* Adjusted to match the provided component snippets more closely while respecting theme rules */
                        "surface-dark": "#221910",
                        "input-bg": "#393028",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #54473b;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-900 font-display">
<!-- Background overlay simulation (Dimmed map background) -->
<div class="fixed inset-0 w-full h-full overflow-hidden bg-black/60 backdrop-blur-sm z-0">
<!-- Abstract map representation as background -->
<div class="absolute inset-0 opacity-20 bg-center bg-cover" data-alt="Dark abstract map texture showing roads and terrain" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCL_l9U0s0oBcjtoY_qI6qR4e4r1JgXBsPgR6BOrdpCaXSQsMAYqWZ8LkvNyR-6t5l1Hhs1iLixtwJPY-wsRKklck4q3lY5g5PVUIWcBscgofTmrRptx6b1c5vU2UJ0uPGk8cDMuGWPj1wjwXpAePDQJuQbbU2wpwVL3l-EZF-cOB1HZRc-4Ybji5XNQywXU8KJemtKWTib-nS4CVMOCrespNtN5-H2F00tK1wl0esj6UJI_YZbBJQUwhf_JK3pC6bIiVh5YreUJNA');">
</div>
</div>
<!-- Bottom Sheet Container -->
<div class="fixed bottom-0 left-0 w-full h-auto z-10 flex flex-col justify-end">
<!-- Sheet Content -->
<div class="relative w-full bg-background-light dark:bg-background-dark rounded-t-xl shadow-2xl overflow-hidden flex flex-col max-w-md mx-auto ring-1 ring-white/10">
<!-- BottomSheetHandle -->
<div class="flex flex-col items-center pt-3 pb-2 w-full">
<div class="h-1.5 w-12 rounded-full bg-neutral-300 dark:bg-[#54473b]"></div>
</div>
<!-- Content Wrapper -->
<div class="px-6 pb-8 pt-2 flex flex-col gap-6">
<!-- Text Group -->
<div class="flex flex-col gap-1">
<!-- HeadlineText -->
<h2 class="text-neutral-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight text-left">
                        Rename route
                    </h2>
<!-- BodyText -->
<p class="text-neutral-500 dark:text-[#b9aa9d] text-base font-normal leading-normal">
                        Give your route a memorable name.
                    </p>
</div>
<!-- TextField -->
<div class="flex flex-col gap-2">
<label class="sr-only" for="route-name">Route Name</label>
<div class="group flex w-full items-center rounded-xl bg-white dark:bg-[#2A231D] ring-1 ring-neutral-200 dark:ring-[#393028] focus-within:ring-2 focus-within:ring-primary transition-all duration-200">
<input autofocus="" class="flex-1 w-full bg-transparent border-none py-4 pl-4 pr-2 text-base text-neutral-900 dark:text-white placeholder:text-neutral-400 dark:placeholder:text-[#b9aa9d] focus:ring-0 focus:outline-none rounded-l-xl font-medium" id="route-name" type="text" value="Front Range Sweep"/>
<button aria-label="Clear text" class="p-4 text-neutral-400 dark:text-[#b9aa9d] hover:text-neutral-600 dark:hover:text-white transition-colors focus:outline-none">
<span class="material-symbols-outlined text-[24px]">cancel</span>
</button>
</div>
</div>
<!-- ButtonGroup -->
<div class="grid grid-cols-2 gap-4 mt-2">
<!-- Cancel Button (Secondary) -->
<button class="flex items-center justify-center rounded-xl h-12 px-6 bg-transparent border border-neutral-300 dark:border-[#393028] text-neutral-900 dark:text-white text-sm font-bold tracking-wide hover:bg-neutral-100 dark:hover:bg-[#2A231D] transition-colors">
                        Cancel
                    </button>
<!-- Save Button (Primary) -->
<button class="flex items-center justify-center rounded-xl h-12 px-6 bg-primary text-white text-sm font-bold tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
                        Save
                    </button>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-6 w-full"></div>
</div>
</div>
</div>
</body></html>
