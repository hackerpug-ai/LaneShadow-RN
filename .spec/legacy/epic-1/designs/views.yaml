# LaneShadow Views (Mobile App)
# Platform: mobile-app
# Device Targets: ["mobile"]
# Generated from screens.yaml for design-prompt-json compatibility

meta:
  version: "1.0"
  platform: "mobile-app"
  device_targets: ["mobile"]
  viewport:
    mobile: "390x844"
  totalViews: 40  # 25 screens + 15 sheets

views:
  # ============================================
  # PHASE 1: Core Views
  # ============================================

  home_map:
    id: V001
    name: "Home Map"
    description: "Map-first shell that hosts planning + route rendering"
    phase: 1
    trdRef: "TRD 6.1 A.1"
    responsive:
      mobile:
        layout: full_screen_map
        components:
          - mapBackground
          - topAppBar
          - searchBar
          - mapControls
          - fabPlanRide
          - bottomNavigation
        information_hierarchy:
          - primary: map_view
          - secondary: search_bar
          - tertiary: navigation_controls

  saved_routes_list:
    id: V002
    name: "Saved Routes List"
    description: "List of saved routes summary view"
    phase: 1
    trdRef: "TRD 6.1 A.2"
    responsive:
      mobile:
        layout: list_with_header
        components:
          - topAppBar
          - searchInput
          - savedRouteCard
          - fab
          - bottomNavigation
        information_hierarchy:
          - primary: route_cards
          - secondary: search_filter
          - tertiary: add_action

  saved_route_detail:
    id: V003
    name: "Saved Route Detail"
    description: "Saved route replay with immutable snapshot"
    phase: 1
    trdRef: "TRD 6.1 A.3"
    responsive:
      mobile:
        layout: map_with_sheet
        components:
          - mapView
          - routeOverviewSheet
          - actionButtons
        information_hierarchy:
          - primary: route_on_map
          - secondary: route_details
          - tertiary: actions

  route_planner_loading:
    id: V004
    name: "Route Planner Loading"
    description: "Progress overlay during route planning"
    phase: 1
    trdRef: "TRD 6.1 B.18"
    responsive:
      mobile:
        layout: centered_overlay
        components:
          - loadingSpinner
          - statusText
          - cancelButton
          - progressIndicator
        information_hierarchy:
          - primary: progress_status
          - secondary: cancel_option

  empty_state:
    id: V005
    name: "Empty State"
    description: "Reusable empty state screen"
    phase: 1
    trdRef: "TRD 6.1 A.19"
    responsive:
      mobile:
        layout: centered_content
        components:
          - illustration
          - headline
          - bodyText
          - primaryAction
        information_hierarchy:
          - primary: message
          - secondary: action

  settings:
    id: V006
    name: "Settings"
    description: "Minimal POC settings screen"
    phase: 1
    trdRef: "TRD 6.1 A.4"
    responsive:
      mobile:
        layout: list_sections
        components:
          - topAppBar
          - settingsSection
          - settingsRow
          - unitToggle
          - signOutButton
        information_hierarchy:
          - primary: settings_options
          - secondary: account_actions

  legal_about:
    id: V007
    name: "Legal About"
    description: "About and legal information"
    phase: 1
    trdRef: "TRD 6.1 A.5"
    responsive:
      mobile:
        layout: list_sections
        components:
          - topAppBar
          - appInfo
          - legalLinks
        information_hierarchy:
          - primary: app_info
          - secondary: legal_links

  auth_sign_in:
    id: V008
    name: "Auth Sign In"
    description: "User sign-in via social or email/password"
    phase: 1
    trdRef: "TRD 6.1 A.6"
    responsive:
      mobile:
        layout: centered_form
        components:
          - brandHeader
          - socialAuthButtons
          - divider
          - emailPasswordForm
          - primaryButton
          - forgotPasswordLink
        information_hierarchy:
          - primary: social_auth
          - secondary: email_form
          - tertiary: help_links

  auth_sign_up:
    id: V009
    name: "Auth Sign Up"
    description: "User registration via social or email/password"
    phase: 1
    trdRef: "TRD 6.1 A.7"
    responsive:
      mobile:
        layout: centered_form
        components:
          - brandHeader
          - socialAuthButtons
          - divider
          - emailPasswordForm
          - confirmPasswordInput
          - termsCheckbox
        information_hierarchy:
          - primary: social_auth
          - secondary: registration_form
          - tertiary: terms

  session_restoring:
    id: V010
    name: "Session Restoring"
    description: "Startup session loading state"
    phase: 1
    trdRef: "TRD 6.1 A.8"
    responsive:
      mobile:
        layout: centered_content
        components:
          - appLogo
          - loadingSpinner
          - statusText
        information_hierarchy:
          - primary: branding
          - secondary: loading_status

  # ============================================
  # PHASE 1: Sheets (as views)
  # ============================================

  plan_ride_sheet:
    id: S001
    name: "Plan Ride Sheet"
    description: "Start/end input and route preferences"
    phase: 1
    type: bottomSheet
    trdRef: "TRD 6.1 B.9"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "65vh"
        components:
          - dragHandle
          - routeTimeline
          - locationInputOrigin
          - locationInputDestination
          - scenicBiasToggle
          - preferenceToggles
          - primaryButton
        information_hierarchy:
          - primary: location_inputs
          - secondary: preferences
          - tertiary: submit_action

  route_options_sheet:
    id: S002
    name: "Route Options Sheet"
    description: "Compare 2-3 route alternatives"
    phase: 1
    type: bottomSheet
    trdRef: "TRD 6.1 B.10"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "65vh"
        components:
          - destinationHeader
          - routeOptionCards
          - overlayToggleGroup
          - mapControls
        information_hierarchy:
          - primary: route_cards
          - secondary: overlay_controls
          - tertiary: map_preview

  route_overview_sheet:
    id: S003
    name: "Route Overview Sheet"
    description: "Route details, overlays, and save action"
    phase: 1
    type: bottomSheet
    trdRef: "TRD 6.1 B.11"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "75vh"
        components:
          - routeHeader
          - statsRow
          - conditionPill
          - legList
          - windBarVisualization
          - actionButtons
          - legendLinks
        information_hierarchy:
          - primary: route_stats
          - secondary: conditions
          - tertiary: actions

  planning_error_sheet:
    id: S004
    name: "Planning Error Sheet"
    description: "Display planning failures with recovery options"
    phase: 1
    type: modalSheet
    trdRef: "TRD 6.1 B.12"
    responsive:
      mobile:
        layout: modal_centered
        components:
          - errorIcon
          - headline
          - bodyText
          - errorDetails
          - retryButton
          - adjustPreferencesButton
        information_hierarchy:
          - primary: error_message
          - secondary: recovery_options

  wind_legend_sheet:
    id: S005
    name: "Wind Legend Sheet"
    description: "Explain wind condition levels"
    phase: 1
    type: modalSheet
    trdRef: "TRD 6.1 B.13"
    responsive:
      mobile:
        layout: modal_centered
        components:
          - closeButton
          - legendRows
          - disclaimer
          - dismissButton
        information_hierarchy:
          - primary: legend_levels
          - secondary: disclaimer

  rain_legend_sheet:
    id: S005a
    name: "Rain Legend Sheet"
    description: "Explain rain forecast levels"
    phase: 1
    sprint: 5
    type: modalSheet
    responsive:
      mobile:
        layout: modal_centered
        components:
          - closeButton
          - legendRows
          - timeDisclaimer
          - dismissButton
        information_hierarchy:
          - primary: legend_levels
          - secondary: disclaimer

  temperature_legend_sheet:
    id: S005b
    name: "Temperature Legend Sheet"
    description: "Explain temperature ranges and comfort zones"
    phase: 1
    sprint: 5
    type: modalSheet
    responsive:
      mobile:
        layout: modal_centered
        components:
          - closeButton
          - temperatureGradient
          - comfortZones
          - unitToggle
        information_hierarchy:
          - primary: temperature_scale
          - secondary: comfort_zones

  place_search_sheet:
    id: S006
    name: "Place Search Sheet"
    description: "Search for destinations with autocomplete"
    phase: 1
    type: bottomSheet
    trdRef: "TRD 6.1 B.14"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "85vh"
        components:
          - searchInput
          - recentSearchChips
          - searchResultsList
          - categoryIcons
        information_hierarchy:
          - primary: search_input
          - secondary: results_list
          - tertiary: recent_searches

  annotation_detail_sheet:
    id: S007
    name: "Annotation Detail Sheet"
    description: "Place or condition detail from map annotation"
    phase: 1
    type: modalSheet
    trdRef: "TRD 6.1 B.15"
    responsive:
      mobile:
        layout: modal_centered
        components:
          - closeButton
          - annotationIcon
          - headline
          - detailsList
          - actionButtons
        information_hierarchy:
          - primary: annotation_info
          - secondary: actions

  rename_route_sheet:
    id: S008
    name: "Rename Route Sheet"
    description: "Rename saved route metadata only"
    phase: 1
    type: modalSheet
    trdRef: "TRD 6.1 B.16"
    responsive:
      mobile:
        layout: modal_centered
        components:
          - headline
          - bodyText
          - textInput
          - clearButton
          - buttonGroup
        information_hierarchy:
          - primary: input_field
          - secondary: actions

  confirm_delete_route_sheet:
    id: S009
    name: "Confirm Delete Route Sheet"
    description: "Confirm permanent route deletion"
    phase: 1
    type: modalSheet
    trdRef: "TRD 6.1 B.17"
    responsive:
      mobile:
        layout: modal_centered
        components:
          - warningHeadline
          - warningCard
          - routePreview
          - destructiveButton
          - cancelButton
        information_hierarchy:
          - primary: warning_message
          - secondary: route_info
          - tertiary: actions

  # ============================================
  # PHASE 2: Personalization Views
  # ============================================

  preferences_screen:
    id: V011
    name: "Preferences Screen"
    description: "Manage default route generation preferences"
    phase: 2
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: list_sections
        components:
          - topAppBar
          - preferenceSection
          - scenicBiasDefault
          - toggleRows
          - avoidAreasLink
          - favoriteRoadsLink
        information_hierarchy:
          - primary: preference_toggles
          - secondary: navigation_links

  avoid_areas_screen:
    id: V012
    name: "Avoid Areas Screen"
    description: "Manage avoid areas with map drawing"
    phase: 2
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: map_with_controls
        components:
          - mapView
          - avoidAreaOverlay
          - avoidAreasList
          - drawingControls
          - fab
        information_hierarchy:
          - primary: map_with_areas
          - secondary: area_list
          - tertiary: add_action

  favorite_roads_screen:
    id: V013
    name: "Favorite Roads Screen"
    description: "Browse and manage favorite road segments"
    phase: 2
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: list_with_header
        components:
          - topAppBar
          - searchInput
          - favoriteRoadCards
          - emptyState
        information_hierarchy:
          - primary: road_cards
          - secondary: search_filter

  add_avoid_area_sheet:
    id: S010
    name: "Add Avoid Area Sheet"
    description: "Define and name a new avoid area"
    phase: 2
    type: bottomSheet
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "50vh"
        components:
          - nameInput
          - reasonInput
          - boundsDisplay
          - mapPreview
          - saveButton
        information_hierarchy:
          - primary: form_inputs
          - secondary: preview
          - tertiary: save_action

  add_favorite_road_sheet:
    id: S011
    name: "Add Favorite Road Sheet"
    description: "Save a road segment from a route"
    phase: 2
    type: bottomSheet
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "60vh"
        components:
          - roadPreview
          - nameInput
          - descriptionInput
          - tagsInput
          - saveButton
        information_hierarchy:
          - primary: road_preview
          - secondary: form_inputs
          - tertiary: save_action

  elevation_profile_sheet:
    id: S012
    name: "Elevation Profile Sheet"
    description: "View elevation chart for a route"
    phase: 2
    type: bottomSheet
    trdRef: "TRD Phase 2 5.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "40vh"
        components:
          - elevationChart
          - statsSummary
          - legendRow
          - gradeIndicators
        information_hierarchy:
          - primary: elevation_chart
          - secondary: stats_summary

  # ============================================
  # PHASE 3: Post-Ride Views
  # ============================================

  ride_history_screen:
    id: V014
    name: "Ride History Screen"
    description: "Browse completed rides grouped by month"
    phase: 3
    trdRef: "TRD Phase 3 4.1"
    responsive:
      mobile:
        layout: list_with_header
        components:
          - topAppBar
          - summaryStats
          - monthSections
          - rideHistoryCards
          - emptyState
        information_hierarchy:
          - primary: ride_cards
          - secondary: summary_stats
          - tertiary: month_grouping

  rate_route_sheet:
    id: S013
    name: "Rate Route Sheet"
    description: "Rate and add notes to a completed ride"
    phase: 3
    type: bottomSheet
    trdRef: "TRD Phase 3 4.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "60vh"
        components:
          - routeSummary
          - starRating
          - notesInput
          - tagsPicker
          - saveButton
        information_hierarchy:
          - primary: star_rating
          - secondary: notes_input
          - tertiary: save_action

  departure_optimizer_sheet:
    id: S014
    name: "Departure Optimizer Sheet"
    description: "View optimal departure time windows"
    phase: 3
    type: bottomSheet
    trdRef: "TRD Phase 3 4.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "70vh"
        components:
          - dateSelector
          - windowsList
          - optimalWindowCard
          - weatherSummary
          - selectButton
        information_hierarchy:
          - primary: optimal_window
          - secondary: window_list
          - tertiary: select_action

  ride_detail_sheet:
    id: S015
    name: "Ride Detail Sheet"
    description: "View historical ride details"
    phase: 3
    type: bottomSheet
    trdRef: "TRD Phase 3 4.1"
    responsive:
      mobile:
        layout: bottom_sheet
        height: "70vh"
        components:
          - routeSnapshot
          - conditionsSnapshot
          - ratingDisplay
          - notesDisplay
          - viewRouteButton
        information_hierarchy:
          - primary: route_info
          - secondary: conditions_rating
          - tertiary: view_action
