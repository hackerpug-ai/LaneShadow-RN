<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Wind Legend - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
      --wind-low: #94a3b8;
      --wind-moderate: #64748b;
      --wind-high: #b45309;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Scrim */
    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    /* Modal */
    .modal {
      position: relative;
      width: calc(100% - 48px);
      background: var(--bg-secondary);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .close-btn {
      color: var(--text-muted);
    }

    /* Legend Content */
    .legend-content {
      padding: 0 24px 24px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .color-indicator {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .legend-details {
      flex: 1;
    }

    .legend-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .legend-level {
      font-size: 16px;
      font-weight: 600;
    }

    .legend-range {
      font-size: 14px;
      color: var(--text-muted);
    }

    .legend-description {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Disclaimer */
    .disclaimer {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
      margin-top: 8px;
    }

    .disclaimer-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Action */
    .modal-action {
      padding: 24px;
    }

    .primary-btn {
      width: 100%;
      height: 48px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Wind Conditions</h2>
      <span class="material-symbols-outlined close-btn">close</span>
    </div>

    <div class="legend-content">
      <div class="legend-row">
        <div class="color-indicator" style="background: var(--wind-low)"></div>
        <div class="legend-details">
          <div class="legend-header">
            <span class="legend-level">Low</span>
            <span class="legend-range">0-15 mph</span>
          </div>
          <div class="legend-description">Light breeze, comfortable riding</div>
        </div>
      </div>

      <div class="legend-row">
        <div class="color-indicator" style="background: var(--wind-moderate)"></div>
        <div class="legend-details">
          <div class="legend-header">
            <span class="legend-level">Moderate</span>
            <span class="legend-range">15-25 mph</span>
          </div>
          <div class="legend-description">Noticeable crosswinds, stay alert</div>
        </div>
      </div>

      <div class="legend-row">
        <div class="color-indicator" style="background: var(--wind-high)"></div>
        <div class="legend-details">
          <div class="legend-header">
            <span class="legend-level">High</span>
            <span class="legend-range">25+ mph</span>
          </div>
          <div class="legend-description">Strong gusts, challenging conditions</div>
        </div>
      </div>

      <div class="disclaimer">
        <p class="disclaimer-text">Wind conditions are based on forecasts and may vary. Always use your judgment and ride within your comfort level.</p>
      </div>
    </div>

    <div class="modal-action">
      <button class="primary-btn">Got it</button>
    </div>
  </div>
</body>
</html>
