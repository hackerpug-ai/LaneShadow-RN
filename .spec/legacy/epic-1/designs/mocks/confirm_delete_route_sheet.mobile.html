<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Delete Route - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --error: #E35D6A;
      --error-15: rgba(227,93,106,0.15);
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    .modal {
      position: relative;
      width: calc(100% - 48px);
      background: var(--bg-secondary);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .modal-header {
      padding: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-content {
      padding: 0 24px;
    }

    /* Warning Card */
    .warning-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px;
      background: var(--error-15);
      border: 1px solid rgba(227,93,106,0.3);
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .warning-card .material-symbols-outlined {
      color: var(--error);
      font-size: 24px;
      flex-shrink: 0;
    }

    .warning-text {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Route Preview */
    .route-preview {
      display: flex;
      gap: 12px;
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
    }

    .preview-thumbnail {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
      border-radius: 8px;
      position: relative;
    }

    .thumbnail-route {
      position: absolute;
      top: 12px;
      left: 8px;
      width: 40px;
      height: 32px;
      border: 2px solid var(--primary);
      border-radius: 6px;
      border-bottom: none;
      border-right: none;
      transform: rotate(-10deg);
    }

    .preview-details {
      flex: 1;
    }

    .preview-name {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .preview-meta {
      font-size: 14px;
      color: var(--text-muted);
    }

    .modal-actions {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .destructive-btn {
      width: 100%;
      height: 56px;
      background: var(--error);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(227,93,106,0.3);
      cursor: pointer;
    }

    .destructive-btn .material-symbols-outlined {
      font-size: 20px;
    }

    .text-btn {
      width: 100%;
      height: 48px;
      background: none;
      border: none;
      font-size: 16px;
      color: var(--text-muted);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Delete Route?</h2>
    </div>

    <div class="modal-content">
      <div class="warning-card">
        <span class="material-symbols-outlined">warning</span>
        <p class="warning-text">This action cannot be undone. The route and all its data will be permanently deleted.</p>
      </div>

      <div class="route-preview">
        <div class="preview-thumbnail">
          <div class="thumbnail-route"></div>
        </div>
        <div class="preview-details">
          <div class="preview-name">Scenic Coast Route</div>
          <div class="preview-meta">87 mi &bull; 2h 15m</div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="destructive-btn">
        <span class="material-symbols-outlined">delete</span>
        Delete Route
      </button>
      <button class="text-btn">Cancel</button>
    </div>
  </div>
</body>
</html>
