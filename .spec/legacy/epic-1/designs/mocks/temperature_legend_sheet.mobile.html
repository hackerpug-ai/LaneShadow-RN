<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Temperature Guide - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    .modal {
      position: relative;
      width: calc(100% - 48px);
      background: var(--bg-secondary);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 10;
      max-height: 80%;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .close-btn .material-symbols-outlined {
      font-size: 24px;
      color: var(--text-muted);
    }

    .unit-toggle {
      display: flex;
      background: var(--input-bg);
      border-radius: 8px;
      padding: 2px;
    }

    .unit-option {
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border: none;
      background: none;
      cursor: pointer;
    }

    .unit-option.active {
      background: var(--primary);
      color: var(--text-primary);
    }

    .modal-content {
      padding: 0 24px 24px;
    }

    .gradient-bar {
      height: 24px;
      border-radius: 12px;
      background: linear-gradient(90deg, #2563eb, #93c5fd, #4ade80, #fb923c, #ef4444);
      margin-bottom: 8px;
    }

    .gradient-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .comfort-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .comfort-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-elevated);
      border-radius: 12px;
    }

    .comfort-row.highlight {
      border: 1px solid rgba(74,222,128,0.3);
      background: rgba(74,222,128,0.1);
    }

    .comfort-indicator {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .comfort-indicator.cold {
      background: rgba(37,99,235,0.2);
    }
    .comfort-indicator.cold .material-symbols-outlined { color: #2563eb; }

    .comfort-indicator.cool {
      background: rgba(147,197,253,0.2);
    }
    .comfort-indicator.cool .material-symbols-outlined { color: #93c5fd; }

    .comfort-indicator.comfortable {
      background: rgba(74,222,128,0.2);
    }
    .comfort-indicator.comfortable .material-symbols-outlined { color: #4ade80; }

    .comfort-indicator.warm {
      background: rgba(251,146,60,0.2);
    }
    .comfort-indicator.warm .material-symbols-outlined { color: #fb923c; }

    .comfort-indicator.hot {
      background: rgba(239,68,68,0.2);
    }
    .comfort-indicator.hot .material-symbols-outlined { color: #ef4444; }

    .comfort-indicator .material-symbols-outlined {
      font-size: 20px;
    }

    .comfort-details {
      flex: 1;
    }

    .comfort-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .zone-name {
      font-size: 16px;
      font-weight: 500;
    }

    .temp-range {
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .comfort-advice {
      font-size: 14px;
      color: var(--text-muted);
    }

    .modal-actions {
      padding: 24px;
    }

    .primary-btn {
      width: 100%;
      height: 48px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="modal">
    <div class="modal-header">
      <div class="header-top">
        <h2 class="modal-title">Temperature Guide</h2>
        <button class="close-btn">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="unit-toggle">
        <button class="unit-option active">°F</button>
        <button class="unit-option">°C</button>
      </div>
    </div>

    <div class="modal-content">
      <div class="gradient-bar"></div>
      <div class="gradient-labels">
        <span>Cold</span>
        <span>Hot</span>
      </div>

      <div class="comfort-list">
        <div class="comfort-row">
          <div class="comfort-indicator cold">
            <span class="material-symbols-outlined">ac_unit</span>
          </div>
          <div class="comfort-details">
            <div class="comfort-header">
              <span class="zone-name">Cold</span>
              <span class="temp-range">&lt;50°F</span>
            </div>
            <p class="comfort-advice">Layer up, heated gear recommended</p>
          </div>
        </div>

        <div class="comfort-row">
          <div class="comfort-indicator cool">
            <span class="material-symbols-outlined">thermostat</span>
          </div>
          <div class="comfort-details">
            <div class="comfort-header">
              <span class="zone-name">Cool</span>
              <span class="temp-range">50-65°F</span>
            </div>
            <p class="comfort-advice">Light jacket weather</p>
          </div>
        </div>

        <div class="comfort-row highlight">
          <div class="comfort-indicator comfortable">
            <span class="material-symbols-outlined">sentiment_satisfied</span>
          </div>
          <div class="comfort-details">
            <div class="comfort-header">
              <span class="zone-name">Comfortable</span>
              <span class="temp-range">65-80°F</span>
            </div>
            <p class="comfort-advice">Ideal riding conditions</p>
          </div>
        </div>

        <div class="comfort-row">
          <div class="comfort-indicator warm">
            <span class="material-symbols-outlined">wb_sunny</span>
          </div>
          <div class="comfort-details">
            <div class="comfort-header">
              <span class="zone-name">Warm</span>
              <span class="temp-range">80-95°F</span>
            </div>
            <p class="comfort-advice">Stay hydrated, mesh gear</p>
          </div>
        </div>

        <div class="comfort-row">
          <div class="comfort-indicator hot">
            <span class="material-symbols-outlined">warning</span>
          </div>
          <div class="comfort-details">
            <div class="comfort-header">
              <span class="zone-name">Hot</span>
              <span class="temp-range">&gt;95°F</span>
            </div>
            <p class="comfort-advice">Extreme heat, limit exposure</p>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="primary-btn">Got it</button>
    </div>
  </div>
</body>
</html>
