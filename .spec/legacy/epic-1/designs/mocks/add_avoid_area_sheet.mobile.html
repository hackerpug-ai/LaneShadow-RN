<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Add Avoid Area - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --error: #E35D6A;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Map Background */
    .map-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
    }

    .drawn-area {
      position: absolute;
      top: 25%;
      left: 20%;
      width: 150px;
      height: 100px;
      background: rgba(227,93,106,0.2);
      border: 2px solid var(--error);
      border-radius: 8px;
      transform: rotate(-5deg);
    }

    /* Bottom Sheet */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: var(--bg-secondary);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 8px auto 0;
    }

    .sheet-header {
      padding: 16px 24px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 600;
    }

    .sheet-content {
      flex: 1;
      padding: 0 24px;
      overflow-y: auto;
    }

    .map-preview {
      height: 120px;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
      border-radius: 12px;
      margin-bottom: 16px;
      position: relative;
    }

    .preview-area {
      position: absolute;
      top: 30%;
      left: 25%;
      width: 80px;
      height: 50px;
      background: rgba(227,93,106,0.2);
      border: 2px solid var(--error);
      border-radius: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      height: 56px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .info-row .material-symbols-outlined {
      font-size: 20px;
      color: var(--text-muted);
    }

    .info-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .info-value {
      margin-left: auto;
      font-size: 14px;
      font-weight: 500;
    }

    .sheet-actions {
      padding: 24px;
      display: flex;
      gap: 12px;
    }

    .secondary-btn {
      flex: 1;
      height: 48px;
      background: transparent;
      border: 1px solid var(--divider);
      border-radius: 20px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .primary-btn {
      flex: 1;
      height: 48px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <div class="drawn-area"></div>
  </div>

  <div class="bottom-sheet">
    <div class="drag-handle"></div>

    <div class="sheet-header">
      <h2 class="sheet-title">Name This Area</h2>
    </div>

    <div class="sheet-content">
      <div class="map-preview">
        <div class="preview-area"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Area Name</label>
        <input type="text" class="form-input" placeholder="e.g., Downtown Traffic Zone">
      </div>

      <div class="form-group">
        <label class="form-label">Reason (optional)</label>
        <input type="text" class="form-input" placeholder="Why avoid this area?">
      </div>

      <div class="info-row">
        <span class="material-symbols-outlined">crop_free</span>
        <span class="info-label">Area Size</span>
        <span class="info-value">~2.3 sq mi</span>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="secondary-btn">Cancel</button>
      <button class="primary-btn">Save Area</button>
    </div>
  </div>
</body>
</html>
