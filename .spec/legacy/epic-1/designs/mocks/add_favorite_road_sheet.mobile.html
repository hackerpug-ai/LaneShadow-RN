<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Save Favorite Road - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: var(--bg-secondary);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 8px auto 0;
    }

    .sheet-header {
      padding: 16px 24px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 600;
    }

    .sheet-content {
      flex: 1;
      padding: 0 24px;
      overflow-y: auto;
    }

    .road-preview {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .preview-map {
      height: 100px;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
      border-radius: 8px;
      margin-bottom: 12px;
      position: relative;
    }

    .preview-line {
      position: absolute;
      top: 40%;
      left: 10%;
      width: 80%;
      height: 3px;
      background: var(--primary);
      transform: rotate(5deg);
    }

    .preview-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .preview-details {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      height: 56px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-textarea {
      width: 100%;
      height: 80px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      color: var(--text-primary);
      resize: none;
    }

    .form-textarea::placeholder {
      color: var(--text-muted);
    }

    .tags-section {
      margin-bottom: 16px;
    }

    .tag-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-chip {
      padding: 8px 12px;
      background: var(--bg-elevated);
      border-radius: 16px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .tag-chip.selected {
      background: rgba(184,115,51,0.2);
      color: var(--primary);
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
    }

    .info-row .material-symbols-outlined {
      font-size: 20px;
      color: var(--text-muted);
    }

    .info-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .info-value {
      margin-left: auto;
      font-size: 14px;
      font-weight: 500;
    }

    .sheet-actions {
      padding: 24px;
    }

    .primary-btn {
      width: 100%;
      height: 56px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
    }

    .primary-btn .material-symbols-outlined {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="bottom-sheet">
    <div class="drag-handle"></div>

    <div class="sheet-header">
      <h2 class="sheet-title">Save Favorite Road</h2>
    </div>

    <div class="sheet-content">
      <div class="road-preview">
        <div class="preview-map">
          <div class="preview-line"></div>
        </div>
        <div class="preview-name">Pacific Coast Highway</div>
        <div class="preview-details">Mile 42-58 · 12.3 mi</div>
      </div>

      <div class="form-group">
        <label class="form-label">Name</label>
        <input type="text" class="form-input" value="Pacific Coast Highway" placeholder="Give this road a name">
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-textarea" placeholder="Add notes about this road..."></textarea>
      </div>

      <div class="tags-section">
        <label class="form-label">Tags</label>
        <div class="tag-chips">
          <span class="tag-chip selected">Scenic</span>
          <span class="tag-chip selected">Coastal</span>
          <span class="tag-chip">Twisty</span>
          <span class="tag-chip">Mountain</span>
          <span class="tag-chip">Relaxed</span>
        </div>
      </div>

      <div class="info-row">
        <span class="material-symbols-outlined">route</span>
        <span class="info-label">From route</span>
        <span class="info-value">Scenic Coast Route</span>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="primary-btn">
        <span class="material-symbols-outlined">favorite</span>
        Save to Favorites
      </button>
    </div>
  </div>
</body>
</html>
