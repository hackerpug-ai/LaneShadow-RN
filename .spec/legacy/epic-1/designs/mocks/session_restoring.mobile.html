<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-warm: #1f1913;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-muted: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .logo {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, var(--primary) 0%, #8C5A2B 100%);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo .material-symbols-outlined {
      font-size: 48px;
    }

    .app-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(184,115,51,0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="material-symbols-outlined">two_wheeler</span>
  </div>
  <h1 class="app-name">LaneShadow</h1>
  <p class="tagline">Plan scenic rides with confidence</p>
  <div class="spinner"></div>
  <p class="status-text">Restoring session...</p>
</body>
</html>
