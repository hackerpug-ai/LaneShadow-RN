<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Plan Ride Sheet - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Map Background (dimmed) */
    .map-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 50%, #161b22 100%);
      opacity: 0.4;
    }

    /* Scrim */
    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    /* Bottom Sheet */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65%;
      background: var(--bg-secondary);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* Drag Handle */
    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 8px auto 16px;
    }

    /* Header */
    .sheet-header {
      padding: 0 24px 20px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 600;
    }

    /* Content */
    .sheet-content {
      flex: 1;
      padding: 0 24px;
      overflow-y: auto;
    }

    /* Route Timeline */
    .route-timeline {
      position: relative;
      padding-left: 24px;
      margin-bottom: 24px;
    }

    .timeline-line {
      position: absolute;
      left: 11px;
      top: 28px;
      bottom: 28px;
      width: 2px;
      background: rgba(255,255,255,0.2);
    }

    .location-input {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      position: relative;
    }

    .location-icon {
      position: absolute;
      left: -24px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .location-icon .material-symbols-outlined {
      font-size: 20px;
      color: var(--primary);
    }

    .location-field {
      flex: 1;
      height: 56px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 0 48px 0 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    .location-field::placeholder {
      color: var(--text-muted);
    }

    .location-action {
      position: absolute;
      right: 12px;
      color: var(--text-muted);
    }

    .swap-btn {
      position: absolute;
      right: -60px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      background: var(--bg-elevated);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swap-btn .material-symbols-outlined {
      font-size: 18px;
      color: var(--text-secondary);
    }

    /* Scenic Bias */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .segmented-control {
      display: flex;
      background: var(--input-bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }

    .segment {
      flex: 1;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
    }

    .segment.active {
      background: var(--primary);
      color: var(--text-primary);
    }

    /* Toggle Rows */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--divider);
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-label .material-symbols-outlined {
      color: var(--text-muted);
      font-size: 20px;
    }

    .toggle-text {
      font-size: 15px;
    }

    .toggle-switch {
      width: 48px;
      height: 28px;
      background: var(--bg-elevated);
      border-radius: 14px;
      position: relative;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 4px;
      width: 20px;
      height: 20px;
      background: var(--text-muted);
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .toggle-switch.active {
      background: var(--primary);
    }

    .toggle-switch.active::after {
      transform: translateX(20px);
      background: white;
    }

    /* Action */
    .sheet-action {
      padding: 24px;
      padding-bottom: 40px;
    }

    .primary-btn {
      width: 100%;
      height: 56px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
    }

    .primary-btn .material-symbols-outlined {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <!-- Map Background -->
  <div class="map-bg"></div>

  <!-- Scrim -->
  <div class="scrim"></div>

  <!-- Bottom Sheet -->
  <div class="bottom-sheet">
    <div class="drag-handle"></div>

    <div class="sheet-header">
      <h2 class="sheet-title">Plan Your Ride</h2>
    </div>

    <div class="sheet-content">
      <!-- Route Timeline -->
      <div class="route-timeline">
        <div class="timeline-line"></div>

        <div class="location-input">
          <div class="location-icon">
            <span class="material-symbols-outlined">circle</span>
          </div>
          <input type="text" class="location-field" placeholder="Starting point">
          <span class="material-symbols-outlined location-action">near_me</span>
        </div>

        <div class="location-input">
          <div class="location-icon">
            <span class="material-symbols-outlined">location_on</span>
          </div>
          <input type="text" class="location-field" placeholder="Where to?">
        </div>
      </div>

      <!-- Scenic Bias -->
      <div class="section-label">Route Style</div>
      <div class="segmented-control">
        <div class="segment">Direct</div>
        <div class="segment active">Balanced</div>
        <div class="segment">Scenic</div>
      </div>

      <!-- Preferences -->
      <div class="toggle-row">
        <div class="toggle-label">
          <span class="material-symbols-outlined">remove_road</span>
          <span class="toggle-text">Avoid Highways</span>
        </div>
        <div class="toggle-switch"></div>
      </div>

      <div class="toggle-row">
        <div class="toggle-label">
          <span class="material-symbols-outlined">toll</span>
          <span class="toggle-text">Avoid Tolls</span>
        </div>
        <div class="toggle-switch"></div>
      </div>
    </div>

    <!-- Action -->
    <div class="sheet-action">
      <button class="primary-btn">
        <span class="material-symbols-outlined">route</span>
        Plan Ride
      </button>
    </div>
  </div>
</body>
</html>
