<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirm Delete Route Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E35D6A", // Status error red
                        "surface-secondary": "#1C1C1E", // Deep charcoal
                        "surface-elevated": "#2C2C2E", // Slightly lighter for raised elements
                        "surface-border": "#3A3A3C",
                        "sheet-scrim": "rgba(0, 0, 0, 0.6)",
                        "muted-text": "#A1A1AA",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem", // Requested radius.xl
                        "2xl": "1.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #1C1C1E; }
        ::-webkit-scrollbar-thumb { background: #3A3A3C; border-radius: 4px; }.material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black flex items-center justify-center min-h-screen p-0 m-0 overflow-hidden relative text-white">
<div class="absolute inset-0 bg-neutral-900 z-0">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-neutral-800 via-neutral-950 to-black opacity-80"></div>
<div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#523d3f 1px, transparent 1px); background-size: 24px 24px;"></div>
</div>
<div class="absolute inset-0 bg-sheet-scrim backdrop-blur-[2px] z-10 transition-opacity"></div>
<div class="relative z-20 w-full max-w-md h-full max-h-[900px] flex flex-col justify-end mx-auto overflow-hidden">
<div class="@container w-full bg-surface-secondary rounded-t-xl shadow-[0_-8px_40px_rgba(0,0,0,0.6)] transform transition-transform duration-300 ease-out border-t border-white/5">
<div class="flex flex-col items-center pt-3 pb-2 w-full cursor-grab active:cursor-grabbing">
<div class="h-1.5 w-10 rounded-full bg-neutral-600 opacity-80"></div>
</div>
<div class="px-6 pt-2 pb-10 flex flex-col items-stretch gap-6">
<div class="text-center space-y-1 mt-2">
<h3 class="text-white font-display font-semibold text-2xl tracking-tight leading-tight">
                        Delete this route?
                    </h3>
<p class="text-muted-text font-display font-normal text-base leading-relaxed">
                        This can’t be undone.
                    </p>
</div>
<div class="group relative flex flex-row gap-4 p-4 rounded-xl border border-surface-border bg-surface-elevated items-start">
<div class="shrink-0 pt-0.5 text-primary">
<span aria-hidden="true" class="material-symbols-outlined filled text-2xl">warning</span>
</div>
<div class="flex flex-col gap-1">
<span class="text-white text-xs font-bold uppercase tracking-wider opacity-80">Warning</span>
<p class="text-neutral-300 text-sm font-normal leading-relaxed">
                            This will permanently remove all associated snapshots, notes, and map overlays from your library.
                        </p>
</div>
</div>
<div class="flex flex-col gap-3 w-full mt-2">
<button class="flex w-full items-center justify-center rounded-xl h-14 bg-primary text-white font-display font-bold text-base tracking-wide hover:brightness-110 active:scale-[0.98] transition-all shadow-lg shadow-red-900/20 focus:outline-none focus:ring-4 focus:ring-primary/30">
<span class="material-symbols-outlined mr-2 text-[20px]">delete</span>
                        Delete Route
                    </button>
<button class="flex w-full items-center justify-center rounded-xl h-14 bg-transparent border border-surface-border text-white font-display font-medium text-base hover:bg-white/5 active:scale-[0.98] transition-all focus:outline-none focus:ring-2 focus:ring-neutral-500">
                        Cancel
                    </button>
</div>
<div class="h-2 w-full"></div>
</div>
</div>
</div>

</body></html>
