<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wind Legend Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7c13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white h-screen w-full overflow-hidden flex flex-col relative">
<!-- Background Map Layer (Context) -->
<div class="absolute inset-0 z-0">
<!-- Abstract dark map representation -->
<div class="relative w-full h-full bg-stone-900 overflow-hidden">
<!-- Simulated map texture using gradients and a placeholder image -->
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&amp;w=2074&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-40 mix-blend-overlay" data-alt="Dark topographic map background pattern" data-location="Mountain Route" style="https://placeholder.pics/svg/300"></div>
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80"></div>
<!-- Simulated Route Line -->
<svg class="absolute top-0 left-0 w-full h-full opacity-60" style="filter: drop-shadow(0px 0px 8px rgba(236, 124, 19, 0.5));">
<path d="M-50 200 Q 100 400 180 300 T 450 600" fill="none" stroke="#ec7c13" stroke-linecap="round" stroke-width="4"></path>
</svg>
<!-- Simulated UI Map Controls -->
<div class="absolute top-12 right-4 flex flex-col gap-3">
<button class="w-10 h-10 rounded-full bg-background-dark/80 backdrop-blur text-white flex items-center justify-center shadow-lg border border-white/10">
<span class="material-symbols-outlined text-xl">layers</span>
</button>
<button class="w-10 h-10 rounded-full bg-background-dark/80 backdrop-blur text-white flex items-center justify-center shadow-lg border border-white/10">
<span class="material-symbols-outlined text-xl">near_me</span>
</button>
</div>
</div>
</div>
<!-- Scrim / Backdrop -->
<div class="absolute inset-0 z-10 bg-black/60 backdrop-blur-sm transition-opacity duration-300"></div>
<!-- Bottom Sheet Container -->
<div class="absolute inset-x-0 bottom-0 z-20 flex flex-col items-center justify-end">
<!-- Sheet Surface -->
<div class="w-full max-w-md bg-[#1e1a17] dark:bg-[#1e1a17] rounded-t-[2rem] shadow-[0_-8px_30px_rgba(0,0,0,0.5)] ring-1 ring-white/10 relative overflow-hidden flex flex-col max-h-[90vh]">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2 cursor-grab active:cursor-grabbing">
<div class="h-1.5 w-12 rounded-full bg-white/20"></div>
</div>
<!-- Content Area -->
<div class="flex flex-col w-full px-6 pt-2 pb-8">
<!-- Headline -->
<div class="flex items-center justify-between pb-6 pt-2">
<h2 class="text-2xl font-bold text-white tracking-tight">Wind legend</h2>
<!-- Optional close icon for accessibility -->
<button class="text-white/40 hover:text-white transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Legend List -->
<div class="flex flex-col gap-0 bg-white/5 rounded-2xl overflow-hidden border border-white/5 mb-6">
<!-- Row 1: Low -->
<div class="flex items-center justify-between p-4 border-b border-white/5 hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<!-- Swatch: Light Blue-Grey -->
<div class="w-10 h-10 rounded-lg bg-slate-400/20 border border-slate-400/50 flex items-center justify-center shadow-[0_0_10px_rgba(148,163,184,0.2)]">
<div class="w-4 h-4 rounded-sm bg-slate-400"></div>
</div>
<div class="flex flex-col">
<span class="text-white font-medium text-base group-hover:text-primary transition-colors">Low</span>
<span class="text-slate-400 text-xs">Light conditions</span>
</div>
</div>
<span class="text-white/90 font-bold text-sm bg-white/5 px-3 py-1 rounded-full border border-white/5">0-15 mph</span>
</div>
<!-- Row 2: Moderate -->
<div class="flex items-center justify-between p-4 border-b border-white/5 hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<!-- Swatch: Medium Blue-Grey -->
<div class="w-10 h-10 rounded-lg bg-slate-600/20 border border-slate-500/50 flex items-center justify-center shadow-[0_0_10px_rgba(71,85,105,0.2)]">
<div class="w-4 h-4 rounded-sm bg-slate-500"></div>
</div>
<div class="flex flex-col">
<span class="text-white font-medium text-base group-hover:text-primary transition-colors">Moderate</span>
<span class="text-slate-400 text-xs">Use caution</span>
</div>
</div>
<span class="text-white/90 font-bold text-sm bg-white/5 px-3 py-1 rounded-full border border-white/5">15-25 mph</span>
</div>
<!-- Row 3: High -->
<div class="flex items-center justify-between p-4 hover:bg-white/5 transition-colors group">
<div class="flex items-center gap-4">
<!-- Swatch: Muted Amber -->
<div class="w-10 h-10 rounded-lg bg-amber-900/30 border border-amber-700/50 flex items-center justify-center shadow-[0_0_10px_rgba(180,83,9,0.2)]">
<div class="w-4 h-4 rounded-sm bg-amber-700"></div>
</div>
<div class="flex flex-col">
<span class="text-white font-medium text-base group-hover:text-primary transition-colors">High</span>
<span class="text-amber-500/80 text-xs">High risk</span>
</div>
</div>
<span class="text-amber-500 font-bold text-sm bg-amber-950/40 px-3 py-1 rounded-full border border-amber-900/50">25+ mph</span>
</div>
</div>
<!-- Disclaimer Meta Text -->
<div class="flex gap-3 mb-8 px-1">
<span class="material-symbols-outlined text-white/30 text-lg mt-0.5 shrink-0">info</span>
<p class="text-[#b9aa9d] text-sm font-normal leading-relaxed">
                        Wind conditions are estimates and may vary by altitude and terrain. Always check local forecasts before riding.
                    </p>
</div>
<!-- Action Button -->
<button class="flex w-full items-center justify-center overflow-hidden rounded-xl h-14 bg-primary hover:bg-[#d96d0d] active:scale-[0.98] transition-all duration-200 text-white text-base font-bold leading-normal tracking-wide shadow-[0_4px_20px_rgba(236,124,19,0.3)]">
<span class="mr-2">Got it</span>
<span class="material-symbols-outlined text-xl">check</span>
</button>
<!-- Safe Area Spacer for iOS Home Indicator -->
<div class="h-4"></div>
</div>
</div>
</div>
</body></html>
