<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Route Options Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b87332",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1f1913",
                        "surface-dark": "#2a241e",
                        "surface-darker": "#171412"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem", 
                        "lg": "1rem", 
                        "xl": "1.5rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for the sheet */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark h-screen overflow-hidden font-display selection:bg-primary/30 text-white">
<div class="relative w-full h-full flex flex-col">
<!-- Background Map Layer -->
<!-- Using a dark stylized map image to simulate the motorcycle route interface -->
<div class="absolute inset-0 z-0 bg-cover bg-center grayscale-[20%] brightness-[0.8]" data-alt="Dark aesthetic map view from above showing desert terrain and winding roads" data-location="Mojave Desert" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAgcmz34qp-764LegrA28MrndSKoFN7kEriEtqMLRfNDcKs93pDuUbCMwmJl2qZE3yI6qNVuEu6Rkd5oy01rzs-CgouihMiZWGBi-p7s1qpVr_mBTGgBPWpljAVXqNAq7ED-HNlZfCmtqaAZMlOBlhlHvfEfiXon7FoZhsSvHyRWAYkpTIHY-vMZkHJ0TVL8aGrUYWBnXY_lGx5Gk0Ba5omEaoFODXse77Vilnd_waw__T2mmUv2Gdghw_53CABp3XS51uXrqRvIHs');">
<!-- Decorative Map UI Elements (Simulated Route Lines) -->
<div class="absolute inset-0 bg-black/20 pointer-events-none"></div>
<!-- Floating Top Controls -->
<div class="absolute top-0 left-0 right-0 p-4 pt-12 flex justify-between items-start z-10 bg-gradient-to-b from-black/60 to-transparent">
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-darker/80 backdrop-blur-sm text-white border border-white/10 shadow-lg">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center bg-surface-darker/90 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 shadow-lg">
<span class="text-xs text-white/50 font-medium uppercase tracking-wider">Destination</span>
<span class="text-sm font-bold text-white">Joshua Tree, CA</span>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full bg-surface-darker/80 backdrop-blur-sm text-white border border-white/10 shadow-lg">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
<!-- Floating Map Action Buttons -->
<div class="absolute right-4 bottom-[45%] flex flex-col gap-3 z-10">
<button class="flex items-center justify-center w-12 h-12 rounded-xl bg-surface-darker/90 backdrop-blur text-primary border border-white/10 shadow-lg">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="flex items-center justify-center w-12 h-12 rounded-xl bg-surface-darker/90 backdrop-blur text-white border border-white/10 shadow-lg">
<span class="material-symbols-outlined">layers</span>
</button>
</div>
</div>
<!-- Bottom Sheet Overlay -->
<div class="absolute bottom-0 left-0 right-0 z-20 flex flex-col max-h-[65vh] w-full rounded-t-2xl bg-surface-dark border-t border-white/10 shadow-[0_-8px_30px_rgba(0,0,0,0.5)]">
<!-- Drag Handle Area -->
<div class="flex-none flex items-center justify-center pt-3 pb-1 w-full cursor-grab active:cursor-grabbing">
<div class="h-1.5 w-12 rounded-full bg-white/20"></div>
</div>
<!-- Sheet Header -->
<div class="flex-none px-6 pt-3 pb-2 flex justify-between items-baseline border-b border-white/5">
<h2 class="text-xl font-bold tracking-tight text-white">Select Route</h2>
<span class="text-xs font-medium text-white/40 uppercase tracking-widest">3 Options</span>
</div>
<!-- Scrollable Route List -->
<div class="flex-1 overflow-y-auto no-scrollbar p-4 space-y-4 pb-8">
<!-- Option 1: Selected (Copper Theme) -->
<div class="group relative overflow-hidden rounded-xl border-2 border-primary bg-[#231e1a] shadow-lg transition-transform active:scale-[0.99]">
<div class="absolute top-0 right-0 p-2 opacity-100">
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
<div class="p-4 flex flex-col gap-4">
<div class="flex justify-between items-start pr-8">
<div>
<h3 class="text-lg font-bold text-white leading-tight">High Desert Loop</h3>
<div class="flex flex-wrap gap-2 mt-2">
<span class="inline-flex items-center rounded-md bg-primary/20 px-2 py-1 text-xs font-medium text-primary ring-1 ring-inset ring-primary/30">Most Scenic</span>
<span class="inline-flex items-center rounded-md bg-white/5 px-2 py-1 text-xs font-medium text-gray-400 ring-1 ring-inset ring-white/10">Low Wind</span>
</div>
</div>
</div>
<div class="flex items-end justify-between border-t border-white/5 pt-3 mt-1">
<div class="flex items-baseline gap-4">
<div>
<span class="text-2xl font-bold text-white tabular-nums tracking-tight">1<span class="text-lg">h</span> 10<span class="text-lg">m</span></span>
<p class="text-xs text-gray-400 mt-0.5 font-medium uppercase tracking-wide">Duration</p>
</div>
<div class="w-px h-8 bg-white/10"></div>
<div>
<span class="text-xl font-semibold text-white/90 tabular-nums">45 <span class="text-base font-normal text-white/60">mi</span></span>
<p class="text-xs text-gray-400 mt-0.5 font-medium uppercase tracking-wide">Distance</p>
</div>
</div>
</div>
<button class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary py-3 px-4 text-sm font-bold text-white shadow-md hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined text-[20px]">navigation</span>
                            Start Navigation
                        </button>
</div>
</div>
<!-- Option 2: Unselected -->
<div class="relative overflow-hidden rounded-xl border border-white/5 bg-surface-darker/60 p-4 transition-colors hover:bg-surface-darker active:scale-[0.99] cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<h3 class="text-base font-semibold text-white/90">Interstate Express</h3>
<div class="mt-1.5 flex flex-wrap gap-2">
<span class="inline-flex items-center rounded-md bg-white/10 px-2 py-0.5 text-[10px] font-medium text-white/70">Fastest</span>
</div>
</div>
<div class="text-right">
<div class="flex flex-col items-end">
<span class="text-lg font-bold text-white tabular-nums">45<span class="text-sm font-normal">m</span></span>
<span class="text-sm text-gray-500 tabular-nums">38 mi</span>
</div>
</div>
</div>
</div>
<!-- Option 3: Unselected -->
<div class="relative overflow-hidden rounded-xl border border-white/5 bg-surface-darker/60 p-4 transition-colors hover:bg-surface-darker active:scale-[0.99] cursor-pointer">
<div class="flex justify-between items-start">
<div class="flex flex-col">
<h3 class="text-base font-semibold text-white/90">Canyon Carver</h3>
<div class="mt-1.5 flex flex-wrap gap-2">
<span class="inline-flex items-center rounded-md bg-red-900/30 px-2 py-0.5 text-[10px] font-medium text-red-400 border border-red-900/50">Advanced Only</span>
</div>
</div>
<div class="text-right">
<div class="flex flex-col items-end">
<span class="text-lg font-bold text-white tabular-nums">1<span class="text-sm font-normal">h</span> 30<span class="text-sm font-normal">m</span></span>
<span class="text-sm text-gray-500 tabular-nums">52 mi</span>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom safe area spacer -->
<div class="h-6 w-full bg-surface-dark"></div>
</div>
</div>
</body></html>
