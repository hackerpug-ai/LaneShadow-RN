<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lane Shadow - Auth Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f27c0d",
                        "background-light": "#f8f7f5",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #121212;
        }
        .auth-card {
            background-color: #1e1e1e;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .industrial-blur {
            backdrop-filter: blur(10px);
            background: linear-gradient(180deg, rgba(18,18,18,0.8) 0%, rgba(18,18,18,1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col items-center justify-center p-4">
<!-- Top Navigation / Status Area -->
<div class="fixed top-0 left-0 w-full flex items-center bg-transparent p-4 pb-2 justify-between z-50">
<button class="text-white/70 hover:text-white">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<div class="h-5"></div>
</div>
<!-- Background Decoration (Topographic Texture Simulation) -->
<div class="fixed inset-0 pointer-events-none opacity-10 overflow-hidden">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,#f27c0d_0%,transparent_50%)] opacity-10"></div>
<div class="w-full h-full" data-alt="Abstract asphalt texture for background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD9pF6PQjvXRx7TueQYPYh5t4ft4NshWtpbEI9JIikUmkQvWot8fUqjg2U0O_wXUWCUHtxp4xR3DZ26je5H4qticdSAwSyoCWAknCQxAHwdU_5dor0kio1W6-VpsMTpLbjeiMIQ7Wj47RHWMDwtscHqyCWzu0qrij9W_Uypo9iQLmFogB1HybZ7NukHAOMNU-ptHzvwhErEQQHAMIxDrMDtk62-ASt5lyrAJAJz5HoCqHFId4i5SkDHigD75co0l55bp3Yc0aicm4U');"></div>
</div>
<div class="relative w-full max-w-md flex flex-col gap-8">
<!-- Brand Header Section -->
<header class="flex flex-col items-center">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(242,124,13,0.3)]">
<span class="material-symbols-outlined text-background-dark text-4xl font-bold">route</span>
</div>
<h1 class="text-white tracking-tight text-[42px] font-bold leading-none px-4 text-center pb-2 font-display">
                Lane Shadow
            </h1>
<p class="text-white/60 text-lg font-normal leading-normal px-4 text-center font-display">
                Sign in to save and replay rides
            </p>
</header>
<!-- Auth Widget (Clerk Style) -->
<main class="auth-card rounded-xl p-6 shadow-2xl flex flex-col gap-6">
<!-- Social Buttons -->
<div class="flex flex-col gap-3">
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg bg-white/5 border border-white/10 text-white font-medium hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.11 1.43-3.45 1.43-1.61 0-2.88-.49-3.8-1.47-1.02-1.07-1.53-2.58-1.53-4.52 0-2.18.57-3.85 1.7-5.01 1.05-1.07 2.4-1.61 4.05-1.61 1.34 0 2.43.41 3.28 1.23.83.82 1.25 1.95 1.25 3.39h-6.7c.05 1.04.35 1.83.91 2.37.49.47 1.14.71 1.94.71.69 0 1.28-.15 1.77-.45.42-.26.83-.67 1.21-1.23l1.37.76c-.63 1.05-1.5 1.85-2.6 2.4zm-3.45-8.58c-.73 0-1.31.22-1.74.67-.4.4-.64 1-.72 1.78h4.82c-.04-.8-.28-1.4-.73-1.79-.44-.44-1-.66-1.63-.66zM11 2v4h2V2h-2z" fill="currentColor"></path>
</svg>
<span>Continue with Apple</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-12 rounded-lg bg-white/5 border border-white/10 text-white font-medium hover:bg-white/10 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z" fill="currentColor"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-px bg-white/10 flex-1"></div>
<p class="text-white/40 text-sm font-medium uppercase tracking-widest font-display">or email</p>
<div class="h-px bg-white/10 flex-1"></div>
</div>
<!-- Input Fields -->
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold text-white/50 uppercase tracking-wider ml-1">Email Address</label>
<input class="w-full bg-black/40 border border-white/10 rounded-lg h-12 px-4 text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="rider@laneshadow.com" type="email"/>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-xs font-semibold text-white/50 uppercase tracking-wider">Password</label>
<a class="text-xs text-primary/80 hover:text-primary transition-colors" href="#">Forgot?</a>
</div>
<input class="w-full bg-black/40 border border-white/10 rounded-lg h-12 px-4 text-white focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="flex items-center justify-center w-full h-14 bg-primary rounded-xl text-background-dark text-lg font-bold tracking-tight hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_10px_20px_-5px_rgba(242,124,13,0.4)]">
                Sign In
            </button>
<!-- Footer Link -->
<p class="text-white/40 text-sm text-center pt-2">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Create account</a>
</p>
</main>
<!-- Terms & Meta -->
<footer class="flex flex-col items-center gap-4 mt-4">
<p class="text-white/30 text-[11px] leading-relaxed text-center px-8 uppercase tracking-widest font-display">
                By signing in, you agree to our 
                <a class="text-white/50 hover:text-white underline" href="#">Terms of Service</a> 
                &amp; 
                <a class="text-white/50 hover:text-white underline" href="#">Privacy Policy</a>
</p>
<div class="h-1 w-32 bg-white/10 rounded-full"></div>
</footer>
</div>
<!-- Padding for bottom -->
<div class="h-10"></div>
</body></html>
