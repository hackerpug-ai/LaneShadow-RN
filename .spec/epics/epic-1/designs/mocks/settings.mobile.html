<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Settings - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --error: #E35D6A;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow-y: auto;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .header {
      padding: 54px 24px 24px;
    }

    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
    }

    .content {
      padding: 0 16px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-left: 16px;
    }

    .section-card {
      background: var(--bg-elevated);
      border-radius: 16px;
      overflow: hidden;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--divider);
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-size: 16px;
    }

    .setting-value {
      font-size: 14px;
      color: var(--text-muted);
    }

    .setting-row.destructive .setting-label {
      color: var(--error);
    }

    .segmented-control {
      display: flex;
      background: var(--bg-primary);
      border-radius: 8px;
      padding: 2px;
    }

    .segment {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .segment.active {
      background: var(--primary);
      color: var(--text-primary);
    }

    .chevron {
      color: var(--text-muted);
      font-size: 20px;
    }

    .version {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="header-title">Settings</h1>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-label">Units</div>
      <div class="section-card">
        <div class="setting-row">
          <span class="setting-label">Temperature</span>
          <div class="segmented-control">
            <div class="segment active">°F</div>
            <div class="segment">°C</div>
          </div>
        </div>
        <div class="setting-row">
          <span class="setting-label">Distance</span>
          <div class="segmented-control">
            <div class="segment active">Miles</div>
            <div class="segment">Km</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Account</div>
      <div class="section-card">
        <div class="setting-row">
          <span class="setting-label">Email</span>
          <span class="setting-value">rider@example.com</span>
        </div>
        <div class="setting-row destructive">
          <span class="setting-label">Sign Out</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">About</div>
      <div class="section-card">
        <div class="setting-row">
          <span class="setting-label">About LaneShadow</span>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Terms of Service</span>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Privacy Policy</span>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
      </div>
    </div>
  </div>

  <div class="version">Version 1.0.0 (Build 1)</div>
</body>
</html>
