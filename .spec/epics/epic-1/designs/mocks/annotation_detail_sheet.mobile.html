<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Annotation Detail - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    .modal {
      position: relative;
      width: calc(100% - 48px);
      background: var(--bg-secondary);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .modal-header {
      padding: 24px;
      display: flex;
      justify-content: flex-end;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .close-btn .material-symbols-outlined {
      font-size: 24px;
      color: var(--text-muted);
    }

    .modal-content {
      padding: 0 24px 24px;
    }

    .annotation-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      background: rgba(100,116,139,0.2);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .header-icon .material-symbols-outlined {
      font-size: 24px;
      color: #64748b;
    }

    .annotation-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .severity-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      background: rgba(251,191,36,0.2);
      color: #fbbf24;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .details-list {
      margin-top: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--divider);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .detail-value {
      font-size: 14px;
      font-weight: 500;
    }

    .annotation-description {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .modal-actions {
      padding: 24px;
      display: flex;
      gap: 12px;
    }

    .secondary-btn {
      flex: 1;
      height: 48px;
      background: var(--bg-elevated);
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .secondary-btn .material-symbols-outlined {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="modal">
    <div class="modal-header">
      <button class="close-btn">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="modal-content">
      <div class="annotation-header">
        <div class="header-icon">
          <span class="material-symbols-outlined">air</span>
        </div>
        <h2 class="annotation-title">Moderate Wind</h2>
        <span class="severity-badge">15-25 mph</span>
      </div>

      <div class="details-list">
        <div class="detail-row">
          <span class="detail-label">Time Range</span>
          <span class="detail-value">2:00 PM - 4:00 PM</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Direction</span>
          <span class="detail-value">NW Crosswind</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Segment</span>
          <span class="detail-value">Highway 1, Mile 42-58</span>
        </div>
      </div>

      <p class="annotation-description">
        Expect noticeable crosswinds on exposed coastal sections. Stay alert and maintain a firm grip.
      </p>
    </div>

    <div class="modal-actions">
      <button class="secondary-btn">
        <span class="material-symbols-outlined">info</span>
        View Legend
      </button>
    </div>
  </div>
</body>
</html>
