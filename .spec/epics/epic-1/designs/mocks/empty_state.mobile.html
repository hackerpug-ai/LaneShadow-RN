<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Empty State - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .header {
      padding: 54px 24px 16px;
    }

    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
    }

    .empty-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 40px;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .empty-icon .material-symbols-outlined {
      font-size: 40px;
      color: rgba(255,255,255,0.2);
    }

    .empty-headline {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
    }

    .empty-body {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .primary-btn {
      height: 48px;
      padding: 0 24px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
    }

    .primary-btn .material-symbols-outlined {
      font-size: 20px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
    }

    .nav-item .material-symbols-outlined {
      font-size: 24px;
      color: var(--text-muted);
    }

    .nav-item.active .material-symbols-outlined {
      color: var(--primary);
    }

    .nav-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .nav-item.active .nav-label {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="header-title">Saved Routes</h1>
  </div>

  <div class="empty-container">
    <div class="empty-icon">
      <span class="material-symbols-outlined">route</span>
    </div>
    <h2 class="empty-headline">No Saved Routes</h2>
    <p class="empty-body">Plan your first ride and save it for easy access later</p>
    <button class="primary-btn">
      <span class="material-symbols-outlined">add_road</span>
      Plan a Ride
    </button>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <span class="material-symbols-outlined">map</span>
      <span class="nav-label">Explore</span>
    </div>
    <div class="nav-item active">
      <span class="material-symbols-outlined">bookmark</span>
      <span class="nav-label">Saved</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">two_wheeler</span>
      <span class="nav-label">Rides</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">person</span>
      <span class="nav-label">Profile</span>
    </div>
  </div>
</body>
</html>
