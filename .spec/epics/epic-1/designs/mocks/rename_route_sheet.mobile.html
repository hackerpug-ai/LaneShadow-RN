<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Rename Route - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
    }

    .modal {
      position: relative;
      width: calc(100% - 48px);
      background: var(--bg-secondary);
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .modal-header {
      padding: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
    }

    .modal-content {
      padding: 0 24px;
    }

    .body-text {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 8px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      height: 56px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 0 48px 0 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .clear-btn .material-symbols-outlined {
      font-size: 16px;
      color: var(--text-muted);
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
    }

    .modal-actions {
      padding: 24px;
      display: flex;
      gap: 12px;
    }

    .secondary-btn {
      flex: 1;
      height: 48px;
      background: transparent;
      border: 1px solid var(--divider);
      border-radius: 20px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .primary-btn {
      flex: 1;
      height: 48px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Rename Route</h2>
    </div>

    <div class="modal-content">
      <p class="body-text">Give your route a memorable name</p>

      <div class="form-group">
        <label class="form-label">Route Name</label>
        <div class="input-wrapper">
          <input type="text" class="form-input" value="Scenic Coast Route" placeholder="Enter route name">
          <button class="clear-btn">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <p class="char-count">18/100</p>
      </div>
    </div>

    <div class="modal-actions">
      <button class="secondary-btn">Cancel</button>
      <button class="primary-btn">Save</button>
    </div>
  </div>
</body>
</html>
