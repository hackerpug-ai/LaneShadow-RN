<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Rate Route - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --star: #fbbf24;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrim {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: var(--bg-secondary);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 8px auto 16px;
    }

    .sheet-header {
      padding: 0 24px 20px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 600;
    }

    .sheet-content {
      flex: 1;
      padding: 0 24px;
      overflow-y: auto;
    }

    /* Route Summary */
    .route-summary {
      display: flex;
      gap: 12px;
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .summary-thumbnail {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
      border-radius: 8px;
    }

    .summary-details {
      flex: 1;
    }

    .summary-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .summary-meta {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Star Rating */
    .rating-section {
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .star-rating {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .star-rating .material-symbols-outlined {
      font-size: 40px;
      color: var(--star);
      cursor: pointer;
    }

    .star-rating .material-symbols-outlined.empty {
      color: rgba(255,255,255,0.2);
    }

    /* Notes */
    .notes-input {
      width: 100%;
      height: 100px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      color: var(--text-primary);
      resize: none;
      margin-bottom: 16px;
    }

    .notes-input::placeholder {
      color: var(--text-muted);
    }

    /* Tags */
    .tags-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      padding: 8px 12px;
      background: var(--bg-elevated);
      border-radius: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .tag.selected {
      background: rgba(184,115,51,0.2);
      color: var(--primary);
    }

    .sheet-action {
      padding: 24px;
      padding-bottom: 40px;
    }

    .primary-btn {
      width: 100%;
      height: 56px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="bottom-sheet">
    <div class="drag-handle"></div>

    <div class="sheet-header">
      <h2 class="sheet-title">How was your ride?</h2>
    </div>

    <div class="sheet-content">
      <div class="route-summary">
        <div class="summary-thumbnail"></div>
        <div class="summary-details">
          <div class="summary-name">Scenic Coast Route</div>
          <div class="summary-meta">87 mi &bull; 2h 15m</div>
        </div>
      </div>

      <div class="rating-section">
        <div class="section-label">Rate this ride</div>
        <div class="star-rating">
          <span class="material-symbols-outlined">star</span>
          <span class="material-symbols-outlined">star</span>
          <span class="material-symbols-outlined">star</span>
          <span class="material-symbols-outlined">star</span>
          <span class="material-symbols-outlined empty">star</span>
        </div>
      </div>

      <div class="section-label">Notes (optional)</div>
      <textarea class="notes-input" placeholder="How did the ride go? Any highlights or issues?"></textarea>

      <div class="section-label">Tags (optional)</div>
      <div class="tags-picker">
        <span class="tag selected">Great scenery</span>
        <span class="tag">Smooth roads</span>
        <span class="tag selected">Light traffic</span>
        <span class="tag">Heavy traffic</span>
        <span class="tag">Weather issues</span>
        <span class="tag selected">Would repeat</span>
      </div>
    </div>

    <div class="sheet-action">
      <button class="primary-btn">Save Rating</button>
    </div>
  </div>
</body>
</html>
