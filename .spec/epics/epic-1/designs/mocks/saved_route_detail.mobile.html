<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Saved Route Detail - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Map Background */
    .map-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 50%;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
    }

    .map-route {
      position: absolute;
      top: 30%;
      left: 15%;
      width: 70%;
      height: 40%;
      border: 3px solid var(--primary);
      border-radius: 20px;
      border-bottom: none;
      transform: rotate(-5deg);
      opacity: 0.8;
    }

    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 54px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      background: var(--bg-elevated);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
    }

    .icon-btn .material-symbols-outlined {
      font-size: 20px;
      color: var(--text-primary);
    }

    /* Bottom Sheet */
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: var(--bg-secondary);
      border-radius: 32px 32px 0 0;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.5);
      padding: 24px;
      overflow-y: auto;
    }

    .drag-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: -16px auto 16px;
    }

    .route-header {
      margin-bottom: 20px;
    }

    .route-name {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .route-date {
      font-size: 14px;
      color: var(--text-muted);
    }

    .stats-row {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-item .material-symbols-outlined {
      font-size: 18px;
      color: var(--text-muted);
    }

    .stat-value {
      font-size: 16px;
      font-weight: 500;
    }

    .section-card {
      background: var(--bg-elevated);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .condition-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }

    .condition-row:not(:last-child) {
      border-bottom: 1px solid var(--divider);
    }

    .condition-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .condition-icon.wind {
      background: rgba(148,163,184,0.2);
    }

    .condition-icon.wind .material-symbols-outlined {
      color: #94a3b8;
    }

    .condition-icon.temp {
      background: rgba(74,222,128,0.2);
    }

    .condition-icon.temp .material-symbols-outlined {
      color: #4ade80;
    }

    .condition-icon .material-symbols-outlined {
      font-size: 18px;
    }

    .condition-details {
      flex: 1;
    }

    .condition-label {
      font-size: 14px;
      color: var(--text-muted);
    }

    .condition-value {
      font-size: 16px;
      font-weight: 500;
    }

    .primary-btn {
      width: 100%;
      height: 56px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
      margin-top: 8px;
    }

    .primary-btn .material-symbols-outlined {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <div class="map-route"></div>
  </div>

  <div class="top-bar">
    <button class="icon-btn">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <button class="icon-btn">
      <span class="material-symbols-outlined">more_vert</span>
    </button>
  </div>

  <div class="bottom-sheet">
    <div class="drag-handle"></div>

    <div class="route-header">
      <h1 class="route-name">Scenic Coast Route</h1>
      <p class="route-date">Saved on January 10, 2026</p>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <span class="material-symbols-outlined">straighten</span>
        <span class="stat-value">87 mi</span>
      </div>
      <div class="stat-item">
        <span class="material-symbols-outlined">schedule</span>
        <span class="stat-value">2h 15m</span>
      </div>
      <div class="stat-item">
        <span class="material-symbols-outlined">landscape</span>
        <span class="stat-value">Scenic</span>
      </div>
    </div>

    <div class="section-card">
      <div class="section-label">Saved Conditions</div>
      <div class="condition-row">
        <div class="condition-icon wind">
          <span class="material-symbols-outlined">air</span>
        </div>
        <div class="condition-details">
          <div class="condition-label">Wind</div>
          <div class="condition-value">10-15 mph</div>
        </div>
      </div>
      <div class="condition-row">
        <div class="condition-icon temp">
          <span class="material-symbols-outlined">thermostat</span>
        </div>
        <div class="condition-details">
          <div class="condition-label">Temperature</div>
          <div class="condition-value">68-72°F</div>
        </div>
      </div>
    </div>

    <button class="primary-btn">
      <span class="material-symbols-outlined">navigation</span>
      Start Ride
    </button>
  </div>
</body>
</html>
