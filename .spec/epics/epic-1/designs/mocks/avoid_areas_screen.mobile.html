<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Avoid Areas - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --primary: #B87333;
      --error: #E35D6A;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow: hidden;
      position: relative;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Top Bar */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 54px 16px 16px;
      background: linear-gradient(180deg, rgba(14,15,17,0.9) 0%, transparent 100%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      background: var(--bg-elevated);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
    }

    .back-btn .material-symbols-outlined {
      font-size: 20px;
      color: var(--text-primary);
    }

    .top-bar-title {
      font-size: 20px;
      font-weight: 600;
    }

    /* Map Section */
    .map-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(135deg, #1a1d21 0%, #0d1117 100%);
    }

    .avoid-overlay {
      position: absolute;
      top: 30%;
      left: 20%;
      width: 120px;
      height: 80px;
      background: rgba(227,93,106,0.2);
      border: 2px solid var(--error);
      border-radius: 8px;
      transform: rotate(-5deg);
    }

    .avoid-overlay-2 {
      position: absolute;
      top: 45%;
      right: 25%;
      width: 80px;
      height: 60px;
      background: rgba(227,93,106,0.2);
      border: 2px solid var(--error);
      border-radius: 8px;
      transform: rotate(10deg);
    }

    /* Bottom Section */
    .bottom-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: var(--bg-secondary);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      overflow-y: auto;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    .section-count {
      font-size: 14px;
      color: var(--text-muted);
    }

    .area-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .area-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-elevated);
      border-radius: 12px;
    }

    .area-icon {
      width: 40px;
      height: 40px;
      background: rgba(227,93,106,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .area-icon .material-symbols-outlined {
      font-size: 20px;
      color: var(--error);
    }

    .area-details {
      flex: 1;
    }

    .area-name {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .area-meta {
      font-size: 14px;
      color: var(--text-muted);
    }

    .area-chevron {
      color: var(--text-muted);
    }

    /* FAB */
    .fab {
      position: absolute;
      right: 16px;
      bottom: calc(50% + 16px);
      height: 48px;
      padding: 0 20px;
      background: var(--primary);
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
      z-index: 20;
    }

    .fab .material-symbols-outlined {
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="map-container">
    <div class="avoid-overlay"></div>
    <div class="avoid-overlay-2"></div>
  </div>

  <div class="top-bar">
    <button class="back-btn">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="top-bar-title">Avoid Areas</h1>
  </div>

  <button class="fab">
    <span class="material-symbols-outlined">add</span>
    Add Area
  </button>

  <div class="bottom-section">
    <div class="section-header">
      <span class="section-title">Your Avoid Areas</span>
      <span class="section-count">3 areas</span>
    </div>

    <div class="area-list">
      <div class="area-card">
        <div class="area-icon">
          <span class="material-symbols-outlined">block</span>
        </div>
        <div class="area-details">
          <div class="area-name">Downtown Traffic Zone</div>
          <div class="area-meta">~2.3 sq mi</div>
        </div>
        <span class="material-symbols-outlined area-chevron">chevron_right</span>
      </div>

      <div class="area-card">
        <div class="area-icon">
          <span class="material-symbols-outlined">block</span>
        </div>
        <div class="area-details">
          <div class="area-name">Industrial District</div>
          <div class="area-meta">~1.8 sq mi</div>
        </div>
        <span class="material-symbols-outlined area-chevron">chevron_right</span>
      </div>

      <div class="area-card">
        <div class="area-icon">
          <span class="material-symbols-outlined">block</span>
        </div>
        <div class="area-details">
          <div class="area-name">Construction Zone (Temp)</div>
          <div class="area-meta">~0.5 sq mi</div>
        </div>
        <span class="material-symbols-outlined area-chevron">chevron_right</span>
      </div>
    </div>
  </div>
</body>
</html>
