<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Preferences - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0E0F11;
      --bg-secondary: #1A1C1F;
      --bg-elevated: #24272B;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .header {
      padding: 54px 24px 24px;
    }

    .header-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
    }

    .content {
      padding: 0 16px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-left: 16px;
    }

    /* Segmented Control */
    .segmented-control {
      display: flex;
      background: var(--input-bg);
      border-radius: 12px;
      padding: 4px;
    }

    .segment {
      flex: 1;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .segment.active {
      background: var(--primary);
      color: var(--text-primary);
    }

    /* Section Card */
    .section-card {
      background: var(--bg-elevated);
      border-radius: 16px;
      overflow: hidden;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--divider);
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    .setting-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .setting-icon {
      color: var(--text-muted);
      font-size: 20px;
    }

    .setting-label {
      font-size: 16px;
    }

    .toggle-switch {
      width: 48px;
      height: 28px;
      background: var(--bg-primary);
      border-radius: 14px;
      position: relative;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 4px;
      width: 20px;
      height: 20px;
      background: var(--text-muted);
      border-radius: 10px;
    }

    /* Nav Row */
    .nav-row {
      display: flex;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid var(--divider);
    }

    .nav-row:last-child {
      border-bottom: none;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .nav-details {
      flex: 1;
    }

    .nav-label {
      font-size: 16px;
      margin-bottom: 2px;
    }

    .nav-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .chevron {
      color: var(--text-muted);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 84px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--divider);
      display: flex;
      justify-content: space-around;
      align-items: flex-start;
      padding-top: 8px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
    }

    .nav-item .material-symbols-outlined {
      font-size: 24px;
      color: var(--text-muted);
    }

    .nav-item.active .material-symbols-outlined {
      color: var(--primary);
    }

    .nav-item-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .nav-item.active .nav-item-label {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="header-title">Route Preferences</h1>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-label">Default Route Style</div>
      <div class="segmented-control">
        <div class="segment">Direct</div>
        <div class="segment active">Balanced</div>
        <div class="segment">Scenic</div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Avoid by Default</div>
      <div class="section-card">
        <div class="setting-row">
          <div class="setting-left">
            <span class="material-symbols-outlined setting-icon">remove_road</span>
            <span class="setting-label">Highways</span>
          </div>
          <div class="toggle-switch"></div>
        </div>
        <div class="setting-row">
          <div class="setting-left">
            <span class="material-symbols-outlined setting-icon">toll</span>
            <span class="setting-label">Toll Roads</span>
          </div>
          <div class="toggle-switch"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Personalization</div>
      <div class="section-card">
        <div class="nav-row">
          <div class="nav-left">
            <span class="material-symbols-outlined setting-icon">block</span>
            <div class="nav-details">
              <div class="nav-label">Avoid Areas</div>
              <div class="nav-subtitle">3 areas defined</div>
            </div>
          </div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
        <div class="nav-row">
          <div class="nav-left">
            <span class="material-symbols-outlined setting-icon">favorite</span>
            <div class="nav-details">
              <div class="nav-label">Favorite Roads</div>
              <div class="nav-subtitle">7 saved segments</div>
            </div>
          </div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">
      <span class="material-symbols-outlined">map</span>
      <span class="nav-item-label">Explore</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">bookmark</span>
      <span class="nav-item-label">Saved</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">two_wheeler</span>
      <span class="nav-item-label">Rides</span>
    </div>
    <div class="nav-item active">
      <span class="material-symbols-outlined">person</span>
      <span class="nav-item-label">Profile</span>
    </div>
  </div>
</body>
</html>
