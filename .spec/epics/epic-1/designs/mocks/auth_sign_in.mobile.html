<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Sign In - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-warm: #1f1913;
      --bg-warm-elevated: #25211e;
      --input-bg: #36302b;
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
      --divider: rgba(255,255,255,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-warm);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    /* Header */
    .brand-header {
      text-align: center;
      padding-top: 80px;
      padding-bottom: 32px;
    }

    .app-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary) 0%, #8C5A2B 100%);
      border-radius: 16px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon .material-symbols-outlined {
      font-size: 32px;
    }

    .brand-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .brand-tagline {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 0 24px;
    }

    /* Social Auth */
    .social-auth {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 56px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
    }

    .social-btn.apple {
      background: #FFFFFF;
      color: #000000;
    }

    .social-btn.google {
      background: var(--bg-warm-elevated);
      color: var(--text-primary);
      border: 1px solid var(--divider);
    }

    .social-icon {
      width: 20px;
      height: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--divider);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Form */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .input-field {
      height: 56px;
      background: var(--input-bg);
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 16px;
      color: var(--text-primary);
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .forgot-link {
      text-align: right;
      margin-top: 8px;
    }

    .forgot-link a {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
    }

    /* Primary Button */
    .primary-btn {
      height: 56px;
      background: var(--primary);
      border: none;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 24px;
      box-shadow: 0 8px 16px rgba(184,115,50,0.4);
      cursor: pointer;
    }

    /* Footer */
    .footer {
      padding: 24px;
      text-align: center;
      margin-top: auto;
    }

    .signup-link {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .signup-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .legal-text {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .legal-text a {
      color: var(--text-secondary);
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Brand Header -->
  <div class="brand-header">
    <div class="app-icon">
      <span class="material-symbols-outlined">two_wheeler</span>
    </div>
    <h1 class="brand-title">LaneShadow</h1>
    <p class="brand-tagline">Plan scenic rides with confidence</p>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Social Auth -->
    <div class="social-auth">
      <button class="social-btn apple">
        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
        </svg>
        Continue with Apple
      </button>
      <button class="social-btn google">
        <svg class="social-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <!-- Form -->
    <form class="form">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input type="email" class="input-field" placeholder="Enter your email">
      </div>
      <div class="input-group">
        <label class="input-label">Password</label>
        <input type="password" class="input-field" placeholder="Enter your password">
      </div>
      <div class="forgot-link">
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="primary-btn">Sign In</button>
    </form>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p class="signup-link">Don't have an account? <a href="#">Sign Up</a></p>
    <p class="legal-text">By continuing, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
  </div>
</body>
</html>
