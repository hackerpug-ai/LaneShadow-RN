<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, height=844, initial-scale=1.0">
  <title>Planning Route - LaneShadow</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: rgba(14,15,17,0.95);
      --primary: #B87333;
      --text-primary: rgba(255,255,255,0.92);
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted: rgba(255,255,255,0.55);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 32px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 18px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 8px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .substatus {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
    }

    .progress-fill {
      width: 60%;
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      animation: progress 3s ease-in-out infinite;
    }

    @keyframes progress {
      0% { width: 20%; }
      50% { width: 80%; }
      100% { width: 20%; }
    }

    .cancel-btn {
      position: absolute;
      bottom: 100px;
      background: none;
      border: none;
      font-size: 16px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 12px 24px;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <p class="status-text">Finding scenic roads...</p>
    <p class="substatus">This usually takes 10-15 seconds</p>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <button class="cancel-btn">Cancel</button>
</body>
</html>
