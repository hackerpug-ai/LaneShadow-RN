# LaneShadow User Workflows
# User journeys and interaction flows
# Generated: 2026-01-29

meta:
  version: "1.1"
  lastUpdated: "2026-01-29"
  totalFlows: 15
  trdAligned: true
  phases:
    phase1:
      flows: [onboarding, route-planning, compare-routes, inspect-route, save-route, saved-routes-list, reopen-saved-route, rename-route, delete-route, planning-failure, settings-about]
      trdRef: "TRD §6.2"
    phase2:
      flows: [manage-preferences, manage-favorites, avoid-areas, elevation-view]
      trdRef: "TRD Phase 2 §5.3"
    phase3:
      flows: [rate-ride, ride-history, departure-optimization]
      trdRef: "TRD Phase 3 §4.3"

# ============================================
# PHASE 1: Core Flows (TRD §6.2)
# ============================================

flows:
  # TRD §6.2.1 - Onboarding / Authentication
  onboarding:
    id: flow-000
    name: "Onboarding / Authentication"
    phase: 1
    priority: critical
    trdRef: "TRD §6.2.1"
    description: "User can access planning + saving"
    entry: V010  # SessionRestoring
    exit: V001   # HomeMap

    steps:
      - step: 1
        screen: V010
        action: "Check auth state on app launch"
        branches:
          authenticated:
            condition: "Session valid"
            next: V001
          notAuthenticated:
            condition: "No session"
            next: V008

      - step: 2
        screen: V008
        action: "Sign in"
        branches:
          signIn:
            action: "Complete authentication"
            next: V001
          signUp:
            action: "Create account"
            next: V009

      - step: 3
        screen: V009
        action: "Sign up"
        api: "clerk.signUp"
        next: V001

    diagram: |
      [SessionRestoring V010]
          |
          +-- authenticated --> [HomeMap V001]
          |
          +-- not authenticated --> [SignIn V008]
                                       |
                                       +-- sign in --> [HomeMap V001]
                                       +-- sign up --> [SignUp V009] --> [HomeMap V001]

  # TRD §6.2.2 - Plan a Ride (primary happy path)
  route-planning:
    id: flow-001
    name: "Plan a Ride"
    phase: 1
    priority: critical
    trdRef: "TRD §6.2.2"
    description: "Generate 2-3 route options from intent"
    entry: V001 # HomeMap
    exit:
      - V002 # SavedRoutes (after save)
      - external # Navigation app

    steps:
      - step: 1
        screen: V001
        action: "tap Plan Ride FAB"
        trigger: fabPlanRide
        transition: slideUp
        next: S001

      - step: 2
        screen: S001
        action: "enter origin/destination"
        substeps:
          - "tap origin input → S005 (PlaceSearch)"
          - "tap destination input → S005 (PlaceSearch)"
          - "set scenic bias toggle"
          - "set avoid preferences"
        validation:
          - "origin required"
          - "destination required"
          - "origin != destination"
        next: step3

      - step: 3
        screen: S001
        action: "tap Plan Ride button"
        trigger: primaryButton
        shows: V004 # Loading overlay
        api: "actions.agent.planRide"
        onSuccess: S002
        onError: S004

      - step: 4
        screen: S002
        action: "browse route alternatives"
        substeps:
          - "tap unselected card to select"
          - "compare badges and stats"
          - "view map preview"
        next: step5

      - step: 5
        screen: S002
        action: "tap selected route CTA"
        trigger: viewDetailsButton
        transition: expand
        next: S003

      - step: 6
        screen: S003
        action: "review route details"
        substeps:
          - "view leg breakdown"
          - "check wind conditions"
          - "tap wind legend link → S008"
        branches:
          saveRoute:
            action: "tap Save Route"
            api: "db.savedRoutes.saveRoute"
            next: V002
          backToOptions:
            action: "tap Back to Options"
            next: S002
          startNavigation:
            action: "tap Start Navigation"
            next: external

    diagram: |
      [HomeMap V001]
          |
          | tap "Plan Ride" FAB
          v
      [PlanRideSheet S001]
          |
          | enter origin/destination
          | set preferences
          | tap "Plan Ride"
          v
      [LoadingOverlay V004]
          |
          | API: planRide
          v
      [RouteOptionsSheet S002]

  # TRD §6.2.3 - Compare Route Options
  compare-routes:
    id: flow-002
    name: "Compare Route Options"
    phase: 1
    priority: high
    trdRef: "TRD §6.2.3"
    description: "Quickly understand differences, pick one"
    entry: S002  # RouteOptionsSheet
    exit: S003   # RouteOverviewSheet

    steps:
      - step: 1
        screen: S002
        action: "View 2-3 route cards"
        components: [routeOptionCard, weatherSummaryPill, overlayToggleGroup]

      - step: 2
        screen: S002
        action: "Tap a card to select"
        result: "Map highlights selected route + overlay preview"

      - step: 3
        screen: S002
        action: "Toggle overlay type"
        components: [overlayToggleGroup]
        options: [wind, rain, temperature]

      - step: 4
        screen: S002
        action: "Tap View Details"
        next: S003

    sprint5Additions:
      - sideBySideComparison
      - multiOverlayToggle
      - weatherSummaryPill

    diagram: |
      [RouteOptionsSheet S002]
          |
          | tap card to select
          | toggle overlays
          | compare side-by-side (Sprint 5)
          |
          | tap "View Details"
          v
      [RouteOverviewSheet S003]

  # TRD §6.2.4 - Inspect Route (pre-ride confidence)
  inspect-route:
    id: flow-003
    name: "Inspect Route"
    phase: 1
    priority: high
    trdRef: "TRD §6.2.4"
    description: "Leg-level understanding + overlays + annotations"
    entry: S003  # RouteOverviewSheet

    steps:
      - step: 1
        screen: S003
        action: "View overview + wind advisory + highlights"
        components: [routeHeader, statsRow, conditionPill, legList]

      - step: 2
        screen: S003
        action: "Tap Legend link"
        branches:
          wind:
            next: S005
          rain:
            next: S005a
          temperature:
            next: S005b

      - step: 3
        screen: S003
        action: "Tap annotation on map"
        next: S007

    diagram: |
      [RouteOverviewSheet S003]
          |
          +-- "Wind Legend" --> [WindLegendSheet S005]
          +-- "Rain Legend" --> [RainLegendSheet S005a]
          +-- "Temp Legend" --> [TempLegendSheet S005b]
          +-- tap annotation --> [AnnotationDetailSheet S007]

  # TRD §6.2.5 - Save Route
  save-route:
    id: flow-004
    name: "Save Route"
    phase: 1
    priority: high
    trdRef: "TRD §6.2.5"
    description: "Persist immutable snapshot for identical replay"
    entry: S003  # RouteOverviewSheet
    exit: V001   # HomeMap or V002 SavedRoutes

    steps:
      - step: 1
        screen: S003
        action: "Tap Save Route button"
        api: "db.savedRoutes.saveRoute"
        shows: savingState

      - step: 2
        screen: S003
        action: "Success toast"
        result: "Route saved with immutable snapshot"

      - step: 3
        action: "Dismiss sheets back to map"
        next: V001

    diagram: |
      [RouteOverviewSheet S003]
          |
          | tap "Save Route"
          | API: saveRoute
          v
      [Success Toast]
          |
          v
      [HomeMap V001]

  # TRD §6.2.6 - View Saved Routes List
  saved-routes-list:
    id: flow-002
    name: "Saved Routes Flow"
    phase: 1
    priority: high
    description: "Manage saved routes - view, rename, delete"
    entry: V002

    steps:
      - step: 1
        screen: V002
        action: "view saved routes list"
        substeps:
          - "scroll through routes"
          - "search by name"
        branches:
          viewRoute:
            action: "tap route card"
            next: V003
          addNew:
            action: "tap FAB"
            next: S001
          editMode:
            action: "tap Edit"
            next: step2

      - step: 2
        screen: V003
        action: "view route detail"
        shows: S003 # RouteOverviewSheet
        branches:
          rename:
            action: "long press / menu → Rename"
            next: S006
          delete:
            action: "long press / menu → Delete"
            next: S007
          navigate:
            action: "tap Start Navigation"
            next: external

      - step: 3a
        screen: S006
        action: "rename route"
        substeps:
          - "edit name in input"
          - "tap Save"
        api: "db.savedRoutes.renameRoute"
        next: V003

      - step: 3b
        screen: S007
        action: "delete route"
        substeps:
          - "confirm deletion"
          - "tap Delete"
        api: "db.savedRoutes.deleteRoute"
        next: V002

    diagram: |
      [SavedRoutes V002]
          |
          +-- tap card --> [RouteDetail V003]
          |                    |
          |                    +-- Rename --> [RenameSheet S006]
          |                    +-- Delete --> [DeleteSheet S007]
          |                    +-- Navigate --> [External]
          |
          +-- tap FAB --> [PlanRideSheet S001]
          +-- tap Edit --> [EditMode]

  authentication:
    id: flow-003
    name: "Authentication Flow"
    phase: 1
    priority: critical
    description: "User sign-in and registration"
    entry: A001
    exit: V001

    steps:
      - step: 1
        screen: A001
        action: "choose auth method"
        branches:
          apple:
            action: "tap Continue with Apple"
            next: appleOAuth
          google:
            action: "tap Continue with Google"
            next: googleOAuth
          email:
            action: "enter email/password"
            next: step2

      - step: 2
        screen: A001
        action: "sign in with email"
        validation:
          - "email format"
          - "password required"
        api: "clerk.signIn"
        onSuccess: V001
        onError: showError

      - step: oauth
        action: "OAuth callback"
        api: "clerk.oauth"
        onSuccess: V001
        onError: A001

    diagram: |
      [Login A001]
          |
          +-- "Continue with Apple" --> [Apple OAuth]
          +-- "Continue with Google" --> [Google OAuth]
          +-- email/password --> [Sign In]
          |
          v
      [HomeMap V001]

  location-search:
    id: flow-004
    name: "Location Search Flow"
    phase: 1
    priority: high
    description: "Search and select locations for route planning"
    entry: S001
    exit: S001

    steps:
      - step: 1
        screen: S001
        action: "tap location input"
        trigger: originInput | destinationInput
        transition: slideUp
        next: S005

      - step: 2
        screen: S005
        action: "search for location"
        substeps:
          - "type search query"
          - "view autocomplete results"
          - "or tap recent search chip"

      - step: 3
        screen: S005
        action: "select result"
        trigger: resultRow
        transition: slideDown
        next: S001
        data:
          - name
          - coordinates
          - placeId

    diagram: |
      [PlanRideSheet S001]
          |
          | tap input
          v
      [PlaceSearchSheet S005]
          |
          | search + select
          v
      [PlanRideSheet S001] (populated)

# ============================================
# PHASE 2: Personalization Flows
# ============================================

  manage-preferences:
    id: flow-005
    name: "Manage Preferences Flow"
    phase: 2
    priority: medium
    description: "Set default route generation preferences"
    entry: V011

    steps:
      - step: 1
        screen: V011
        action: "adjust default preferences"
        substeps:
          - "toggle scenic bias default"
          - "toggle avoid highways default"
          - "toggle avoid tolls default"
        api: "db.userPreferences.update"

    diagram: |
      [PreferencesScreen V011]
          |
          +-- toggles --> API: update preferences
          +-- "Avoid Areas" --> [AvoidAreasScreen V012]
          +-- "Favorite Roads" --> [FavoriteRoadsScreen V013]

  manage-favorites:
    id: flow-006
    name: "Manage Favorite Roads Flow"
    phase: 2
    priority: medium
    description: "Save and manage favorite road segments"
    entry: V013

    steps:
      - step: 1
        screen: V013
        action: "browse favorite roads"
        substeps:
          - "scroll through roads"
          - "search by name"

      - step: 2
        screen: V013
        action: "tap road card"
        next: roadDetail
        substeps:
          - "view on map"
          - "edit name/tags"
          - "delete"

    fromRoute:
      entry: S003
      steps:
        - step: 1
          screen: S003
          action: "long press road segment"
          next: S011
        - step: 2
          screen: S011
          action: "save as favorite"
          api: "db.favoriteRoads.add"
          next: S003

    diagram: |
      [FavoriteRoadsScreen V013]
          |
          +-- tap card --> [RoadDetail]

      -- OR from Route Overview --

      [RouteOverviewSheet S003]
          |
          | long press segment
          v
      [AddFavoriteSheet S011]
          |
          | save
          v
      [FavoriteRoadsScreen V013]

  avoid-areas:
    id: flow-007
    name: "Manage Avoid Areas Flow"
    phase: 2
    priority: medium
    description: "Define areas to avoid in route planning"
    entry: V012

    steps:
      - step: 1
        screen: V012
        action: "view avoid areas on map"
        substeps:
          - "see existing areas highlighted"
          - "tap area to edit/delete"

      - step: 2
        screen: V012
        action: "tap Add Area FAB"
        next: drawMode

      - step: 3
        screen: V012
        action: "draw area on map"
        substeps:
          - "draw rectangle bounds"
          - "confirm area"
        next: S010

      - step: 4
        screen: S010
        action: "name and save area"
        api: "db.userPreferences.addAvoidArea"
        next: V012

    diagram: |
      [AvoidAreasScreen V012]
          |
          +-- tap FAB --> [Draw Mode]
          |                  |
          |                  v
          |              [AddAvoidAreaSheet S010]
          |                  |
          |                  | save
          |                  v
          +<-----------------+

  elevation-view:
    id: flow-008
    name: "View Elevation Profile Flow"
    phase: 2
    priority: low
    description: "View elevation chart for route comparison"
    entry: S002

    steps:
      - step: 1
        screen: S002
        action: "tap elevation preview"
        next: S012

      - step: 2
        screen: S012
        action: "view elevation chart"
        substeps:
          - "see elevation over distance"
          - "view ascent/descent totals"
          - "see max grade"

    diagram: |
      [RouteOptionsSheet S002]
          |
          | tap elevation
          v
      [ElevationProfileSheet S012]

# ============================================
# PHASE 3: Post-Ride Flows
# ============================================

  rate-ride:
    id: flow-009
    name: "Rate Completed Ride Flow"
    phase: 3
    priority: high
    description: "Mark ride as complete and add rating/notes"
    entry: V003

    steps:
      - step: 1
        screen: V003
        action: "tap Mark as Completed"
        next: S013

      - step: 2
        screen: S013
        action: "rate the ride"
        substeps:
          - "select 1-5 stars"
          - "add optional notes"
          - "select tags"
        api: "db.savedRoutes.rateRoute"
        next: V003

    diagram: |
      [SavedRouteDetail V003]
          |
          | tap "Mark Complete"
          v
      [RateRouteSheet S013]
          |
          | rate + save
          v
      [SavedRouteDetail V003] (with rating)

  ride-history:
    id: flow-010
    name: "Browse Ride History Flow"
    phase: 3
    priority: medium
    description: "View past completed rides"
    entry: V014

    steps:
      - step: 1
        screen: V014
        action: "browse history"
        substeps:
          - "scroll through months"
          - "view summary stats"

      - step: 2
        screen: V014
        action: "tap ride entry"
        next: S015

      - step: 3
        screen: S015
        action: "view ride details"
        substeps:
          - "see route snapshot"
          - "see conditions at time"
          - "see rating and notes"

    diagram: |
      [RideHistoryScreen V014]
          |
          | tap ride
          v
      [RideDetailSheet S015]

  departure-optimization:
    id: flow-011
    name: "Departure Time Optimization Flow"
    phase: 3
    priority: low
    description: "Find best departure window based on weather"
    entry: S001

    steps:
      - step: 1
        screen: S001
        action: "tap Best Time suggestion"
        next: S014

      - step: 2
        screen: S014
        action: "view optimal windows"
        substeps:
          - "see scored time windows"
          - "view weather for each"
          - "see reasons/warnings"

      - step: 3
        screen: S014
        action: "select window"
        next: S001
        data:
          - selectedTime

    diagram: |
      [PlanRideSheet S001]
          |
          | tap "Best Time"
          v
      [DepartureOptimizerSheet S014]
          |
          | select window
          v
      [PlanRideSheet S001] (time updated)

# ============================================
# Error Flows
# ============================================

  error-recovery:
    id: flow-err-001
    name: "Error Recovery Flow"
    phase: 1
    description: "Handle and recover from errors"

    scenarios:
      networkError:
        trigger: "API timeout or network failure"
        screen: S004
        options:
          - retry: "Retry request"
          - offline: "Show cached data"
          - dismiss: "Return to previous screen"

      routingError:
        trigger: "No routes found"
        screen: S004
        message: "No routes found for these locations"
        options:
          - adjust: "Adjust preferences"
          - different: "Try different locations"

      authError:
        trigger: "Session expired"
        screen: A001
        options:
          - reauth: "Sign in again"

# ============================================
# Navigation Map
# ============================================

navigation:
  bottomTabs:
    - id: explore
      icon: map
      screen: V001
      label: "Explore"
    - id: saved
      icon: bookmark
      screen: V002
      label: "Saved"
    - id: rides
      icon: two_wheeler
      screen: V014
      label: "Rides"
      phase: 3
    - id: profile
      icon: person
      screen: V011
      label: "Profile"
      phase: 2

  sheetPresentations:
    partial:
      height: "65vh"
      dismissible: true
      backdrop: dimmed
    fullHeight:
      height: "85vh"
      dismissible: true
      backdrop: dimmed
    modal:
      height: auto
      dismissible: false
      backdrop: blurred

  transitions:
    slideUp: "sheet presentation"
    slideDown: "sheet dismissal"
    push: "screen navigation"
    modal: "centered sheet"
    expand: "card to detail"
