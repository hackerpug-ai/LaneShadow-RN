# GitButler governance — permissions (generated by but-init from the RULES.md roster).
# Ref-pinned: read at the target ref. Commit with `but commit` for it to take effect.

[[group]]
name = "implementers"
permissions = ["contents:write", "comments:write"]

[[group]]
name = "code-reviewers"
permissions = ["reviews:write", "comments:write", "contents:read"]

[[group]]
name = "maintainers"
permissions = ["merge", "contents:write", "reviews:write", "comments:write", "administration:write"]

[[agent]]
id = "convex-planner"
groups = ["implementers"]

[[agent]]
id = "convex-implementer"
groups = ["implementers"]

[[agent]]
id = "convex-reviewer"
groups = ["code-reviewers"]

[[agent]]
id = "react-native-ui-implementer"
groups = ["implementers"]

[[agent]]
id = "react-native-ui-reviewer"
groups = ["code-reviewers"]

[[agent]]
id = "planner"
groups = ["implementers"]

[[agent]]
id = "orchestrator"
groups = ["maintainers"]
