# Detekt configuration for Android/Kotlin code.
# Activate in lefthook.yml when android/ native code exists.
# Install: brew install detekt
# Docs: https://detekt.dev/docs/introduction/configurations

build:
  maxIssues: 0

complexity:
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

style:
  MaxLineLength:
    maxLineLength: 120
  MagicNumber:
    active: false

naming:
  FunctionNaming:
    functionPattern: '[a-z][a-zA-Z0-9]*'
  VariableNaming:
    variablePattern: '[a-z][a-zA-Z0-9]*'
