name: anti-stub-gate

# Template version: 1.0.0
# Generated by sprint-tasks-plan / _github-kanban / gh-enforcement-bundle-apply.sh
# Source: brain/skills/_github-kanban/templates/workflows/anti-stub-gate.yml
#
# What this workflow enforces:
#   Greps the PR's diff for stub patterns defined in brain/docs/ANTI-STUB-REVIEW.md.
#   Classifies findings by severity: CRITICAL | HIGH | MEDIUM | LOW | OK.
#   Fails the check if any CRITICAL or HIGH finding is in production source
#   (test/mock paths are excluded).
#
# Required by branch protection (rulesets/main-branch.json) as a required status check
# under the context "anti-stub-gate".

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Scan PR diff for stub patterns
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR (full history for base diff)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Compute changed files (added + modified, prod only)
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=200 origin "$BASE_SHA" "$HEAD_SHA" || true
          # Production paths only — exclude tests, mocks, fixtures, snapshots.
          git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" \
            | grep -vE '(/__tests__/|/__mocks__/|\.test\.|\.spec\.|/fixtures/|/snapshots?/|\.snap$)' \
            | grep -E '\.(ts|tsx|js|jsx|swift|kt|kts|go|rs|py)$' \
            > changed_files.txt || true
          count=$(wc -l < changed_files.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [[ "$count" -eq 0 ]]; then
            echo "::notice::no production source files in diff — anti-stub-gate skipped"
          fi

      - name: Run stub-pattern greps
        if: steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          mkdir -p .github/_findings
          findings_file=.github/_findings/stub_findings.json
          echo '[]' > "$findings_file"

          # Pattern set — each pattern emits CRITICAL or HIGH on match in prod source.
          # See brain/docs/ANTI-STUB-REVIEW.md for the canonical rubric.

          run_grep() {
            local pattern="$1"
            local severity="$2"
            local label="$3"
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              [[ ! -f "$f" ]] && continue
              while IFS=: read -r ln_file ln_num ln_text; do
                [[ -z "$ln_file" ]] && continue
                jq --arg sev "$severity" --arg label "$label" --arg file "$ln_file" --arg ln "$ln_num" --arg text "$ln_text" \
                  '. += [{severity: $sev, label: $label, location: ($file + ":" + $ln), evidence: $text}]' \
                  "$findings_file" > "$findings_file.tmp" && mv "$findings_file.tmp" "$findings_file"
              done < <(rg -n --no-heading --color=never "$pattern" "$f" || true)
            done < changed_files.txt
          }

          # CRITICAL — explicit "not implemented" markers in any source
          run_grep 'not implemented|NotImplemented|raise NotImplementedError' CRITICAL "not-implemented marker"

          # HIGH — TODO/FIXME/XXX in production source (excluded test paths above)
          run_grep '(^|[^a-zA-Z_])(TODO|FIXME|XXX):' HIGH "TODO/FIXME/XXX comment"

          # HIGH — function returns null/empty/Promise.resolve() with no body
          run_grep '^\s*return (null|\{\s*\}|\[\s*\]|true|false|Promise\.resolve\(\s*\)|undefined)\s*;?\s*$' HIGH "trivial-return body"

          # HIGH — function/class named Stub|Mock|Fake|Dummy in production source
          run_grep 'function\s+\w*(Stub|Mock|Fake|Dummy)\b' HIGH "stub-named function"
          run_grep 'class\s+\w*(Stub|Mock|Fake|Dummy)\b' HIGH "stub-named class"

          echo "::group::raw findings"
          jq . "$findings_file"
          echo "::endgroup::"

      - name: Classify + gate
        if: steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          findings=.github/_findings/stub_findings.json
          critical=$(jq '[.[] | select(.severity=="CRITICAL")] | length' "$findings")
          high=$(jq '[.[] | select(.severity=="HIGH")] | length' "$findings")
          total=$(jq 'length' "$findings")
          echo "::notice::stub findings — total=$total critical=$critical high=$high"
          if [[ "$critical" -gt 0 || "$high" -gt 0 ]]; then
            echo "::error::anti-stub-gate failed — $critical CRITICAL, $high HIGH findings in production source"
            jq -r '.[] | "- [\(.severity)] \(.location) — \(.label): \(.evidence)"' "$findings" | head -50
            exit 1
          fi
          echo "::notice::anti-stub-gate passed"

      - name: Upload findings artifact
        if: always() && steps.changed.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: stub-findings
          path: .github/_findings/stub_findings.json
          retention-days: 7

      - name: Post findings as PR comment (on failure only)
        if: failure() && steps.changed.outputs.count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          findings=.github/_findings/stub_findings.json
          body=$(jq -r '
            "## anti-stub-gate findings\n\n" +
            (map("- **[\(.severity)]** `\(.location)` — \(.label): `\(.evidence)`") | join("\n"))
          ' "$findings")
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body" || true
