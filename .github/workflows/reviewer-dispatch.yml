name: reviewer-dispatch

# Template version: 1.0.0
# Generated by /init-sprint-repo (or installed manually via gh-workflow-write)
# Source: brain/skills/_github-kanban/templates/workflows/reviewer-dispatch.yml
#
# WHAT THIS DOES
# Runs the run-sprint reviewer agent (pi coding-agent in read-only mode) inside
# a clean GitHub Actions runner whenever a PR receives a new push, OR when the
# orchestrator dispatches it via workflow_dispatch with a punch-back checklist.
#
# WHY (structural defense against reviewer-prompt tampering)
# The reviewer prompt is fetched from brain@main (CODEOWNERS-protected) into a
# separate `.brain/` directory. The implementer-side filesystem of the PR head
# is checked out into the workspace, but pi runs with --tools read,grep,find,ls
# and --no-builtin-tools — it cannot write/edit/execute. The reviewer App's
# installation token is minted in this workflow run and never co-exists with
# any implementer process.
#
# REQUIRED REPO SECRETS
#   REVIEWER_APP_ID      — GitHub App ID for the reviewer role
#   REVIEWER_APP_PEM     — Reviewer App private key (paste raw PEM contents)
#   ANTHROPIC_API_KEY    — Anthropic API key for the LLM provider
#
# REQUIRED REPO CONFIG
#   .github/CODEOWNERS routes .github/workflows/ to a human team (already
#   established by sprint-tasks-plan enforcement bundle)
#
# See: brain/skills/_github-kanban/docs/workflow-dispatch-architecture.md

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
      reason:
        description: 'Why this dispatch (orchestrator punch-back reason: meta-review-failed, thin-remediation, etc.)'
        required: false
        default: 'automatic'
      checklist:
        description: 'Specific items the reviewer must address (orchestrator-provided punch-back checklist)'
        required: false
        default: ''
      brain_ref:
        description: 'Brain repo ref to check out for canonical reviewer prompt (default: main)'
        required: false
        default: 'main'

permissions:
  contents: read
  pull-requests: read   # workflow itself; the minted App token has write for posting reviews

concurrency:
  group: reviewer-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false   # do not cancel a punch-back; queue it

jobs:
  review:
    name: pi reviewer (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve PR number
        id: pr
        env:
          PR_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_FROM_INPUT: ${{ github.event.inputs.pr_number }}
        run: |
          set -euo pipefail
          NUM="${PR_FROM_EVENT:-$PR_FROM_INPUT}"
          if [[ -z "$NUM" ]]; then
            echo "::error::Could not resolve PR number from event payload or workflow_dispatch input"
            exit 1
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "::notice::Reviewing PR #$NUM"

      - name: Checkout PR head (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/pull/${{ steps.pr.outputs.number }}/head

      - name: Checkout brain@${{ github.event.inputs.brain_ref || 'main' }} (canonical reviewer prompt)
        uses: actions/checkout@v4
        with:
          repository: justincrich/brain
          ref: ${{ github.event.inputs.brain_ref || 'main' }}
          path: .brain

      - name: Mint reviewer App installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pi coding-agent
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Verify pi installation
        run: pi --version

      - name: Compute PR diff snapshot
        id: diff
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUM: ${{ steps.pr.outputs.number }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BASE=$(gh pr view "$PR_NUM" --repo "$OWNER_REPO" --json baseRefOid --jq .baseRefOid)
          HEAD=$(gh pr view "$PR_NUM" --repo "$OWNER_REPO" --json headRefOid --jq .headRefOid)
          ISSUE_NUM=$(gh pr view "$PR_NUM" --repo "$OWNER_REPO" --json body --jq '.body' | grep -oE 'Refs #[0-9]+' | head -1 | grep -oE '[0-9]+' || echo "")
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "issue=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          git diff "$BASE...$HEAD" > /tmp/pr.diff
          git diff --name-only "$BASE...$HEAD" > /tmp/changed.txt
          DIFF_LINES=$(wc -l < /tmp/pr.diff | tr -d ' ')
          FILE_COUNT=$(wc -l < /tmp/changed.txt | tr -d ' ')
          echo "::notice::PR diff: $DIFF_LINES lines across $FILE_COUNT files (base=${BASE:0:8} head=${HEAD:0:8})"

      - name: Build reviewer prompt (canonical + punch-back if any)
        id: prompt
        env:
          PUNCH_REASON: ${{ github.event.inputs.reason }}
          PUNCH_CHECKLIST: ${{ github.event.inputs.checklist }}
        run: |
          set -euo pipefail
          PROMPT_PATH=".brain/skills/run-sprint/templates/reviewer-prompt.md"
          if [[ ! -f "$PROMPT_PATH" ]]; then
            echo "::error::Canonical reviewer prompt missing at $PROMPT_PATH"
            exit 1
          fi
          # Compute prompt SHA for audit visibility
          PROMPT_SHA=$(shasum -a 256 "$PROMPT_PATH" 2>/dev/null | awk '{print $1}' || sha256sum "$PROMPT_PATH" | awk '{print $1}')
          echo "prompt_sha=$PROMPT_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::Reviewer prompt SHA-256: $PROMPT_SHA"

          BASE_PROMPT=$(cat "$PROMPT_PATH")

          if [[ -n "$PUNCH_CHECKLIST" ]]; then
            {
              printf '%s\n\n' "$BASE_PROMPT"
              printf '====\n\n'
              printf '## ORCHESTRATOR PUNCH-BACK\n\n'
              printf '**Reason**: %s\n' "$PUNCH_REASON"
              printf '**Required actions** (HARD gate — your review MUST address these):\n\n'
              printf '%s\n\n' "$PUNCH_CHECKLIST"
              printf 'Your prior REVIEWER-STATUS did not meet the orchestrator quality bar. Re-evaluate\n'
              printf 'the PR with the checklist above. Repost both your formal `gh pr review` AND a\n'
              printf 'fresh REVIEWER-STATUS v1 comment that addresses every item in the checklist.\n'
            } > /tmp/system-prompt.md
            echo "::notice::Orchestrator punch-back checklist appended to system prompt"
          else
            cp "$PROMPT_PATH" /tmp/system-prompt.md
          fi
          echo "size=$(wc -c < /tmp/system-prompt.md | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run pi reviewer (READ-ONLY tools + canonical prompt + reviewer App auth)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ISSUE_NUMBER: ${{ steps.diff.outputs.issue }}
          BASE_SHA: ${{ steps.diff.outputs.base }}
          HEAD_SHA: ${{ steps.diff.outputs.head }}
          OWNER_REPO: ${{ github.repository }}
          PROMPT_SHA: ${{ steps.prompt.outputs.prompt_sha }}
        run: |
          set -euo pipefail

          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
          REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)
          CHANGED=$(cat /tmp/changed.txt | tr '\n' ',' | sed 's/,$//')
          ISSUE_FOR_PROMPT="${ISSUE_NUMBER:-unknown}"

          {
            printf 'Review PR #%s in repository %s.\n\n' "$PR_NUMBER" "$OWNER_REPO"
            printf 'CONTEXT\n'
            printf '* HEAD SHA: %s\n' "$HEAD_SHA"
            printf '* BASE SHA: %s\n' "$BASE_SHA"
            printf '* Issue: #%s\n' "$ISSUE_FOR_PROMPT"
            printf '* Reviewer prompt SHA-256: %s\n' "$PROMPT_SHA"
            printf '* Full diff: /tmp/pr.diff\n'
            printf '* Changed files: %s\n\n' "$CHANGED"
            printf 'YOUR TOOLS\n'
            printf 'You have ONLY: read, grep, find, ls.\n'
            printf 'You do NOT have bash, write, or edit.\n'
            printf 'You CANNOT shell out to gh — bash is disabled. Use the helper scripts listed below.\n\n'
            printf 'REQUIRED ACTIONS (from your canonical system prompt)\n'
            printf '1. Read the diff and relevant source files using read/grep/find/ls.\n'
            printf '2. Evaluate every requirement in the Issue REQUIREMENT-CONTRACT v1 block.\n'
            printf '3. Post your formal review via helper:\n'
            printf '   .brain/skills/_github-kanban/helpers/gh-pr-review-post.sh\n'
            printf '     --owner %s --repo %s --pr %s\n' "$OWNER" "$REPO" "$PR_NUMBER"
            printf '     --verdict APPROVED-equivalent|NEEDS_FIXES|REVIEW_INPUT_INVALID\n'
            printf '     --summary "..."\n'
            printf '   You are NEVER permitted to use --approve. APPROVED is reserved for the\n'
            printf '   orchestrator UC-PR-05 escalation path; APPROVED-equivalent maps to\n'
            printf '   `gh pr review --comment`.\n'
            printf '4. Post your REVIEWER-STATUS v1 comment via helper:\n'
            printf '   .brain/skills/_github-kanban/helpers/gh-reviewer-status-append.sh\n'
            printf '     --owner %s --repo %s --issue %s\n' "$OWNER" "$REPO" "$ISSUE_FOR_PROMPT"
            printf '     --status-json -\n'
            printf '   Pipe the JSON payload via stdin per REVIEWER-STATUS v1 schema.\n\n'
            printf 'Return when both posts are confirmed.\n'
          } > /tmp/user-prompt.md

          pi -p \
            --no-builtin-tools \
            --tools read,grep,find,ls \
            --system-prompt "$(cat /tmp/system-prompt.md)" \
            "$(cat /tmp/user-prompt.md)"

      - name: Post-Turn Verification (workflow-side PTV)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ISSUE_NUMBER: ${{ steps.diff.outputs.issue }}
          HEAD_SHA: ${{ steps.diff.outputs.head }}
          OWNER_REPO: ${{ github.repository }}
          REVIEWER_BOT_LOGIN: ${{ steps.token.outputs.app-slug || 'reviewer' }}
          ATTEMPT: '1'   # workflow auto-fire = attempt 1; punch-back also counts as attempt 1 (independent dispatch)
        run: |
          set -euo pipefail
          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
          REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)

          # Reuse the canonical PTV helper from the brain checkout.
          # CYCLE here is derived from REVIEWER-STATUS comment count; helper handles
          # the default-to-1 case for first-cycle reviews.
          CYCLE_FROM_COMMENTS=$(gh api "repos/${OWNER_REPO}/issues/${ISSUE_NUMBER:-${PR_NUMBER}}/comments" --paginate 2>/dev/null | jq '[.[] | select(.body | contains("REVIEWER-STATUS v1 cycle="))] | length' || echo "1")
          CYCLE=${CYCLE_FROM_COMMENTS:-1}
          [[ "$CYCLE" == "0" ]] && CYCLE=1

          echo "::notice::Running PTV against PR #${PR_NUMBER} cycle ${CYCLE}"

          .brain/skills/_github-kanban/helpers/verify-subagent-turn.sh \
            --role reviewer \
            --owner "$OWNER" --repo "$REPO" \
            --pr "$PR_NUMBER" --issue "${ISSUE_NUMBER:-$PR_NUMBER}" \
            --expected-sha "$HEAD_SHA" \
            --cycle "$CYCLE" \
            --attempt "$ATTEMPT" \
            --json-only > /tmp/ptv.json

          PTV_EXIT=$?
          jq . /tmp/ptv.json || true

          if [[ $PTV_EXIT -ne 0 ]]; then
            echo "::error::PTV failed for PR #${PR_NUMBER}"
            jq -r '.checks[] | select(.passed == false) | "FAIL: \(.id) — \(.detail)"' /tmp/ptv.json >&2 || true
            exit $PTV_EXIT
          fi

          echo "::notice::PTV passed for PR #${PR_NUMBER} cycle ${CYCLE}"

      - name: Upload PTV result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ptv-result-pr-${{ steps.pr.outputs.number }}
          path: /tmp/ptv.json
          retention-days: 14
          if-no-files-found: warn
