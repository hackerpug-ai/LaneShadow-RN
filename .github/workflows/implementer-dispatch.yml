name: implementer-dispatch

# Template version: 1.0.0
# Generated by /init-sprint-repo (or installed manually via gh-workflow-write)
# Source: brain/skills/_github-kanban/templates/workflows/implementer-dispatch.yml
#
# WHAT THIS DOES
# Runs the run-sprint implementer agent (pi coding-agent with full tools) inside
# a clean GitHub Actions runner when the orchestrator labels an Issue with
# `agent:dispatch-implementer`, OR when an orchestrator manually triggers via
# workflow_dispatch with the issue number.
#
# WHY (orchestrator-gated dispatch + tamper-resistant prompt)
# The dispatch label can only be added by the orchestrator App (enforced by
# `if: github.actor` guard below). The implementer prompt is fetched from
# brain@main (CODEOWNERS-protected) into a separate `.brain/` directory. The
# implementer App's installation token is minted in this workflow run and never
# co-exists with the reviewer App in any process.
#
# REQUIRED REPO SECRETS
#   IMPLEMENTER_APP_ID    — GitHub App ID for the implementer role
#   IMPLEMENTER_APP_PEM   — Implementer App private key (paste raw PEM contents)
#   ANTHROPIC_API_KEY     — Anthropic API key for the LLM provider
#
# REQUIRED REPO CONFIG
#   `agent:dispatch-implementer` label exists in the target repo (created by
#   gh-label-vocabulary-apply.sh as part of the canonical kanban setup)
#   Orchestrator App login matches the actor-guard expression below
#
# See: brain/skills/_github-kanban/docs/workflow-dispatch-architecture.md

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number representing the task to implement'
        required: true
      sprint_id:
        description: 'Sprint identifier (e.g. sprint-09)'
        required: true
      reason:
        description: 'Why this dispatch (initial / re-dispatch / cycle-N-remediation)'
        required: false
        default: 'initial'
      reviewer_feedback:
        description: 'Reviewer feedback to address (passed by orchestrator on remediation cycles)'
        required: false
        default: ''
      brain_ref:
        description: 'Brain repo ref to check out for canonical implementer prompt (default: main)'
        required: false
        default: 'main'

permissions:
  contents: read
  issues: read
  pull-requests: read   # workflow itself; minted App token has write

concurrency:
  group: implementer-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  guard:
    name: actor + label guard
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - id: gate
        env:
          ACTOR: ${{ github.actor }}
          LABEL_NAME: ${{ github.event.label.name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          PROCEED="false"
          # Orchestrator-bot login pattern: <handle>-orchestrator[bot]
          # The actor MUST end in -orchestrator[bot] for the issues-labeled trigger.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # Manual orchestrator-initiated dispatch is always allowed (workflow_dispatch
            # itself requires the actor to have write access via App permission scoping).
            PROCEED="true"
            echo "::notice::workflow_dispatch trigger — proceeding"
          elif [[ "$EVENT_NAME" == "issues" && "$LABEL_NAME" == "agent:dispatch-implementer" ]]; then
            if [[ "$ACTOR" == *-orchestrator* ]]; then
              PROCEED="true"
              echo "::notice::Label added by orchestrator actor ($ACTOR) — proceeding"
            else
              echo "::warning::Label added by non-orchestrator actor ($ACTOR) — refusing dispatch"
            fi
          else
            echo "::notice::Event/label combo does not match implementer dispatch trigger — skipping"
          fi
          echo "proceed=$PROCEED" >> "$GITHUB_OUTPUT"

  implement:
    name: pi implementer (full tools)
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve issue + sprint
        id: ctx
        env:
          ISSUE_FROM_EVENT: ${{ github.event.issue.number }}
          ISSUE_FROM_INPUT: ${{ github.event.inputs.issue_number }}
          SPRINT_FROM_INPUT: ${{ github.event.inputs.sprint_id }}
        run: |
          set -euo pipefail
          NUM="${ISSUE_FROM_EVENT:-$ISSUE_FROM_INPUT}"
          if [[ -z "$NUM" ]]; then
            echo "::error::Could not resolve issue number"
            exit 1
          fi
          echo "issue=$NUM" >> "$GITHUB_OUTPUT"
          echo "sprint=${SPRINT_FROM_INPUT:-unknown}" >> "$GITHUB_OUTPUT"
          echo "::notice::Implementing Issue #$NUM (sprint=${SPRINT_FROM_INPUT:-unknown})"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout brain@${{ github.event.inputs.brain_ref || 'main' }} (canonical implementer prompt)
        uses: actions/checkout@v4
        with:
          repository: justincrich/brain
          ref: ${{ github.event.inputs.brain_ref || 'main' }}
          path: .brain

      - name: Mint implementer App installation token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.IMPLEMENTER_APP_ID }}
          private-key: ${{ secrets.IMPLEMENTER_APP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pi coding-agent
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Verify pi installation
        run: pi --version

      - name: Fetch issue body
        id: issue
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE_NUM: ${{ steps.ctx.outputs.issue }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY=$(gh issue view "$ISSUE_NUM" --repo "$OWNER_REPO" --json body --jq .body)
          BODY_SHA=$(printf '%s' "$BODY" | shasum -a 256 2>/dev/null | awk '{print $1}' || printf '%s' "$BODY" | sha256sum | awk '{print $1}')
          # Emit body to a file (preserves newlines + shell-safety)
          printf '%s' "$BODY" > /tmp/issue-body.md
          echo "body_sha=$BODY_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::Issue body SHA-256: $BODY_SHA"

      - name: Build implementer prompt (canonical + reviewer feedback if any)
        id: prompt
        env:
          REVIEWER_FEEDBACK: ${{ github.event.inputs.reviewer_feedback }}
          REASON: ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail
          PROMPT_PATH=".brain/skills/run-sprint/templates/implementer-prompt.md"
          if [[ ! -f "$PROMPT_PATH" ]]; then
            echo "::error::Canonical implementer prompt missing at $PROMPT_PATH"
            exit 1
          fi
          PROMPT_SHA=$(shasum -a 256 "$PROMPT_PATH" 2>/dev/null | awk '{print $1}' || sha256sum "$PROMPT_PATH" | awk '{print $1}')
          echo "prompt_sha=$PROMPT_SHA" >> "$GITHUB_OUTPUT"
          echo "::notice::Implementer prompt SHA-256: $PROMPT_SHA"

          BASE_PROMPT=$(cat "$PROMPT_PATH")

          if [[ -n "$REVIEWER_FEEDBACK" ]]; then
            {
              printf '%s\n\n' "$BASE_PROMPT"
              printf '====\n\n'
              printf '## REVIEWER FEEDBACK (cycle remediation)\n\n'
              printf '**Dispatch reason**: %s\n\n' "$REASON"
              printf 'The prior cycle reviewer returned NEEDS_FIXES with this feedback. You MUST\n'
              printf 'address every item before pushing your next commit.\n\n'
              printf '%s\n' "$REVIEWER_FEEDBACK"
            } > /tmp/system-prompt.md
            echo "::notice::Reviewer feedback appended to system prompt"
          else
            cp "$PROMPT_PATH" /tmp/system-prompt.md
          fi

      - name: Run pi implementer (full tools + canonical prompt + implementer App auth)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          SPRINT_ID: ${{ steps.ctx.outputs.sprint }}
          ISSUE_BODY_SHA: ${{ steps.issue.outputs.body_sha }}
          PROMPT_SHA: ${{ steps.prompt.outputs.prompt_sha }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)

          {
            printf 'Implement the task described in Issue #%s of repository %s.\n\n' "$ISSUE_NUMBER" "$OWNER_REPO"
            printf 'CONTEXT\n'
            printf '* Issue body: /tmp/issue-body.md\n'
            printf '* Issue body SHA-256: %s (echo this back in your IMPLEMENTER-CHANGES comment under issue_body_sha)\n' "$ISSUE_BODY_SHA"
            printf '* Sprint: %s\n' "$SPRINT_ID"
            printf '* Implementer prompt SHA-256: %s\n\n' "$PROMPT_SHA"
            printf 'YOUR TOOLS\n'
            printf 'You have: read, grep, find, ls, bash, write, edit. Full standard set.\n'
            printf 'You authenticate to GitHub as the implementer bot (%s-implementer[bot]) via $GH_TOKEN.\n\n' "$OWNER"
            printf 'REQUIRED ACTIONS (from your canonical system prompt)\n'
            printf '1. Read the issue body at /tmp/issue-body.md.\n'
            printf '2. Create a task branch task/{TASK_ID} (extract TASK_ID from issue title).\n'
            printf '3. Implement the change. No stubs, no placeholders.\n'
            printf '4. Verify locally: run typecheck + lint + tests as appropriate for the stack.\n'
            printf '5. Commit with message: "{TASK_ID}: <summary>" + body "Refs #%s".\n' "$ISSUE_NUMBER"
            printf '6. Push: git push -u origin task/{TASK_ID}.\n'
            printf '7. Open or update the PR targeting sprint/%s if it does not exist.\n' "$SPRINT_ID"
            printf '8. Post the IMPLEMENTER-CHANGES v1 PR comment with spec-ack\n'
            printf '   (issue_body_sha: %s, AC list, cycle counter).\n' "$ISSUE_BODY_SHA"
            printf '9. Mark PR ready for review on cycle 1: gh pr ready <PR_NUM>.\n\n'
            printf 'Return when push + comment succeed.\n'
          } > /tmp/user-prompt.md

          pi -p \
            --system-prompt "$(cat /tmp/system-prompt.md)" \
            "$(cat /tmp/user-prompt.md)"

      - name: Post-Turn Verification (workflow-side PTV)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.issue }}
          OWNER_REPO: ${{ github.repository }}
          ATTEMPT: '1'
        run: |
          set -euo pipefail
          OWNER=$(echo "$OWNER_REPO" | cut -d/ -f1)
          REPO=$(echo "$OWNER_REPO" | cut -d/ -f2)

          # Resolve PR opened by this implementer turn
          PR_NUMBER=$(gh pr list --repo "$OWNER_REPO" --search "Refs #${ISSUE_NUMBER} in:body" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [[ -z "$PR_NUMBER" ]]; then
            echo "::error::Could not resolve PR for Issue #${ISSUE_NUMBER} — implementer did not open one?"
            exit 1
          fi

          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$OWNER_REPO" --json headRefOid --jq .headRefOid)

          # Compute cycle from existing implementer-changes comments
          CYCLE=$(gh api "repos/${OWNER_REPO}/issues/${PR_NUMBER}/comments" --paginate 2>/dev/null | jq '[.[] | select(.body | contains("IMPLEMENTER-CHANGES v1"))] | length' || echo "1")
          [[ "$CYCLE" == "0" ]] && CYCLE=1

          .brain/skills/_github-kanban/helpers/verify-subagent-turn.sh \
            --role implementer \
            --owner "$OWNER" --repo "$REPO" \
            --pr "$PR_NUMBER" --issue "$ISSUE_NUMBER" \
            --expected-sha "$HEAD_SHA" \
            --cycle "$CYCLE" \
            --attempt "$ATTEMPT" \
            --json-only > /tmp/ptv.json

          PTV_EXIT=$?
          jq . /tmp/ptv.json || true

          if [[ $PTV_EXIT -ne 0 ]]; then
            echo "::error::PTV failed for Issue #${ISSUE_NUMBER} / PR #${PR_NUMBER}"
            jq -r '.checks[] | select(.passed == false) | "FAIL: \(.id) — \(.detail)"' /tmp/ptv.json >&2 || true
            exit $PTV_EXIT
          fi

          echo "::notice::PTV passed for PR #${PR_NUMBER} cycle ${CYCLE}"

      - name: Upload PTV result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ptv-result-issue-${{ steps.ctx.outputs.issue }}
          path: /tmp/ptv.json
          retention-days: 14
          if-no-files-found: warn
