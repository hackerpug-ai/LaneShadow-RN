name: requirement-contract-compliance

# Template version: 1.0.0
# Generated by sprint-tasks-plan / _github-kanban / gh-enforcement-bundle-apply.sh
# Source: brain/skills/_github-kanban/templates/workflows/requirement-contract-compliance.yml
#
# What this workflow enforces:
#   1. PR body references a task Issue via "Closes #N" / "Fixes #N" / "Resolves #N"
#   2. The linked Issue carries a valid <!-- REQUIREMENT-CONTRACT v1 --> block
#   3. The contract passes structural validation (per brain/docs/kanban/REQUIREMENT-CONTRACT-V1.md)
#   4. Every acceptance_criterion's `verify` command executes successfully
#
# Required by branch protection (rulesets/main-branch.json) as a required status check
# under the context "requirement-contract-compliance".

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  parse-contract:
    name: Parse + validate REQUIREMENT-CONTRACT v1
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.linkup.outputs.issue_number }}
      ac_matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Find linked Issue
        id: linkup
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          issue_number=$(printf '%s' "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | head -n1 | grep -oE '[0-9]+' || true)
          if [[ -z "$issue_number" ]]; then
            echo "::error::PR body must reference a task Issue with 'Closes #N' / 'Fixes #N' / 'Resolves #N'"
            exit 1
          fi
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: Extract contract from Issue body
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.linkup.outputs.issue_number }}
        run: |
          set -euo pipefail
          mkdir -p .github/_contract
          body=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json body --jq '.body')
          printf '%s' "$body" | awk '
            /<!-- REQUIREMENT-CONTRACT v1 -->/ { found=1; next }
            found && /^<!--$/                 { in_block=1; next }
            in_block && /^-->$/               { in_block=0; exit }
            in_block                          { print }
          ' > .github/_contract/contract.json
          if [[ ! -s .github/_contract/contract.json ]]; then
            echo "::error::Issue #${ISSUE_NUMBER} missing <!-- REQUIREMENT-CONTRACT v1 --> block"
            exit 1
          fi
          jq . .github/_contract/contract.json > /dev/null || { echo "::error::REQUIREMENT-CONTRACT JSON parse failed"; exit 1; }
          echo "::notice::Extracted contract from Issue #${ISSUE_NUMBER}"

      - name: Validate schema
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.linkup.outputs.issue_number }}
        run: |
          set -euo pipefail
          c=.github/_contract/contract.json

          # version
          version=$(jq -r .version "$c")
          [[ "$version" == "1" ]] || { echo "::error::expected version='1', got '$version'"; exit 1; }

          # task_id matches Issue title prefix [TASK-ID]
          task_id=$(jq -r .task_id "$c")
          title=$(gh issue view "$ISSUE_NUMBER" --repo "${{ github.repository }}" --json title --jq '.title')
          prefix=$(printf '%s' "$title" | sed -nE 's/^\[([^]]+)\].*$/\1/p')
          [[ "$task_id" == "$prefix" ]] || { echo "::error::task_id '$task_id' != Issue title prefix '$prefix'"; exit 1; }

          # verification_policy
          jq -e '.verification_policy.requires_tests | type == "boolean"' "$c" > /dev/null \
            || { echo "::error::verification_policy.requires_tests not boolean"; exit 1; }
          jq -e '.verification_policy.requires_red_evidence | type == "boolean"' "$c" > /dev/null \
            || { echo "::error::verification_policy.requires_red_evidence not boolean"; exit 1; }

          # requirements: ≥4; ≥1 TC; id format; verify non-empty
          count=$(jq '.requirements | length' "$c")
          [[ "$count" -ge 4 ]] || { echo "::error::requirements has $count entries; minimum is 4"; exit 1; }
          tc=$(jq '[.requirements[] | select(.type=="test_criterion")] | length' "$c")
          [[ "$tc" -ge 1 ]] || { echo "::error::no test_criterion entries; minimum is 1"; exit 1; }
          jq -e '.requirements | all(.id | test("^(AC|TC)-[1-9][0-9]*$"))' "$c" > /dev/null \
            || { echo "::error::one or more requirement IDs are malformed"; exit 1; }
          jq -e '.requirements | all(.verify | length > 0)' "$c" > /dev/null \
            || { echo "::error::one or more verify fields are empty"; exit 1; }

          # AC IDs contiguous from 1
          ac_ids=$(jq -r '[.requirements[] | select(.type=="acceptance_criterion") | .id | sub("^AC-"; "") | tonumber] | sort' "$c")
          expected_ac=$(jq -nc --argjson n "$(echo "$ac_ids" | jq 'length')" '[range(1; $n + 1)]')
          [[ "$(echo "$ac_ids" | jq -c)" == "$expected_ac" ]] || { echo "::error::AC IDs not contiguous from 1: $ac_ids"; exit 1; }

          # TC IDs contiguous from 1
          tc_ids=$(jq -r '[.requirements[] | select(.type=="test_criterion") | .id | sub("^TC-"; "") | tonumber] | sort' "$c")
          expected_tc=$(jq -nc --argjson n "$(echo "$tc_ids" | jq 'length')" '[range(1; $n + 1)]')
          [[ "$(echo "$tc_ids" | jq -c)" == "$expected_tc" ]] || { echo "::error::TC IDs not contiguous from 1: $tc_ids"; exit 1; }

          # Every TC has maps_to_ac matching an existing AC
          ac_list=$(jq -c '[.requirements[] | select(.type=="acceptance_criterion") | .id]' "$c")
          bad_tc=$(jq --argjson ac "$ac_list" \
            '[.requirements[] | select(.type=="test_criterion") | select(.maps_to_ac == null or (.maps_to_ac as $m | $ac | index($m) | not)) | .id]' "$c")
          [[ "$(echo "$bad_tc" | jq 'length')" -eq 0 ]] \
            || { echo "::error::test_criterion(s) with bad maps_to_ac: $bad_tc"; exit 1; }

          # Every AC has maps_to_ac == null
          bad_ac=$(jq '[.requirements[] | select(.type=="acceptance_criterion") | select(.maps_to_ac != null) | .id]' "$c")
          [[ "$(echo "$bad_ac" | jq 'length')" -eq 0 ]] \
            || { echo "::error::acceptance_criterion(s) with non-null maps_to_ac: $bad_ac"; exit 1; }

          echo "::notice::contract schema valid — task_id=$task_id, requirements=$count (TCs=$tc)"

      - name: Upload contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: requirement-contract
          path: .github/_contract/contract.json
          retention-days: 7

      - name: Build per-AC matrix
        id: matrix
        run: |
          set -euo pipefail
          matrix=$(jq -c '{include: [.requirements[] | select(.type=="acceptance_criterion") | {id: .id, verify: .verify}]}' .github/_contract/contract.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  per-ac:
    name: Verify ${{ matrix.id }}
    needs: parse-contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.parse-contract.outputs.ac_matrix) }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup project runtime
        run: |
          set -euo pipefail
          # Detect package manager and install dependencies.
          # Projects with non-standard setups should add a composite action at
          # `.github/actions/setup-runtime/` and replace this step.
          if [[ -f bun.lockb || -f bun.lock ]]; then
            curl -fsSL https://bun.sh/install | bash
            echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --frozen-lockfile
          elif [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            pnpm install --frozen-lockfile
          elif [[ -f package-lock.json ]]; then
            npm ci
          elif [[ -f package.json ]]; then
            npm install
          fi

      - name: Run verify for ${{ matrix.id }}
        env:
          VERIFY: ${{ matrix.verify }}
        run: |
          set -euo pipefail
          echo "::group::${{ matrix.id }}: $VERIFY"
          bash -lc "$VERIFY"
          echo "::endgroup::"

  aggregate:
    name: All requirements verified
    needs: [parse-contract, per-ac]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Gate
        run: |
          set -euo pipefail
          parse="${{ needs.parse-contract.result }}"
          per_ac="${{ needs.per-ac.result }}"
          if [[ "$parse" != "success" || "$per_ac" != "success" ]]; then
            echo "::error::compliance failed (parse-contract=$parse, per-ac=$per_ac)"
            exit 1
          fi
          echo "::notice::all REQUIREMENT-CONTRACT v1 checks passed"
