# RUX-006 E2E test: Map opens with no route centered on current location
#
# Acceptance Criterion (AC-1):
#   GIVEN: Fresh install with simulator location set to a known city + location permission granted
#   WHEN: Signed-in home opens
#   THEN: No route is rendered, and the native map camera reports centered on
#         the current device location at the current-location opening zoom.
#
# Test Procedure:
# 1. Launch the dev client with clearState (fresh install)
# 2. Sign in via e2e-test-login-button (programmatic Clerk auth)
# 3. Wait for home to load (chat-input visible)
# 4. Verify no route is rendered
# 5. Verify the map camera reports centered on the set simulator location
# 6. Capture a screenshot for visual evidence
#
# Pre-steps (manual, one-time):
#   - Set simulator location: Xcode > Simulator > Features > Location >
#     Custom Location (e.g., Denver at 39.7392, -104.9903)
#   - Run the app with EXPO_PUBLIC_E2E=1 (dev build)
#
# Run: maestro test .maestro/rux-006-open-at-current-location.yaml \
#      -e EMAIL=$CLERK_TEST_EMAIL -e PASSWORD=$CLERK_TEST_PASSWORD
#
appId: com.hackerpug.laneshadow
---
- launchApp:
    clearState: true
    clearKeychain: true

# Dev-client: wait for the Metro server selection or app to render
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Lane Shadow"
    timeout: 60000
- runFlow:
    when:
      visible: { text: "DEVELOPMENT SERVERS" }
    commands:
      - tapOn:
          text: ".*localhost:8081.*"

# Wait for the JS bundle and sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email|.*developer menu.*|Reload|Go home|Toggle performance monitor|Toggle element inspector|Open JS debugger|Close"
    timeout: 240000
- runFlow:
    when:
      visible: { text: ".*developer menu.*" }
    commands:
      - tapOn: { text: "Continue" }
# The Expo dev-client panel can stay open after the intro; close it deterministically.
- runFlow:
    when:
      visible: { text: "Close" }
    commands:
      - tapOn: { text: "Close" }

# Wait for sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email"
    timeout: 300000

# ── AC-1: Sign in via e2e-test-login-button and verify map opens at current location ──
- runFlow:
    when:
      visible: { id: "e2e-test-login-button" }
    commands:
      - tapOn: { id: "e2e-test-login-button" }

# Wait for home to fully load — chat input visible indicates map + chat are ready
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000
- assertNotVisible:
    id: "route-on-map-marker"
- assertNotVisible:
    id: "route-line-on-map-marker"

# Deterministic app-level e2e gate:
# `map-centered-on-user-marker` is rendered only after Mapbox's native camera
# callback reports a center within 250m of the app-resolved device location,
# with no route displayed and zoom at the current-location opening level.
- extendedWaitUntil:
    visible:
      id: "map-centered-on-user-marker"
    timeout: 30000

# Screenshot 1: visual evidence for the deterministic assertion above.
- takeScreenshot: 01-map-opens-at-current-location
