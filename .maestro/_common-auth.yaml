appId: com.hackerpug.laneshadow
---

# _common-auth.yaml — Shared auth helper (cold OR warm, idempotent).
#
# CALLER owns launchApp. Handles:
#   - Dev-server picker (tap localhost:8081 to connect)
#   - Dev menu popup (dismiss)
#   - Login screen (tap E2E test button)
#   - Already-authenticated warm start (skip login, go to home)
#
# End state: chat-input visible (authenticated, on plan tab).

# Step 1: Wait for ANY app surface — dev server picker, login, or home.
# The dev client may auto-connect (skip picker) on warm launches.
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Login with Email|Plan|Saved|chat|laneshadow|Where|Route"
    timeout: 180000

# Step 2: Tap dev server if the picker is showing.
- runFlow:
    when:
      visible: { text: "DEVELOPMENT SERVERS" }
    commands:
      - tapOn:
          text: ".*localhost:8081.*"

# Step 3: Dismiss dev menu popup if it appeared.
- runFlow:
    when:
      visible: { text: ".*developer menu.*" }
    commands:
      - tapOn: { text: "Continue" }
- runFlow:
    when:
      visible: { text: "Close" }
    commands:
      - tapOn: { text: "Close" }

# Step 4: If login screen is visible, authenticate via E2E button.
- runFlow:
    when:
      visible: { text: "Login with Email" }
    commands:
      - tapOn: { id: "e2e-test-login-button" }

# Step 5: Ensure we reach the authenticated home (chat-input).
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 180000