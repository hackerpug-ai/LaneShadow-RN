# Regression flow for the Sprint-01 post-test fixes (FIX-001):
#   A1 — sendMessage no longer throws ReturnsValidationError (thinkingSteps) on
#        the 2nd turn, so routes actually render.
#   A3 — the planner uses device location as the origin for destination-only
#        requests and never asks "where are you starting from?".
#   A2 — (visual) map opens centered on the rider at zoom 14, not "max zoom".
#
# Proves the exact failing flow from the bug report.
#
# NOTE: Maestro 2.5.1 has no `textRegex` key — `text` is already a full-match
# regex (so wildcard URLs/labels with .* ). The dev-client cold-connect can
# bounce back to the launcher after the first-run dev-menu, so the preamble
# reconnects if that happens.
#
# Run: maestro test .maestro/fix-001-route-planning.yaml -e EMAIL=... -e PASSWORD=...
# Requires a simulated device location set so the agent has an origin to use.
appId: com.hackerpug.laneshadow
---
- launchApp:
    clearState: true
    clearKeychain: true

# ── Connect to Metro + dismiss the dev-menu intro/panel ──────────────────────
- extendedWaitUntil:
    visible: { text: "DEVELOPMENT SERVERS|Login with Email" }
    timeout: 60000
- runFlow:
    when: { visible: { text: "DEVELOPMENT SERVERS" } }
    commands:
      - tapOn: { text: ".*localhost:8081.*" }
# First-run dev-menu intro appears; its "Continue" opens the DevMenu panel.
- extendedWaitUntil:
    visible: { text: "Login with Email|.*developer menu.*" }
    timeout: 240000
- runFlow:
    when: { visible: { text: ".*developer menu.*" } }
    commands:
      - tapOn: { text: "Continue" }
# The DevMenu panel (header "DevMenu", options like Reload) opens over the app;
# dismiss it by tapping the backdrop near the top of the screen.
- runFlow:
    when: { visible: { text: ".*Toggle Element Inspector.*|.*Open React DevTools.*" } }
    commands:
      - tapOn: { point: "50%, 8%" }
# Bundle transfer can take a while on first connect; wait for the sign-in screen.
- extendedWaitUntil:
    visible: { text: "Login with Email" }
    timeout: 300000
- takeScreenshot: fix001-01-launch

# ── SIGN-IN via the hidden E2E test-login button (programmatic email+password)─
# Button only renders in dev builds bundled with EXPO_PUBLIC_E2E=1.
- extendedWaitUntil:
    visible: { id: "e2e-test-login-button" }
    timeout: 60000
- tapOn: { id: "e2e-test-login-button" }

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000
# A2 (visual only): map should open centered on the rider at ~zoom 14.
- takeScreenshot: fix001-02-home-centered-on-rider

# ── A3 + A1 turn 1: destination-only request plans from current location ─────
# The ChatInput container encapsulates its children in the iOS a11y tree, so tap
# the container to focus, type, then submit via the keyboard Enter key
# (onSubmitEditing -> handleSend).
- tapOn:
    id: "chat-input"
- inputText: "Plan a scenic motorcycle route from San Francisco to Santa Cruz"
- pressKey: Enter
# A1 success gate: a routing card renders (impossible while sendMessage crashed).
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 150000
# A3: the turn completed — confirm the agent never asked for the origin and the
# crash toast never appeared.
- assertNotVisible:
    text: "where are you starting from"
- assertNotVisible:
    text: "ReturnsValidationError"
- takeScreenshot: fix001-03-turn1-route-planned-from-current-location

# ── A1 turn 2: a second message must NOT crash on history load ───────────────
- tapOn:
    id: "chat-input"
- inputText: "make it about 2 hours long"
- pressKey: Enter
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 150000
- assertNotVisible:
    text: "ReturnsValidationError"
- takeScreenshot: fix001-04-turn2-no-crash-route-continues
