# Regression flow for the Sprint-01 post-test fixes (FIX-001):
#   A1 — sendMessage no longer throws ReturnsValidationError (thinkingSteps) on
#        the 2nd turn, so routes actually render.
#   A3 — the planner uses device location as the origin for destination-only
#        requests and never asks "where are you starting from?".
#   A2 — (visual) map opens centered on the rider at zoom 14, not "max zoom".
#        Maestro cannot assert numeric zoom, so this is captured by the launch
#        screenshot + verified via the location-hold logic in code review.
#
# Proves the exact failing flow from the bug report: send a destination-only
# request, confirm it plans from the current location with no crash, then send a
# second turn and confirm the session does not crash on history load.
#
# Run: maestro test .maestro/fix-001-route-planning.yaml -e EMAIL=... -e PASSWORD=...
# Requires a simulated device location set so the agent has an origin to use.
appId: com.hackerpug.laneshadow
---
- launchApp:
    clearState: true
    clearKeychain: true

# Dev-client: connect to the running Metro server if the launcher appears.
- runFlow:
    when:
      visible:
        text: "localhost:8081"
    commands:
      - tapOn:
          text: "localhost:8081"

- extendedWaitUntil:
    visible:
      text: "Lane Shadow"
    timeout: 120000
- takeScreenshot: fix001-01-launch

# ── SIGN-IN ──────────────────────────────────────────────────────────────────
- runFlow:
    when:
      visible: { text: "Login with Email" }
    commands:
      - tapOn: { text: "Login with Email" }
      - extendedWaitUntil:
          visible: { text: "Enter your email" }
          timeout: 20000
      - tapOn:
          label: "Email Address field"
      - inputText: ${EMAIL}
      - tapOn: { text: "Continue" }
      - extendedWaitUntil:
          visible: { text: "Enter your password" }
          timeout: 30000
      - tapOn:
          label: "Password field"
      - inputText: ${PASSWORD}
      - tapOn: { text: "Sign In" }

- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000
# A2 (visual only): the map should open centered on the rider at ~zoom 14.
- takeScreenshot: fix001-02-home-centered-on-rider

# ── A3 + A1 turn 1: destination-only request plans from current location ─────
- tapOn:
    id: "chat-input-text-field"
- inputText: "Day trip to santa cruz"
- tapOn:
    id: "chat-input-send-button"
# A3: the agent must NOT ask for the starting location.
- assertNotVisible:
    text: "where are you starting from"
# A1: the action must NOT throw the ReturnsValidationError toast.
- assertNotVisible:
    textRegex: "ReturnsValidationError"
- assertNotVisible:
    textRegex: "CONVEX A\\(actions/agent/sendMessage"
# Success signal: a routing card renders (impossible while the action crashed).
- extendedWaitUntil:
    visible:
      id: "routing-card.*"
    timeout: 120000
- takeScreenshot: fix001-03-turn1-route-planned-from-current-location

# ── A1 turn 2: a second message must NOT crash on history load ───────────────
# This is the exact regression: turn 1 wrote thinking_steps, so the 2nd turn's
# listWithPiMessages history load previously threw (extra field thinkingSteps).
- tapOn:
    id: "chat-input-text-field"
- inputText: "make it about 2 hours long"
- tapOn:
    id: "chat-input-send-button"
- assertNotVisible:
    textRegex: "ReturnsValidationError"
- assertNotVisible:
    textRegex: "CONVEX A\\(actions/agent/sendMessage"
# The agent continues the session (another route card or a text reply). Wait for
# the routing card to refresh; if it instead asks for clarification text, that's
# still a pass for A1 (no crash) — the crash is what we're guarding against.
- extendedWaitUntil:
    visible:
      id: "routing-card.*"
    timeout: 120000
    optional: true
- takeScreenshot: fix001-04-turn2-no-crash-route-continues
