# RUX-005 E2E test: Route Details Sheet action buttons are always visible and reachable
#
# Bug: route-details-sheet.tsx uses preset='half' (single 60% snap) with flex ScrollView
# followed by actions View OUTSIDE the scroll. On tall content, the Save button is cut off
# and never reaches the bottom of the sheet.
#
# Fix: Adopt route-directions-sheet.tsx pattern — multi-stop snap (60%→90%) + pinned footer
# above safe area insets, so Save button is always reachable at every snap height.
#
# Acceptance Criteria:
#   AC-1: GIVEN a planned route with details sheet open
#         WHEN the sheet is snapped at 60% (minimum snap point)
#         THEN the Save button is fully visible and tappable
#
#   AC-2: GIVEN a planned route with details sheet open
#         WHEN the sheet is snapped at 90% (expanded snap point)
#         THEN the Save button is still fully visible and tappable
#
#   AC-3: GIVEN the details sheet is at 60% snap
#         WHEN the rider swipe-expands to 90%
#         THEN the body scrolls to show content AND the Save button remains pinned and visible
#
#   AC-4: GIVEN the route-directions-sheet ("Route Overview") is open
#         WHEN the sheet renders
#         THEN ALL FOUR buttons are present: route-details-sheet-save-button,
#              route-details-sheet-ride-button, route-directions-sheet-close-button,
#              route-directions-sheet-navigate-button
#
# Test Procedure:
# 1. Launch dev client and sign in
# 2. Plan a route (trigger agent to generate route)
# 3. Tap polyline to open RouteDetailsSheet
# 4. Verify Save button is visible (assertVisible)
# 5. Tap Save button to prove it's reachable (not clipped)
# 6. Open Route Overview sheet and verify all four buttons are present
#
# The assertVisible + tapOn prove the button is NOT clipped off-screen.
# A clipped button fails both assertions.
#
# Run: maestro test .maestro/rux-005-details-sheet-actions.yaml
#
appId: com.hackerpug.laneshadow
---
- launchApp:
    clearState: true
    clearKeychain: true

# Dev-client: wait for the Metro server selection or app to render
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Lane Shadow"
    timeout: 60000
- runFlow:
    when:
      visible: { text: "DEVELOPMENT SERVERS" }
    commands:
      - tapOn:
          text: ".*localhost:8081.*"

# Wait for the JS bundle and sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email|.*developer menu.*|Reload|Go home|Toggle performance monitor|Toggle element inspector|Open JS debugger|Close"
    timeout: 240000
- runFlow:
    when:
      visible: { text: ".*developer menu.*" }
    commands:
      - tapOn: { text: "Continue" }
# The Expo dev-client panel can stay open after the intro; close it deterministically.
- runFlow:
    when:
      visible: { text: "Close" }
    commands:
      - tapOn: { text: "Close" }

# Wait for sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email"
    timeout: 300000

# ── Sign in via e2e-test-login-button ──
- runFlow:
    when:
      visible: { id: "e2e-test-login-button" }
    commands:
      - tapOn: { id: "e2e-test-login-button" }

# Wait for home to fully load — chat input visible indicates map + chat are ready
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000

# ── Setup: Plan a route ──
- tapOn: { id: "chat-input-text-field" }
- inputText: "plan a motorcycle route from san francisco to santa cruz"
- tapOn: { id: "chat-input-send-button" }

# Wait for the agent to plan and render a route. Mapbox's native polyline is not
# exposed through iOS accessibility, so the app provides route-on-map-marker.
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 120000

# ── AC-1: Save button is visible and tappable at 60% snap (initial snap) ──
#
# Tap the accessible route tag to open RouteDetailsSheet for the selected route.
- tapOn: { id: "route-tag-.+" }

# Wait for the RouteDetailsSheet to open
- extendedWaitUntil:
    visible:
      id: "route-details-sheet"
    timeout: 10000

# ── AC-4: Verify ALL FOUR buttons are present ──
# CRITICAL: All four action buttons must be visible and assertable
# This is the DEFINITIVE fix for RF-003/RF-016/RF-019 (reopened twice)
- assertVisible: { id: "route-details-sheet-save-button" }
- assertVisible: { id: "route-details-sheet-ride-button" }
- assertVisible: { id: "route-directions-sheet-close-button" }
- assertVisible: { id: "route-directions-sheet-navigate-button" }

# Screenshot 1: All four buttons are visible
- takeScreenshot: rux-005-01-all-four-buttons-visible

# ── AC-1: Save button is visible at 60% snap (initial snap) ──
# CRITICAL: assertVisible on the Save button proves it is NOT clipped off-screen.
# If the button is cut off (current bug), this assertion FAILS.
- assertVisible: { id: "route-details-sheet-save-button" }

# Screenshot 2: Save button is visible at 60% snap
- takeScreenshot: rux-005-02-save-button-visible-at-60-percent

# ── AC-2 + AC-3: Swipe to expand sheet and verify Save button stays visible ──
#
# Swipe up from the bottom to expand the sheet to the 90% snap point.
# This proves the button doesn't get clipped when the sheet expands.
- swipe:
    direction: UP
    duration: 500

# Small delay for animation
- waitForAnimationToEnd:
    timeout: 1000

# CRITICAL: After expanding, the Save button must still be assertVisible.
# This proves it's pinned and never pushed off-screen by scrollable content.
- assertVisible: { id: "route-details-sheet-save-button" }

# Screenshot 3: Save button is still visible after swipe-expand to 90%
- takeScreenshot: rux-005-03-save-button-visible-at-90-percent

# ── Final proof: Tap the Save button to confirm it's reachable ──
#
# If the button is cut off, tapOn will fail (element not interactable).
# A successful tap proves the fix works.
- tapOn: { id: "route-details-sheet-save-button" }

# Wait for save sheet to open (proves the tap was successful)
- extendedWaitUntil:
    visible:
      id: "save-route-sheet"
    timeout: 10000

# Screenshot 4: Save sheet opened successfully from the details sheet
- takeScreenshot: rux-005-04-save-button-tappable-proof

# ── AC-4 continued: Verify Ride It button is also tappable ──
# Close the save sheet and test the Ride It button
- tapOn: { id: "save-route-sheet-close" }
- extendedWaitUntil:
    notVisible:
      id: "save-route-sheet"
    timeout: 5000

# Verify we're back to the details sheet
- assertVisible: { id: "route-details-sheet" }

# Tap the Ride It button
- tapOn: { id: "route-details-sheet-ride-button" }

# Wait for navigation to start (this may open a directions sheet or trigger navigation)
- waitForAnimationToEnd:
    timeout: 2000

# Screenshot 5: Ride It button tappable proof
- takeScreenshot: rux-005-05-ride-button-tappable-proof
