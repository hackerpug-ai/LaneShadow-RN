# RUX-004 E2E test: On-route map TAG showing archetype + distance; tappable; follows carousel
#
# Acceptance Criteria:
#   AC-1: GIVEN a route is plotted in ROUTE_RESULTS
#         WHEN the map renders
#         THEN a route-tag is present with text showing archetype label and distance (e.g. "Scenic · 78mi")
#
#   AC-2: GIVEN the route-tag is rendered and both sheets are closed
#         WHEN the rider taps the route-tag
#         THEN RouteDetailsSheet opens and SaveRouteSheet does NOT open
#
#   AC-3: GIVEN two distinct routes with the first selected and tagged
#         WHEN the rider pages the carousel to the second route
#         THEN exactly ONE tag remains and it shows the SECOND route's label/distance
#
# Test Procedure:
# 1. Launch the dev client with clearState (fresh install)
# 2. Sign in via e2e-test-login-button
# 3. Wait for home to load and plan a route (multiple distinct routes preferred)
# 4. Verify route-tag is visible with correct text (e.g. "Scenic · 78mi")
# 5. Tap the route-tag and verify details sheet opens (AC-2)
# 6. Close details sheet and page the carousel (AC-3)
# 7. Verify tag still present and text updated to second route's label
#
# Run: maestro test .maestro/rux-004-route-tag.yaml
#
appId: com.hackerpug.laneshadow
---
- launchApp:
    clearState: true
    clearKeychain: true

# Dev-client: wait for the Metro server selection or app to render
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Lane Shadow"
    timeout: 60000
- runFlow:
    when:
      visible: { text: "DEVELOPMENT SERVERS" }
    commands:
      - tapOn:
          text: ".*localhost:8081.*"

# Wait for the JS bundle and sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email|.*developer menu.*|Reload|Go home|Toggle performance monitor|Toggle element inspector|Open JS debugger|Close"
    timeout: 240000
- runFlow:
    when:
      visible: { text: ".*developer menu.*" }
    commands:
      - tapOn: { text: "Continue" }
# The Expo dev-client panel can stay open after the intro; close it deterministically.
- runFlow:
    when:
      visible: { text: "Close" }
    commands:
      - tapOn: { text: "Close" }

# Wait for sign-in screen
- extendedWaitUntil:
    visible:
      text: "Login with Email"
    timeout: 300000

# ── Sign in via e2e-test-login-button ──
- runFlow:
    when:
      visible: { id: "e2e-test-login-button" }
    commands:
      - tapOn: { id: "e2e-test-login-button" }

# Wait for home to fully load — chat input visible indicates map + chat are ready
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000

# ── AC-1: Plan a route and verify route-tag is present with label + distance ──
# Send a chat message that produces route options
- tapOn: { id: "chat-input-text-field" }
- inputText: "plan a scenic route from denver to boulder"
- tapOn: { id: "chat-input-send-button" }

# Wait for the agent to plan and render routes (carousel visible)
- extendedWaitUntil:
    visible:
      id: "route-carousel-container"
    timeout: 120000

# ── AC-1 Verification: route-tag is visible with label + distance ──
# The route-tag testID is route-specific; verify the route-specific tag is present
# and that no bare "route-tag" (without routeId) exists
- assertVisible: { id: "route-tag-.+" }
- assertNotVisible: { id: "^route-tag$" }

# Screenshot: Verify route-tag is visible on the map with label + distance
- takeScreenshot: 01-route-tag-visible-with-label-distance

# ── AC-2: Tap the route-tag and verify RouteDetailsSheet opens (not SaveRouteSheet) ──
- tapOn: { id: "route-tag-.+" }

# Wait a moment for the details sheet to appear (delay similar to RUX-003 pattern)
- waitForAnimationToEnd:
    timeout: 1000

# Verify RouteDetailsSheet opened (AC-2)
- extendedWaitUntil:
    visible:
      id: "route-details-sheet"
    timeout: 10000
- assertVisible: { id: "route-details-sheet" }

# Verify SaveRouteSheet did NOT open (AC-2 negative control)
- assertNotVisible: { id: "save-route-sheet" }

# Screenshot: Verify details sheet opened from route-tag tap
- takeScreenshot: 02-details-sheet-opened-from-route-tag-tap

# Close the details sheet by tapping outside or the close button
- tapOn: { id: "route-details-sheet-close" }
- extendedWaitUntil:
    notVisible:
      id: "route-details-sheet"
    timeout: 5000

# ── AC-3: Page carousel and verify tag follows to new route ──
# Check if we have multiple routes (next arrow visible)
- runFlow:
    when:
      visible: { id: "route-carousel-next-arrow" }
    commands:
      # Page to the next route
      - tapOn: { id: "route-carousel-next-arrow" }

      # Brief delay for polyline and tag update
      - waitForAnimationToEnd:
          timeout: 1000

      # Verify exactly ONE route-tag remains (now on second route)
      # Use assertNotVisible for bare "route-tag" to ensure no stale generic tag
      - assertNotVisible: { id: "^route-tag$" }
      # Verify a route-specific tag exists for the new route
      - assertVisible: { id: "route-tag-.+" }

      # Verify carousel container is still visible
      - assertVisible: { id: "route-carousel-container" }

      # Screenshot: Verify tag followed to new route (label updated)
      - takeScreenshot: 03-route-tag-followed-to-second-route

      # ── Optional: Page back and verify tag moved back ──
      - tapOn: { id: "route-carousel-prev-arrow" }
      - waitForAnimationToEnd:
          timeout: 1000

      # Verify exactly ONE route-tag on first route again
      - assertNotVisible: { id: "^route-tag$" }
      - assertVisible: { id: "route-tag-.+" }

      # Screenshot: Final state with tag back on first route
      - takeScreenshot: 04-route-tag-back-on-first-route-after-paging-prev

# Screenshot: Final state showing route-tag on map
- takeScreenshot: 05-final-state-route-tag-on-map
