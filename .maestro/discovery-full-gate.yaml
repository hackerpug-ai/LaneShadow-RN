# Sprint-01 full human-testing gate — discovery on the route plan view.
# Auto-signs-in with the CLERK_TEST_EMAIL / CLERK_TEST_PASSWORD test account, then
# drives all 9 gate steps. Screenshots captured at each step.
#
# Covers the exact human-testing requirements:
#  0. Opens directly to full-screen map + chat home (NOT a Discover screen)
#  1. Drawer: only Settings/Saved nav entries; no "Plan a ride"/"Discover";
#     no filter-bar/sort-toggle/state-picker on home
#  2. Curated-route suggestion cards over the input (real road name + mileage)
#  3. Tap a suggestion card -> route plots immediately; opening chat shows the
#     same route-card overview UX as a typed route search; cards disappear once
#     the route is shown
#  4. Clear/dismiss the route -> curated suggestion cards return
#  5. "twisties near Asheville" -> curated card(s) in chat + latest plots on map;
#     card shows a real composite score (NN/100, never 0/100, never raw 0-1/0-100)
#  6. "scenic roads in North Carolina" -> matching North Carolina curated routes plotted
#  7. Scroll chat history, tap an earlier curated card -> re-renders on map,
#     drops back to map view
#  8. Footer button (right of input, distinct from send) -> full chat; close -> map
#
# Run: maestro test .maestro/discovery-full-gate.yaml -e EMAIL=... -e PASSWORD=...
# NOTE: Run the full gate only after all sprint tasks (incl. DISC-021 quarantine)
# have landed, and with a simulated device location set (Simulator > Features >
# Location) so the "nearest" curated cards and the map's user-centered open resolve.
appId: com.hackerpug.laneshadow
---
# Cold-start semantics preserved per DISC-007. NOTE on STEP 2 (suggestion pills):
# (1) clearKeychain:true resets the iOS simulator's location permission grant, which
#     would cause useCuratedDiscovery({sort:'nearest'}) to skip the catalog query —
#     pre-grant location via `xcrun simctl privacy booted grant location-always ...`
#     before running.
# (2) More critically, the live Convex dev deployment's curated_routes table (104 rows)
#     has NO geometryStatus field populated, so use-curated-discovery.ts:97 filters
#     every route out → 0 suggestion pills regardless of location. This is a backend
#     data integrity issue (routes to convex-implementer); DISC-007 is RN-only.
# STEPS 0+1 (auth + plan-view landing + drawer contents + home has no filter/sort/state)
# pass cleanly on the iOS-sim proxy and are real evidence against live Convex.
- launchApp:
    clearState: true
    clearKeychain: true

# Dev-client: the launcher lists the localhost:8081 Metro server under
# "DEVELOPMENT SERVERS". Wait for it to render BEFORE the conditional tap, then
# tap to connect. Maestro text regex is a full match, so wildcard the URL.
- extendedWaitUntil:
    visible:
      text: "DEVELOPMENT SERVERS|Lane Shadow"
    timeout: 60000
- runFlow:
    when:
      visible: { text: "DEVELOPMENT SERVERS" }
    commands:
      - tapOn:
          text: ".*localhost:8081.*"

# Wait for the JS bundle. The dev client shows a first-run "developer menu"
# popup over the sign-in screen — dismiss it if present.
- extendedWaitUntil:
    visible:
      text: "Login with Email|.*developer menu.*|Reload|Go home|Toggle performance monitor|Toggle element inspector|Open JS debugger|Close"
    timeout: 240000
- runFlow:
    when:
      visible: { text: ".*developer menu.*" }
    commands:
      - tapOn: { text: "Continue" }
# The Expo dev-client panel can stay open after the intro; close it deterministically.
- runFlow:
    when:
      visible: { text: "Close" }
    commands:
      - tapOn: { text: "Close" }
# The Expo dev-client menu (Reload / Go home / Toggle perf monitor) can sit OVER the
# sign-in screen after connecting. Dismiss it: tap "Reload" (reloads JS + closes the
# menu) if present, else tap the dimmed backdrop above the sheet. Guarded so a clean
# launch (no menu) skips both.
- runFlow:
    when:
      visible: { text: "Reload" }
    commands:
      - tapOn: { text: "Reload" }
- runFlow:
    when:
      visible: { text: "Go home|Toggle performance monitor" }
    commands:
      - tapOn:
          point: "50%,7%"
# Bundle transfer can take a while on first connect; wait generously for sign-in.
- extendedWaitUntil:
    visible:
      text: "Login with Email"
    timeout: 300000
- takeScreenshot: 01-launch

# ── SIGN-IN via the hidden E2E test-login button (programmatic email+password)─
# Button only renders in dev builds bundled with EXPO_PUBLIC_E2E=1.
- runFlow:
    when:
      visible: { id: "e2e-test-login-button" }
    commands:
      - tapOn: { id: "e2e-test-login-button" }

# ── STEP 0: signed-in home is full-screen map + chat, NOT a Discover screen ──
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 120000
- assertNotVisible:
    id: "route-on-map-marker"
- assertNotVisible:
    id: "route-line-on-map-marker"
- assertNotVisible: { text: "Discover" }
- takeScreenshot: 02-home-map-and-chat

# ── STEP 1: drawer has only standard nav entries; no Plan-a-ride/Discover; ────
# no filter-bar / sort-toggle / state-picker on home.
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "map-header-left-button"
# Wait out the drawer slide-open animation by asserting the drawer's actual
# visible items. The drawer root is mounted while closed, so it is not enough.
- extendedWaitUntil:
    visible: { id: "drawer-nav-settings" }
    timeout: 10000
- assertVisible: { id: "drawer-nav-saved" }
- assertNotVisible: { text: "Plan a ride" }
- assertNotVisible: { text: "Discover" }
- takeScreenshot: 03-drawer-only-settings-saved
# Close drawer.
- tapOn:
    point: "90%,50%"
- extendedWaitUntil:
    visible: { id: "chat-input" }
    timeout: 10000
# Structural absence: no filter/sort/state controls exist on home. Asserting the
# absence of their likely labels + a screenshot is the Maestro-verifiable part.
- assertNotVisible: { text: "Filter" }
- assertNotVisible: { text: "Sort" }
- assertNotVisible: { text: "State" }
- takeScreenshot: 04-home-no-filter-sort-state

# ── STEP 2: curated suggestion cards over the input (road name + mileage) ─────
# Copper-accent + road-icon styling is a visual check — captured by screenshot
# (Maestro cannot assert color/icon). The road·mileage text is asserted.
- extendedWaitUntil:
    visible:
      id: "discovery-suggestion-pill-.*"
    timeout: 30000
- takeScreenshot: 05-suggestion-cards-copper-road-icon

# ── STEP 3: tap suggestion -> route plots, chat shows route-card overview ────
- tapOn:
    id: "discovery-suggestion-pill-.*"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "route-line-on-map-marker"
    timeout: 30000
- takeScreenshot: 06-suggestion-tapped-route-plotted
# Cards must hide once a route is shown.
- assertNotVisible:
    id: "discovery-suggestion-pill-.*"
    optional: true
# Opening chat after a suggestion tap must show the same route overview card
# users get when they type a curated-route request into chat.
- extendedWaitUntil:
    visible:
      id: "chat-input-chat-view-button"
    timeout: 10000
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Return to map" }
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: "curated-route-card-.*"
    timeout: 45000
- takeScreenshot: 06b-suggestion-route-card-visible-in-chat
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Open full chat" }
    timeout: 20000

# ── STEP 4: clear/dismiss the route -> curated suggestion cards return ────────
- tapOn:
    id: "control-clear"
- extendedWaitUntil:
    visible:
      id: "discovery-suggestion-pill-.*"
    timeout: 30000
- takeScreenshot: 07-cards-return-after-clear

# ── STEP 5: "twisties near Asheville" -> curated card(s) + plot + real score ──
# NOTE: blocked until the sendMessage thinkingSteps fix has landed (the chat
# action must survive past the first turn).
- tapOn:
    id: "chat-input-text-field"
- inputText: "twisties near Asheville NC"
- extendedWaitUntil:
    visible:
      text: "twisties near Asheville NC"
    timeout: 10000
- assertVisible:
    id: "chat-input-send-button"
    enabled: true
- tapOn:
    id: "chat-input-send-button"
# Wait for the real route to resolve on the map first. The full curated card
# renders in the transcript, not in compact map mode.
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "route-line-on-map-marker"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "chat-input-chat-view-button"
    timeout: 10000
- runFlow:
    when:
      visible: { text: "Open full chat" }
    commands:
      - tapOn:
          id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Return to map" }
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: "curated-route-card-.*"
    timeout: 45000
# Real composite score: NN/100 format, never 0/100 (never 0% / raw 0-1 / raw 0-100).
- assertNotVisible: { text: "0/100" }
- takeScreenshot: 08-chat-twisties-curated-card-score

# ── STEP 6: "scenic roads in North Carolina" -> state curated routes + plot ──
- runFlow:
    when:
      visible: { text: "Open full chat" }
    commands:
      - tapOn:
          id: "chat-input-chat-view-button"
      - extendedWaitUntil:
          visible: { text: "Return to map" }
          timeout: 20000
- tapOn:
    id: "chat-input-text-field"
- inputText: "scenic roads in North Carolina"
- extendedWaitUntil:
    visible:
      text: "scenic roads in North Carolina"
    timeout: 10000
- assertVisible:
    id: "chat-input-send-button"
    enabled: true
- tapOn:
    id: "chat-input-send-button"
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: "route-line-on-map-marker"
    timeout: 30000
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible:
      id: "chat-input-chat-view-button"
    timeout: 10000
- runFlow:
    when:
      visible: { text: "Open full chat" }
    commands:
      - tapOn:
          id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Return to map" }
    timeout: 20000
- extendedWaitUntil:
    visible:
      id: "curated-route-card-.*"
    timeout: 120000
- takeScreenshot: 09-chat-state-query-curated-plotted
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Open full chat" }
    timeout: 20000

# ── STEP 7: scroll chat history, tap an earlier curated card -> map re-render ─
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Return to map" }
    timeout: 20000
- takeScreenshot: 10-full-chat-open
# Scroll up to reveal earlier curated cards, then tap one.
- scroll
- extendedWaitUntil:
    visible:
      id: "routing-card-route-.*"
    timeout: 20000
- tapOn:
    id: "routing-card-route-.*"
# Selecting an earlier card drops back to the map view.
- runFlow:
    when:
      visible: { text: "Return to map" }
    commands:
      - tapOn:
          id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Open full chat" }
    timeout: 45000
- extendedWaitUntil:
    visible:
      id: "route-on-map-marker"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "route-line-on-map-marker"
    timeout: 30000
- takeScreenshot: 11-earlier-card-returns-to-map

# ── STEP 8: footer button distinct from send -> full chat; close -> map ───────
# chat-input-chat-view-button is a separate control (own testID + label) from
# chat-input-send-button. Toggling it opens the full chat; closing returns map.
- assertVisible: { id: "chat-input-chat-view-button" }
- assertVisible: { id: "chat-input-send-button" }
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Return to map" }
    timeout: 20000
- takeScreenshot: 12-footer-opens-full-chat
- tapOn:
    id: "chat-input-chat-view-button"
- extendedWaitUntil:
    visible: { text: "Open full chat" }
    timeout: 20000
- takeScreenshot: 13-close-returns-to-map
