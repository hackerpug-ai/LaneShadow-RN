# Screenshot capture flow: Save button → loading → Saved in place
# Captures the saved-state UI (DESIGN-004 / SAVE-001).

appId: com.hackerpug.laneshadow
---

- launchApp:
    clearState: true
    clearKeychain: true

- runFlow: ../_common-auth.yaml

- openLink: laneshadow:///curated-route/wasatch-ridge-traverse

- extendedWaitUntil:
    visible:
      id: 'curated-route-detail-name'
      text: 'Wasatch Ridge Traverse'
    timeout: 30000

# Scroll to action buttons
- swipe:
    direction: UP
    duration: 400
- wait: 600

- extendedWaitUntil:
    visible:
      id: 'save-curated-button'
    timeout: 10000

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/01-save-idle.png

- tapOn:
    id: 'save-curated-button'

# Wait for the success state to settle
- extendedWaitUntil:
    visible:
      id: 'save-curated-saved-badge'
    timeout: 15000
- wait: 800

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/02-saved.png
