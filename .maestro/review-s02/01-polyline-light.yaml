# Curated route detail WITH polyline (Wasatch Ridge Traverse)
# Captures: top of page (map+header), after scroll (scores), after scroll (actions)
appId: com.hackerpug.laneshadow
---

- launchApp:
    clearState: false
    clearKeychain: false

- runFlow: ../_common-auth.yaml

- openLink: laneshadow:///curated-route/wasatch-ridge-traverse

- extendedWaitUntil:
    visible:
      id: 'curated-route-detail-name'
      text: 'Wasatch Ridge Traverse'
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: 'curated-detail-map'
    timeout: 15000

# Let map tiles paint
- extendedWaitUntil:
    visible:
      id: 'curated-detail-scroll'
    timeout: 5000

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/polyline-01-top.png

# Scroll once: header→scores
- swipe:
    direction: UP
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'curated-detail-actions'
    timeout: 8000
    optional: true

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/polyline-02-scores.png

# Scroll twice: scores→actions
- swipe:
    direction: UP
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'curated-detail-actions'
    timeout: 8000
    optional: true

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/polyline-03-actions.png
