# Save flow: tap save → loading → Saved in place
appId: com.hackerpug.laneshadow
---

- launchApp:
    clearState: true
    clearKeychain: true

- runFlow: ../_common-auth.yaml

- openLink: laneshadow:///curated-route/wasatch-ridge-traverse

- extendedWaitUntil:
    visible:
      id: 'curated-route-detail-name'
      text: 'Wasatch Ridge Traverse'
    timeout: 30000

# Scroll to action buttons
- swipe:
    direction: UP
    duration: 400
- extendedWaitUntil:
    visible:
      id: 'save-curated-button'
    timeout: 8000
    optional: true

- extendedWaitUntil:
    visible:
      id: 'save-curated-button'
    timeout: 8000

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/save-01-idle.png

- tapOn:
    id: 'save-curated-button'

- extendedWaitUntil:
    visible:
      id: 'save-curated-saved-badge'
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: 'curated-route-detail-name'
    timeout: 5000

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/save-02-saved.png
