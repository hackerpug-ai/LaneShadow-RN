# Screenshot capture flow: curated route detail with polyline (top + scrolled)
# Captures the screen at two states for visual review.
# Output: /Users/inference1/Projects/LaneShadow-RN/.review/runs/sprint-02-route-detail-close-the-loop/captures/<theme>/<id>-<state>.png

appId: com.hackerpug.laneshadow
---

- launchApp:
    clearState: true
    clearKeychain: true

- runFlow: ../_common-auth.yaml

- openLink: laneshadow:///curated-route/wasatch-ridge-traverse

- extendedWaitUntil:
    visible:
      id: 'curated-route-detail-name'
      text: 'Wasatch Ridge Traverse'
    timeout: 30000

# Wait for map + scores to render
- extendedWaitUntil:
    visible:
      id: 'curated-detail-map'
    timeout: 15000

# State A: top of page (map + header)
- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/01-top.png

# Scroll once to reveal scores + summary
- swipe:
    direction: UP
    duration: 400
- wait: 600

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/02-scores.png

# Scroll again to reveal action buttons
- swipe:
    direction: UP
    duration: 400
- wait: 600

- takeScreenshot: ${MAESTRO_OUTPUT_DIR}/03-actions.png
