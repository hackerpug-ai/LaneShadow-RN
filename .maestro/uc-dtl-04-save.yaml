# DESIGN-004 AC-1 e2e: tap Save → loading → 'Saved' IN PLACE (no navigation)
#
# E2E (real iOS simulator + live Convex dev). Runs in PHASE 3.5 when a
# simulator is available; not executable in the implementer's env.
#
# Coverage:
#   AC-1 (PRIMARY) — an authenticated user on a curated route NOT yet saved
#   taps Save; an ActivityIndicator shows during the pending mutation; on
#   resolve the button label flips to '✓ Saved' + success Badge IN PLACE;
#   the route path stays '/(app)/curated-route/{id}' (NO navigation away).
#
# Fixture (seeded against live Convex dev via public_api):
#   - auth_curated_unsaved — signed-in user + curated route 'Wasatch Ridge
#     Traverse' (routeId 'wasatch-ridge-traverse') NOT in saved_routes.
#
# Prerequisite: simulator booted with LaneShadow app installed + signed in
# (Clerk dev); Convex dev running (`pnpm dev`).

appId: com.hackerpug.laneshadow
---
# Start from a clean state so the saved_routes table has no prior bookmark.
- launchApp:
    clearState: true
    clearKeychain: true

- runFlow: _common-auth.yaml

# Deep-link straight to the curated route detail screen.
- openLink: laneshadow:///curated-route/wasatch-ridge-traverse

# GIVEN: the detail screen is open — header name renders.
- assertVisible:
    id: 'curated-route-detail-name'
    text: 'Wasatch Ridge Traverse'

# Scroll down past the scores section to reveal the action buttons
- swipe:
    direction: UP

- extendedWaitUntil:
    visible:
      id: 'save-curated-button'
    timeout: 10000

# WHEN: the user taps Save.
- tapOn:
    id: 'save-curated-button'

# THEN: the control must NOT navigate away — we are still on the same route.
- assertVisible:
    id: 'curated-route-detail-name'
    text: 'Wasatch Ridge Traverse'

# AND: the button label flips to 'Saved' (the literal success label).
- assertVisible:
    id: 'save-curated-button'
    text: '.*Saved.*'

# AND: the inline success Badge renders alongside the label.
- assertVisible:
    id: 'save-curated-saved-badge'

# NEGATIVE: the user was NOT navigated to a different screen — the actions
# row is still visible (proves we stayed IN PLACE on the same route path).
- assertVisible:
    id: 'curated-detail-actions'

# NEGATIVE: the idle 'Save' label (without 'Saved') must NOT be the active
# state — the mutation resolved. (This is a negative check on the text
# 'Save' that is NOT part of 'Saved'. Maestro substring-matches so we rely
# on the positive 'Saved' assertion above + the Badge presence.)

# (Backend assertion — run out-of-band via `npx convex run` between steps:)
#   - saved_routes row count for owner incremented by exactly 1
#   - the new row has curatedRouteRef == <_id of wasatch-ridge-traverse>
#   - route_feedback has a new 'save' row for this routeId
