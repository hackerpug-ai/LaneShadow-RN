<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="#FDFBF8"/>
  </g>

  <!-- hills: 4 broad peaks, full-width, behind sun -->
  <g id="hills">
    <path
      d="M 40 320
         C 70 318, 88 290, 110 275
         C 132 261, 148 298, 165 308
         C 184 319, 200 282, 220 270
         C 244 258, 264 312, 282 313
         C 304 314, 322 286, 340 273
         C 360 260, 376 304, 388 306
         C 406 309, 420 285, 432 278
         C 448 269, 460 308, 472 320
         L 40 320 Z"
      fill="#1F1A14"
      opacity="0.88"/>
  </g>

  <!-- sun: geometrically perfect, copper, in front of hills -->
  <g id="sun">
    <circle cx="256" cy="288" r="75" fill="#D9742A"/>
  </g>

  <!-- horizon: hand-wobbled polyline-as-bezier -->
  <g id="horizon">
    <path
      d="M 40 320
         C 80 319.5, 110 319.7, 140 319.5
         C 175 319.3, 195 321, 220 321
         C 250 321, 275 319, 300 319
         C 330 319, 355 320.5, 380 320.5
         C 410 320.5, 440 319.8, 472 320"
      stroke="#1F1A14"
      stroke-width="6"
      stroke-linecap="round"
      fill="none"/>
  </g>

  <!-- road: filled wedge, steeper (base 140 to 372), inward-bowing edges, weight asymmetry, ink-trap at apex -->
  <g id="road">
    <!-- main wedge: left edge concave inward, right edge concave inward and ~1.5px heavier -->
    <path
      d="M 140 512
         Q 198 430, 254.5 322
         L 257.5 322
         Q 320 430, 372 512
         Z"
      fill="#1F1A14"/>
    <!-- ink-trap: tiny triangular bulge at convergence where road meets horizon -->
    <path
      d="M 252 322
         L 256 316
         L 260 322
         Z"
      fill="#1F1A14"/>
  </g>
</svg>
