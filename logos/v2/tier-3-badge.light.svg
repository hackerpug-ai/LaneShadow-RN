<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Top arc: left to right along the top semicircle, r=460. Text rides upright. -->
    <path id="topArc" d="M 52 512 A 460 460 0 0 1 972 512" fill="none"/>
    <!-- Bottom arc: right to left along the bottom semicircle so glyphs ride upright. r=460. -->
    <path id="bottomArc" d="M 972 512 A 460 460 0 0 1 52 512" fill="none"/>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="1024" height="1024" fill="#FDFBF8"/>
  </g>

  <g id="badge-rings">
    <circle cx="512" cy="512" r="480" stroke="#1F1A14" stroke-width="12" fill="none"/>
    <circle cx="512" cy="512" r="440" stroke="#1F1A14" stroke-width="4" fill="none"/>
  </g>

  <!-- Inner medallion: Variant C, scaled 0.95, translated so horizon (y=320 internal) sits at y=512 badge -->
  <g id="medallion-inner" transform="translate(268.8 208) scale(0.95)">
    <!-- hills -->
    <g id="hills">
      <path
        d="M 40 320
           L 40 297
           C 58 292, 74 281, 90 265
           C 104 274, 122 286, 138 295
           C 150 290, 158 285, 165 280
           C 176 289, 192 298, 208 305
           C 218 296, 230 282, 240 270
           C 252 281, 264 292, 278 301
           C 294 296, 308 285, 320 275
           C 332 286, 348 296, 362 304
           C 374 296, 386 285, 395 265
           C 410 277, 426 290, 442 301
           C 452 296, 460 290, 460 282
           C 466 290, 470 298, 472 307
           L 472 320
           Z"
        fill="#1F1A14"
        opacity="0.88"/>
    </g>
    <!-- sun -->
    <g id="sun">
      <circle cx="256" cy="288" r="88" fill="#D9742A"/>
    </g>
    <!-- horizon -->
    <g id="horizon">
      <path
        d="M 40 320
           C 120 319, 200 321, 256 320
           C 320 319.5, 392 321, 472 320"
        fill="none"
        stroke="#1F1A14"
        stroke-width="6"
        stroke-linecap="round"/>
    </g>
    <!-- road -->
    <g id="road">
      <path
        d="M 160 512
           Q 198 430, 252 322
           L 253 318
           L 259 318
           L 260 322
           Q 318 430, 352 512
           Z"
        fill="#1F1A14"/>
    </g>
  </g>

  <g id="wordmark">
    <text font-family="Georgia, 'Source Serif Pro', 'Tiempos Text', serif" font-size="64" letter-spacing="12" fill="#1F1A14" text-anchor="middle">
      <textPath href="#topArc" startOffset="50%">LANESHADOW</textPath>
    </text>
  </g>

  <g id="tagline">
    <text font-family="Georgia, 'Source Serif Pro', 'Tiempos Text', serif" font-size="40" letter-spacing="14" fill="#1F1A14" text-anchor="middle">
      <textPath href="#bottomArc" startOffset="50%">&#10038; RIDE THE MOMENT &#10038;</textPath>
    </text>
  </g>
</svg>
