<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="#FDFBF8"/>
  </g>

  <g id="daemon">
    <!-- Hand-drawn dashes hugging an offset path (28px upper-left of lead line).
         Each dash is a small rotated rounded rect, slightly varied for honesty. -->
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(108,397) rotate(-78)"/>
    <rect x="-7" y="-2" width="13" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(116,365) rotate(-74)"/>
    <rect x="-7" y="-2" width="15" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(128,331) rotate(-69)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(144,298) rotate(-62)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(166,268) rotate(-50)"/>
    <rect x="-7" y="-2" width="15" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(196,243) rotate(-38)"/>
    <rect x="-7" y="-2" width="13" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(232,224) rotate(-30)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(270,210) rotate(-25)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(308,196) rotate(-23)"/>
    <rect x="-7" y="-2" width="13" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(344,180) rotate(-28)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(376,158) rotate(-38)"/>
    <rect x="-7" y="-2" width="14" height="4" rx="2" ry="2" fill="#1F1A14" transform="translate(401,128) rotate(-52)"/>
  </g>

  <g id="lead">
    <!-- Variable-width ink ribbon: a filled shape bounded by two cubic edges
         offset perpendicular to a centerline that runs
         (130,420) -> bend ~(244,270) -> (420,100).
         Thickest at the bend (~26px), tapered to fine points at terminals.
         Slight asymmetric weight + ink-trap on the upper edge near the bend. -->
    <path d="
      M 127.6 419.5
      C 157.5 267.3, 357.5 227.3, 417.7 99.0
      L 422.3 101.0
      C 362.5 252.7, 162.5 292.7, 132.4 420.5
      Z"
      fill="#1F1A14"/>
    <!-- Ink-trap thickening at the inflection bend (upper side) -->
    <path d="
      M 206 268
      C 232 254, 268 248, 300 248
      C 272 264, 240 276, 214 286
      Z"
      fill="#1F1A14"/>
    <!-- Hand-drawn weight asymmetry on the lower switchback -->
    <path d="
      M 150 384
      C 158 356, 168 332, 180 312
      C 174 340, 168 366, 162 390
      Z"
      fill="#1F1A14"/>
  </g>

  <g id="anchor">
    <!-- Copper "you are here" mark at the rider's starting point -->
    <circle cx="130" cy="420" r="14" fill="#D9742A"/>
  </g>

  <g id="summit">
    <!-- Open ring benchmark at peak -->
    <circle cx="420" cy="100" r="8" fill="none" stroke="#1F1A14" stroke-width="4"/>
  </g>
</svg>
